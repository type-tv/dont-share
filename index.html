            { q: "REF: CDF-NON-0001<br>Turkish Airlines uses stabilized CDFA technique and profiles when flying non-precision approach procedures whenever required conditions are met. Choose the correct answer:", options: ["Non CDFA technique shall not be used when flying NPA.", "Another approach flight technique may be used for a particular approach/runway combination if specifically approved by Turkish DGCA. In such cases the applicable minimum runway visual range (RVR) should be increased by 400 meters.", "Another approach flight technique may be used for a particular approach/runway combination if specifically approved by Turkish DGCA. In such cases the applicable minimum required visibility shall be increased by 100 meters if the Commander has not flown this approach during the last 12 months.", "Another approach flight technique may be used for a particular approach / runway combination if approved by Turkish DGCA. RVR / visibility requirement on the approach chart must be met."], answer: "Another approach flight technique may be used for a particular approach/runway combination if specifically approved by Turkish DGCA. In such cases the applicable minimum runway visual range (RVR) should be increased by 400 meters." },
            { q: "REF: TAW-NON-0001<br>The purpose of the Ground Proximity Warning System (GPWS) is to warn the flight crew of potential dangerous situation such as a collision with terrain. Which one of the following is correct for GPWS procedures?", options: ["The Ground Proximity Warning System (GPWS) must be \"ON\" during take-off and landing phases except provided in the minimum equipment list (MEL).", "Navigation accuracy should be predicated on the use of the terrain display by PM.", "The terrain display should be used by PF during all departures and arrivals including VFR. In a well-known non-terrain environment, PF and PM may display the weather radar on both sides.", "When undue proximity to the ground is detected by a GPWS, the pilot flying (PF) shall take corrective action immediately to establish safe flight conditions."], answer: "When undue proximity to the ground is detected by a GPWS, the pilot flying (PF) shall take corrective action immediately to establish safe flight conditions." },
            { q: "REF: TAW-NON-0004<br>Choose the correct answer as per maximum vertical speed to prevent an excessive terrain closure rate:", options: ["maximum -8,000 fpm above 5,000 ft.", "-3,000 fpm between 4,000 ft and 5,000 ft", "-2,000 fpm between 4,000 ft and 3,000 ft", "-1,500 fpm between 2,000 ft and 1,000 ft,"], answer: "-1,500 fpm between 2,000 ft and 1,000 ft," },
            { q: "REF: TCS-NON-0002<br>TCAS detects and displays surrounding aircraft that have a transponder. It calculates and displays potential threats. It also triggers vertical speed orders in order to avoid collisions. When a Traffic Advisory (TA) is produced by TCAS;", options: ["Establish visual contact with the intruder aircraft and switch TCAS system to RA mode.", "Flight crew shall request a new flight level / altitude or heading to avoid the intruder.", "Flight crew should not maneuver an aeroplane in response to a TA.", "Display must be monitored for intruders without altitude reporting capability as TCAS cannot produce a Resolution Advisory (RA)."], answer: "Flight crew should not maneuver an aeroplane in response to a TA." },
            { q: "REF: TCS-NON-0009<br>What action is required when a pilot receives a Resolution Advisory (RA)?", options: ["Search for the traffic visually without changing the flight path.", "Adhere to Air Traffic Control (ATC) instructions.", "Execute the necessary maneuver to avoid the conflicting traffic.", "Both search for traffic visually and adhere to ATC instructions."], answer: "Execute the necessary maneuver to avoid the conflicting traffic." },
            { q: "REF: CWO-NON-0002<br>You started to descend for approach in cold weather conditions with an outside air temperature (OAT) of -15 degrees at the destination airport. No radar vector is provided and you're planning to make a conventional approach. Approach chart shows that FAP must be crossed at 3000 feet. Aerodrome elevation is 1000 feet. Which altitude you should cross FAP?", options: ["3570 ft", "3380 ft", "3760 ft", "3000 ft"], answer: "3380 ft" },
            { q: "REF: CWO-NON-0003<br>Low temperature altitude correction should be applied to ensure the aeroplane remains above the minimum altitudes if local aerodrome OAT value is reported as \"0\" degrees Celsius or less. In order to ensure adequate obstacle clearance, pilot-in-command should add the values calculated.", options: ["To the published procedure altitudes only.", "To the charted approach minima only.", "To the published procedure altitudes including MSA, MDA and DA.", "To the published procedure altitudes including MSA, MDA, DA, missed approach altitudes, thrust reduction and acceleration altitude, engine-out acceleration and holding altitude."], answer: "To the published procedure altitudes including MSA, MDA, DA, missed approach altitudes, thrust reduction and acceleration altitude, engine-out acceleration and holding altitude." },
            { q: "REF: TWA-NON-0003<br>To avoid the effect of a possible downburst, approach shall be delayed / discontinued if, the last ___NM of final approach course until the end of the runway, a thunderstorm activity (red echo on Wx radar) is within... around the runway intended for landing or if the thunderstorm activity is evaluated as a potential hazard for the missed approach phase.", options: ["3 NM – 3NM", "10 NM – 10NM", "20NM – 20NM", "5NM – 5NM"], answer: "5NM – 5NM" },
            { q: "REF: TWA-NON-0004<br>Approaching EHAM runway 27 you have noticed on weather radar, red echoes within 5 NM from the intended missed approach procedure path. Under these conditions, which of the following would be the best action if you have extra fuel on board?<br>I. No considerations required, continue approach and land.<br>II. Request an instrument approach to the same runway with a different go-around flight path.<br>III. No other options available, divert to destination alternate.<br>IV. Request an alternative instrument approach to another runway with a different go-around flight path.", options: ["Only I", "Only III", "II-IV", "Only IV"], answer: "II-IV" },
            { q: "REF: TUR-NON-0001<br>The flight crew shall record in the AML, if... is encountered in flight.", options: ["Light turbulence", "Moderate turbulence", "Severe turbulence", "Icing conditions"], answer: "Severe turbulence" },
            { q: "REF: ASH-NON-0001<br>Which of the following is an indicator of volcanic ash encounter?<br>I. Smoke, dust or acrid odours in the flight deck<br>II. Unreliable airspeed indication<br>III. Engine flame-out", options: ["I-IV", "I-II_IV", "II-III-IV", "All of Above"], answer: "All of Above" },
            { q: "REF: SST-NON-0003<br>Which of the following situations can be expected in case of an unavoidable sand storm?<br>I. Unreliable Speed Indications, II. Structural damages on windscreen and leading edges, III. Ingestion damage on turbine engines, IV. Sand accumulation on shock struts and actuator sliding parts.", options: ["I-II", "II-III", "Only III", "All of Above"], answer: "All of Above" },
            { q: "REF: PER-320-0014<br>Which braking mode is considered in the QRH tables of landing distance with failure?", options: ["Auto Brake MED", "Auto Brake LOW", "Maximum Manual Braking", "Keeping Auto Brake OFF"], answer: "Maximum Manual Braking" },
            { q: "REF: PER-320-0012<br>Following an engine failure and decompression without obstacle limitation, diversion FL is reached with 60 tons mass. Calculated cruise time is 1 hour. What is the required fuel for cruise? (Using chart data for OEI)", img: "annexes/examIV/examIV_annex36.png", options: ["4502 kg", "2251 kg", "2168 kg", "4316 kg"], answer: "2251 kg" },
            { q: "REF: PER-320-0013<br>Which statement is correct for take-off performance calculations?", options: ["No speed correction is required for QNH and bleeds influence for MTOW calculations.", "The flexible temperature value shall not be higher than maximum certified OAT value.", "The final flexible temperature have to be higher than OAT and TREF.", "Speed correction is required for QNH and bleeds influence for Flex Takeoff calculations"], answer: "The final flexible temperature have to be higher than OAT and TREF." },
            { q: "REF: PER-320-0015<br>Which statement is correct for take-off performance calculations according to the chart shown above?", options: ["Outside Air Temperature can exceed maximum certified temperature for takeoff", "Flexible temperature values can exceed maximum certified temperature for takeoff", "Flexible temperature values can be lower than flat rating temperature", "Outside Air Temperature can be higher than selected flexible temperature for flexible takeoff."], answer: "Flexible temperature values can exceed maximum certified temperature for takeoff" }
        ],
        ocr: [
            { q: "REF: OM Part-B Chapter 7<br>Which of the following statements are correct about CG point of an aircraft?<br>I. It is the point through which force of gravity is said to act a weight.<br>II. It is the point of balance and such it affects the stability of the aeroplane.<br>III. It is always accepted as DATUM point while making calculations about the balance of aircraft.", options: ["Only I", "I-II", "I-II-III", "Only II"], answer: "I-II" },
            { q: "REF: OM Part-B Chapter 7<br>According to given Loadsheet, which of the following is correct?", img: "annexes/examIV/examIV_annex14.png", options: ["Allowed Traffic Load is 19300 kg.", "Allowed Traffic Load is 18500 kg.", "Allowed Traffic Load is 15343 kg.", "Traffic load is limited by Zero Fuel weight."], answer: "Allowed Traffic Load is 15343 kg." },
            { q: "Before dispatching an aircraft it is checked that all operational weights within the limits. According to given Loadsheet, which weight limits Total Traffic Load?", img: "annexes/examIV/examIV_annex15.png", options: ["Maximum Taxi weight", "Maximum Take off weight", "Maximum Zero Fuel weight", "Maximum Landing weight"], answer: "Maximum Landing weight" },
            { q: "According to given information, what is the Allowed Traffic Load?", img: "annexes/examIV/examIV_annex16.png", options: ["18100 kg", "18900 kg", "14943 kg", "11400 kg"], answer: "14943 kg" },
            { q: "REF: OM Part-B Chapter 7<br>According to example given above, which limits allowed traffic load?", img: "annexes/examIV/examIV_annex17.png", options: ["Dry Operating Weight", "Zero Fuel Weight", "Take off Weight", "Landing Weight"], answer: "Landing Weight" },
            { q: "REF: OM Part-B Chapter 7<br>Assume that : LIZFW(Index for ZFW) = 72.2, ZFW (Actual)=56 119 kg, according to given information what is the MACZFW value approximately for this aircraft?", img: "annexes/examIV/examIV_annex18.png", options: ["32.1", "35.0", "34.4", "33.4"], answer: "34.4" },
            { q: "REF: OM Part-B Chapter 7<br>Which of the following statements are correct about CG point of an aircraft?<br>I. It is the point through which force of gravity is said to act a weight.<br>II. It is the point of balance and such it affects the stability of the aeroplane<br>III. It is always accepted as DATUM point while making calculations about the balance of aircraft.", options: ["Only I", "I-II", "I-II-III", "Only II"], answer: "I-II" },
            { q: "REF: OM Part-B Chapter 7<br>What is definition of Operating Weight?", options: ["The dry operating weight plus fuel but without traffic load", "It has same meaning of the Dry Operating Weight", "It defines based on calculation of Basic Weight plus traffic load", "Actual take-off weight minus Actual landing weight"], answer: "The dry operating weight plus fuel but without traffic load" },
            { q: "REF: OM Part-A 8.1<br>Which of the following information shall be contained in the mass and balance document?<br>I. Aircraft Registration and Type<br>II. Flight identification, Flight Number and Date<br>III. Name of the Commander<br>IV. Name of the First Officer", options: ["I, II, III, IV", "I, II, IV", "I, III, IV", "I, II, III"], answer: "I, II, III" },
            { q: "OM PART A 8.1<br>Which of the following statements are correct?<br>I. For narrow body aeroplanes, maximum allowed LMC value is 500 kg (passenger, cargo, mail or any combination).<br>II. For wide body aeroplanes, maximum allowed LMC value is 1000 kg (passenger, cargo, mail or any combination).<br>III. For cargo aeroplanes, maximum allowed LMC value is 1500 kg.<br>IV. If maximum allowed LMC number is exceeded, a new mass and balance documentation shall be prepared.", options: ["I, II, III", "I, II, IV", "II, III, IV", "All of Above"], answer: "I, II, IV" },
            { q: "REF: OM Part-B Chapter 7<br>How is Dry Operating Weight (DOW) value calculated?", options: ["Basic Weight + Operating Weight", "Actual Take-Off Weight + Total Traffic Load", "Operating Weight + Pantry - (Minus) Fuel", "Basic Weight + Pantry + Crew"], answer: "Basic Weight + Pantry + Crew" },
            { q: "REF: OM Part-B Chapter 7<br>What is correlation between Zero Fuel Weight and Dry Operating Weight?", options: ["It is based on calculation of adding total traffic load to DOW value", "Basic Weight plus operational items such as crew and pantry", "It is calculated by substracting landing weight from take-off weight", "It is calculated by substracting operating weight from take-off weight"], answer: "It is based on calculation of adding total traffic load to DOW value" },
            { q: "REF: OM Part-A Chapter 8.1<br>Which one of the following options is given correctly about standard mass values for crew?", options: ["flight crew/ technical crew members is 85 kg; cabin crew members is 70 kg", "flight crew/ technical crew members is 85 kg; cabin crew members is 75 kg", "flight crew/ technical crew members is 75 kg; cabin crew members is 85 kg", "flight crew/ technical crew members is 88 kg; cabin crew members is 70 kg"], answer: "flight crew/ technical crew members is 85 kg; cabin crew members is 75 kg" },
            { q: "Which one of the following statement are correct for mass values for crew members?<br>I. The standard mass (including hand baggage) of flight crew/ technical crew members is 85 kg<br>II. The standard mass (including hand baggage) of cabin crew members is 75 kg<br>III. Standard operating crew member masses shall be corrected to take into account any additional baggage (layover or ER baggage checked-in carried in the cabin)<br>IV. Additional baggage shall be calculated at 20 kg per crew member.", options: ["I, II, III", "I, III, IV", "I, II, IV", "I, II, III, IV"], answer: "I, II, III" },
            { q: "REF: JEPPESEN AIRWAY MANUAL<br>Please select the daily publication times of significant weather charts.", options: ["0000 UTC - 0600 UTC - 1200 UTC - 1800 UTC", "1150 UTC - 1220 UTC - 1250 UTC - 1320 UTC", "0300 UTC - 0900 UTC - 1500 UTC - 0000 UTC", "0100 UTC - 0700 UTC - 1300 UTC - 1900 UTC"], answer: "0000 UTC - 0600 UTC - 1200 UTC - 1800 UTC" },
            { q: "REF: Jeppesen General Airway Manual<br>What is the meaning of jet stream change bars that are shown on Significant Weather Charts (SWC)?", options: ["Changes in wind speed by 10 KT or height of the jet axis by 2000 FT", "Changes in wind speed by 20 KT or height of the jet axis by 3000 FT", "Changes in wind speed by 30 KT or height of the jet axis by 4000 FT", "Changes in wind speed by 40 KT or height of the jet axis by 5000 FT"], answer: "Changes in wind speed by 20 KT or height of the jet axis by 3000 FT" },
            { q: "Which of the following is taken into account for route selection during dispatch phase?", options: ["Type of aircraft", "Destination aerodrome weather conditions", "Overflying costs", "Aerodrome categorization information"], answer: "Overflying costs" },
            { q: "While checking the briefing package, you saw a MEL item which restricts the maximum flight level to FL 310. According to the OFP above, what is the correct action?", img: "annexes/examIV/examIV_annex19.png", options: ["No action is required because flight planning system does not take the MEL items into account", "You should call dispatch and reduce the fuel on board", "You should call dispatch and confirm the validity of MEL item because it is expected that flight planning system considers the MEL restriction, displays it on MEL/CDL ITEMS section and limits the FL accordingly.", "No action is required if it is not displayed in MEL/CDL ITEMS section"], answer: "You should call dispatch and confirm the validity of MEL item because it is expected that flight planning system considers the MEL restriction, displays it on MEL/CDL ITEMS section and limits the FL accordingly." },
            { q: "REF: Part A 8.1.5<br>Which statement is correct regarding this section of OFP for IST-OSL flight?", img: "annexes/examIV/examIV_annex20.png", options: ["ESGG is the alternate aerodrome which the minimum diversion fuel is based on", "There is no need to contact Dispatch or IOCC for the reason of planning two alternates", "ESSA and ESGG weather forecasts shall not be classified as operationally significant", "Planning of 8 minutes extra fuel is mandatory due to weather conditions at destination aerodrome"], answer: "Planning of 8 minutes extra fuel is mandatory due to weather conditions at destination aerodrome" },
            { q: "While checking the weather page of the briefing package, what is the correct way to determine the suitability of airports in OFP in terms of weather?", img: "annexes/examIV/examIV_annex21.png", options: ["All of the weather information displayed in weather page shall be considered regardless of the time periods", "It is enough to check departure and destination weather because only departure and destination airport weather information is required to determine the suitability", "Weather information of all of the aerodromes displayed in OFP (departure, destination, alternates) shall be checked according to the suitability time periods.", "Only METAR section of weather information shall be checked. Checking of TAF section is not mandatory because TAF is used for advisory"], answer: "Weather information of all of the aerodromes displayed in OFP (departure, destination, alternates) shall be checked according to the suitability time periods." },
            { q: "REF.OM Part-A Chapter 8.1<br>Which of the following statements is correct about usage of Self Dispatch Guide?", options: ["Usage of Self Dispatch Guide is recommended for all flights", "Self Dispatch Guide should only be used in special operation required flights such as ETOPS", "If destination aerodrome planned runway is short, there's no need to use Self Dispatch Guide", "If departure and arrival time is within daytime, Self Dispatch Guide items may be disregarded"], answer: "Usage of Self Dispatch Guide is recommended for all flights" },
            { q: "OM PART A 8.1<br>Which of the following statements are correct in terms of flight planning?<br>I-For precision approach only the RVR/CMV/Visibility (also a particular ceiling if required by the state authority) shall be at or above minima.<br>II-For a non-precision approach and/or circling approach both the visibility/CMV and VV/ceiling shall be at or above minima.<br>III-FEW and SCT METAR/TAF codes are taken into account for determining ceiling.<br>IV-BKN and OVC METAR/TAF codes are taken into account for determining ceiling.", options: ["I-III", "II-IV", "I-II-III", "I-II-IV"], answer: "I-II-IV" },
            { q: "REF: OM Part-A 8.1<br>Which of the following criteria are considered while planning route of a flight?<br>I-Enroute Weather<br>II-Traffic<br>III-ATC Regulations and NOTAMS<br>IV-Cost<br>V-Ticket prices", options: ["I-II-V", "II-III-IV", "III-IV-V", "I-II-III-IV"], answer: "I-II-III-IV" },
            { q: "During the dispatch phase of TK346 to Bishkek (UCFM), the flight crew analyze the weather forecast:<br>TAF: UCFM 201324Z 2015/2115 06003G08MPS 1500 BR SCT040CB TEMPO 2018/2102 16003G08MPS 0150 FZFG FU FEW002 BKN005 BECMG 2105/2106 9999 NSW TEMPO 2105/2112 2000 FU SCT007<br>ETA of TK346 : 21:00Z<br>Considering UCFM has a CAT II ILS approach to both runways 08 and 26, which of the following is correct in terms of flight planning?", options: ["The flight can be dispatched with one destination alternate and no extra fuel.", "The flight cannot be dispatched as the weather forecast is below minima.", "The weather forecast is below minima, therefore the flight shall only be dispatched with two destination alternates", "Since the destination is one of the Commonwealth of Independent States (C.I.S), the weather forecast TEMPO below minima is considered operationally significant. The flight can be dispatched with one destination alternate and a minimum 60 minutes of extra holding fuel"], answer: "Since the destination is one of the Commonwealth of Independent States (C.I.S), the weather forecast TEMPO below minima is considered operationally significant. The flight can be dispatched with one destination alternate and a minimum 60 minutes of extra holding fuel" },
            { q: "OM PART A 8.1<br>Which one of the following statements is correct?", options: ["Name of the commander is not required to be on the mass and balance documentation", "LMC can be applied to the crew composition section of the mass and balance document.", "In case of LMC on mass and balance documentation after door closure, changes may be relayed to the Commander via radio or the ground service interphone. Flight crew and ground staff shall amend their copies in weight and index accordingly.", "According to seating policy, Commander is not required to make any corrective action to reposition the passengers even though extreme longitudinal seat selection occurs"], answer: "In case of LMC on mass and balance documentation after door closure, changes may be relayed to the Commander via radio or the ground service interphone. Flight crew and ground staff shall amend their copies in weight and index accordingly." },
            { q: "REF: Part A 8.1.10<br>What is the correct sequence to refer for enroute engine out driftdown / cabin depressurization special procedure?", options: ["Company NOTAM, OFP Critical Terrain Scenario, Special Facility Chart (SFC)", "Company NOTAM, Special Facility Chart (SFC), OFP Critical Terrain Scenario", "OFP Critical Terrain Scenario, Special Facility Chart (SFC), Company NOTAM", "OFP Critical Terrain Scenario, Company NOTAM, Special Facility Chart (SFC)"], answer: "Company NOTAM, OFP Critical Terrain Scenario, Special Facility Chart (SFC)" },
            { q: "REF: OM Part-A 8.1<br>If ACARS is used instead of the computer/paper loadsheet, how many loadsheet copies will be printed for a passenger flight?", options: ["Minimum 1 Copy (only one copy will be enough to put into the flight envelope)", "Minimum 2 Copies (one copy will be given to the operations/handling agent and one copy will be put into the flight envelope)", "Minimum 2 Copies (one copy will be put into the flight envelope and one copy will be given to the cabin chief)", "Minimum 3 Copies (one copy will be given to the operations/handling agent, one copy will be put into the flight envelope and 3rd copy will be given to the cabin chief)"], answer: "Minimum 3 Copies (one copy will be given to the operations/handling agent, one copy will be put into the flight envelope and 3rd copy will be given to the cabin chief)" },
            { q: "REF: OM Part-B Chapter 7<br>Which of the following is a component of Basic Weight (BW)?", options: ["Crew", "Pantry", "Potable water tanks (%100 Water Level)", "Take-off Fuel"], answer: "Potable water tanks (%100 Water Level)" },
            { q: "REF: OM Part-A Chapter 8.1<br>Which one of the following options is given correctly about mass values for passengers and baggage for all flights except holiday charters?", options: ["Male: 85; Female:75; Children:35; Infants:10", "Male: 75; Female:85; Children:25; Infants:10", "Male: 88; Female:70; Children:35; Infants:10", "Male: 88; Female:75; Children:25; Infants:10"], answer: "Male: 88; Female:70; Children:35; Infants:10" },
            { q: "REF: OM PART-B Chapter 7<br>Total Traffic Load is equal to", options: ["Dry Operating Mass - the disposable load.", "Dry Operating Mass - the variable load.", "Zero Fuel Mass - Dry Operating Mass.", "Take-off Mass - Zero Fuel Mass"], answer: "Zero Fuel Mass - Dry Operating Mass." },
            { q: "REF: OM Part-B Chapter 7<br>Assume that : LITOW(Index for TOW) = 69.0, TOW (Actual) = 66 319 kg, according to given information what is the MACZFW value approximately for this aircraft?", img: "annexes/examIV/examIV_annex22.png", options: ["32.1"], answer: "32.1" },
            { q: "REF: OM Part-A Chapter 8.1<br>Which of the following statements is/are correct for mass and centre of gravity calculations?<br>I. The mass and the CG of any Turkish Airlines aeroplane are established by actual weighing prior to initial entry into service and thereafter at intervals of five years.<br>II. The use of standard masses for passengers, checked baggage and other items do not have to be approved by the Turkish DGCA.<br>III. The mass of the traffic load, including any ballast, is established either by actual weighing or by using standard passenger and baggage masses.", options: ["Only I", "I, II", "I, II, III", "Only III"], answer: "Only III" },
            { q: "REF: OM Part-A 8.1<br>What is the maximum allowed LMC value for narrow body and wide body aeroplanes?", options: ["Narrow Body: 500 KG Wide Body: 1000 KG", "Narrow Body: 1000 KG Wide Body: 1500 KG", "Narrow Body: 1500 KG Wide Body: 2000 KG", "Narrow Body: 250 KG Wide Body: 500 KG"], answer: "Narrow Body: 500 KG Wide Body: 1000 KG" },
            { q: "REF: OM Part-B Chapter 7<br>According to the loadsheet shown above, what is indicated in the section marked as item 11?", img: "annexes/examIV/examIV_annex23.png", options: ["male, female, child, infant persons on board", "infant, male, female, child persons on board"], answer: "male, female, child, infant persons on board" },
            { q: "FPM-NON-0001<br>Which of the following is considered for route selection?<br>I. Meteorological Condition<br>II. NOTAMS<br>III. MEL Restrictions<br>IV. Overflying Cost<br>V. ATC Regulations", options: ["I-II", "II-III-V", "I-III-IV-V", "All of Above"], answer: "All of Above" },
            { q: "REF: Part A 8.1.5<br>Which statement is correct regarding this section of OFP for IST-OSL flight?", img: "annexes/examIV/examIV_annex24.png", options: ["ESGG is the alternate aerodrome which the minimum diversion fuel is based on", "There is no need to contact Dispatch or IOCC for the reason of planning two alternates", "ESSA and ESGG weather forecasts shall not be classified as operationally significant", "Planning of 8 minutes extra fuel is mandatory due to weather conditions at destination aerodrome"], answer: "Planning of 8 minutes extra fuel is mandatory due to weather conditions at destination aerodrome" },
            { q: "OM PART A 8.1<br>During the dispatch phase of TK346 to Bishkek (UCFM), the flight crew analyze the weather forecast:<br>TAF: UCFM 201324Z 2015/2115 06003G08MPS 1500 BR SCT040CB TEMPO 2018/2102 16003G08MPS 0150 FZFG FU FEW002 BKN005 BECMG 2105/2106 9999 NSW TEMPO 2105/2112 2000 FU SCT007<br>ETA of TK346 : 21:00Z<br>Considering UCFM has a CAT II ILS approach to both runways 08 and 26, which of the following is correct in terms of flight planning?", options: ["The flight can be dispatched with one destination alternate and no extra fuel.", "The flight cannot be dispatched as the weather forecast is below minima", "The weather forecast is below minima, therefore the flight shall only be dispatched with two destination alternates", "Since the destination is one of the Commonwealth of Independent States (C.I.S), the weather forecast TEMPO below minima is considered operationally significant. The flight can be dispatched with one destination alternate and a minimum 60 minutes of extra holding fuel"], answer: "Since the destination is one of the Commonwealth of Independent States (C.I.S), the weather forecast TEMPO below minima is considered operationally significant. The flight can be dispatched with one destination alternate and a minimum 60 minutes of extra holding fuel" },
            { q: "REF: Jeppesen General Airway Manual<br>What is the defined validity time of WAFC SIGWX forecasts and publish time?", options: ["0600 1200, 1800, 0000 UTC. The forecasts will continue to be published every six hours", "0200, 0800, 1400, 2000 UTC. The forecasts will continue to be published every six hours", "0600, 1200, 1800, 0000 UTC. The forecasts will continue to be published every two hours", "0200, 0800, 1400, 2000 UTC. The forecasts will continue to be published every two hours"], answer: "0600 1200, 1800, 0000 UTC. The forecasts will continue to be published every six hours" },
            { q: "REF: Jeppesen General Airway Manual<br>What is the meaning of jet stream change bars that are shown on Significant Weather Charts (SWC)?", options: ["Changes in wind speed by 10 KT or height of the jet axis by 2000 FT", "Changes in wind speed by 20 KT or height of the jet axis by 3000 FT", "Changes in wind speed by 30 KT or height of the jet axis by 4000 FT", "Changes in wind speed by 40 KT or height of the jet axis by 5000 FT"], answer: "Changes in wind speed by 20 KT or height of the jet axis by 3000 FT" },
            { q: "REF: OM Part-A Chapter 8.1<br>When a flight plan is changed, ID number in OFP section is updated. What is the correct action for flight crew in case of OFP changes?", options: ["The OFP which is held by flight crew is the valid OFP. No action is required", "Flight crew should update plan ID in OFP manually. No further action is required.", "Flight crew shall contact with dispatch and request latest OFP via EFB/ACARS or as printed, check the route, alternate aerodromes and required fuel accordingly.", "Flight crew should send the a photo of the OFP to dispatch office via e-mail."], answer: "Flight crew shall contact with dispatch and request latest OFP via EFB/ACARS or as printed, check the route, alternate aerodromes and required fuel accordingly." },
            { q: "Ref:Jeppesen Airway Manual - Air Traffic Control - CPDLC<br>After receiving frequency change instruction from the CPDLC, what is the correct action to be taken?", options: ["After establishing connection with new ATC unit, \"CPDLC\" should be said on the first contact", "Frequency change instruction should be readback with the current unit", "New CPDLC logon request should be initiated in any case", "Only new ATC unit should be called by voice in initial contact"], answer: "Only new ATC unit should be called by voice in initial contact" },
            { q: "Ref: Jeppesen General Airway Manual- definition and abbreviation<br>What does FANS stand for?", options: ["Familiar Aircraft Notify System", "Forward Aim Needle System", "Future Air Navigation System", "Final Approach Navigation System"], answer: "Future Air Navigation System" },
            { q: "Ref. Jeppesen General Airway Manual - Air Traffic Management - Flight Plan<br>Which FANS system relies only on VHF data link and has no ADS-C capability?", options: ["ACARS ATS", "ATN B1", "SATCOM", "FANS 1/A"], answer: "ATN B1" },
            { q: "Ref: Jeppesen General Airway Manual - Air Traffic Control - CPDLC<br>Which standard phraseology is used to notify ATC of CPDLC failure?", options: ["\"LOSS OF DATA LINK SERVICES\"", "\"UNABLE CPDLC OPERATIONS\"", "\"CPDLC FAILURE CONTINUING ON VOICE\"", "\"LINK FAILURE - REVERT TO HF\""], answer: "\"CPDLC FAILURE CONTINUING ON VOICE\"" },
            { q: "Ref: Jeppesen General Airway Manual- Air Traffic Control- CPDLC<br>Which of the following is an example to an uplink message coming from ATS unit?", options: ["Immediately stop climb at FL 250", "When can we expect descent to FL200", "At (position) request offset 40 nm right of route", "Request cruise climb to FL340"], answer: "Immediately stop climb at FL 250" },
            { q: "Ref: Jeppesen General Airway Manual- Air Traffic Control- CPDLC<br>How many ATC unit(s) can be connected to CPDLC at the same time?", options: ["1", "3", "5", "7"], answer: "1" },
            { q: "Ref:Jeppesen Airway Manual - Air Traffic Control - CPDLC<br>After receiving frequency change instruction from the CPDLC, what is the correct action to be taken?", options: ["After establishing connection with new ATC unit, \"CPDLC\" should be said on the first contact", "Frequency change instruction should be readback with the current unit", "New CPDLC logon request should be initiated in any case", "Only new ATC unit should be called by voice in initial contact"], answer: "After establishing connection with new ATC unit, \"CPDLC\" should be said on the first contact" },
            { q: "Ref.Jeppesen Airway Manual - Air Traffic Control - CPDLC<br>Which of the followings is true for CPDLC operations?", options: ["Guard frequency may not be monitored if CPDLC communication is established", "In an emergency, flight crew would normally revert to voice communications", "Flight crew should reinitiate a logon every time when ATS unit is changed", "Altitude change instructions received from CPDLC should also be verified by Voice"], answer: "In an emergency, flight crew would normally revert to voice communications" },
            { q: "Ref: Jeppesen General Airway Manual- definitions and abbreviations<br>In ADS-C system, C stands for ...", options: ["Communication", "Contract", "Connection", "Control"], answer: "Contract" },
            { q: "REF: A320 FCOM-PRO-SUP-LG<br>During taxi, if crew noticed that the aircraft is not able to follow a straight line, then crew adjusted rudder trim, which procedure should apply?", options: ["Crew must report rudder trim fault in the logbook.", "If rudder trim is 9 degree, crew must not attempt takeoff.", "If rudder trim is 4 degree, you may continue without any operational restriction.", "Crew may depart with rudder trim setting which is set at taxi to maintain straight line."], answer: "If rudder trim is 9 degree, crew must not attempt takeoff." },
            { q: "REF: A320 FCOM PRO-ABN<br>Title of the failure above indicates that it is an __________", img: "annexes/examIV/examIV_annex25.png", options: ["Abnormal procedure displayed on ECAM", "Emergency procedure displayed on ECAM", "Abnormal procedure not displayed on ECAM", "Emergency procedure not displayed on ECAM"], answer: "Emergency procedure not displayed on ECAM" },
            { q: "REF: A320 FCOM PRO-NOR-SUP<br>You have a flight to LTCO to layover in Kars. The flight crew will be changed at destination. The weather is in icing conditions with OAT at +3 ℃ (37 °F) or below.<br>While we are leaving the Aircraft, why do we record Taxi-in time in logbook?", options: ["It is standart AML recording procedure,", "The company request to gather statistical information.", "Determine the maximum time to next engine acceleration.", "When the flight crew is changing, taxi-in time is always recorded"], answer: "Determine the maximum time to next engine acceleration." },
            { q: "REF: A320 FCOM PRO-NOR-SOP<br>During the Preliminary Cockpit Preparation, in order to check the engine oil quantity on the ENG SD Page, which of the following action must be performed to check this value?", options: ["Rotate ENG MODE SEL to IGN", "Use ENG FADEC GND POWER pb on Overhead Panel", "Press RECALL pb more than 3 sec", "Move THRUST LEVERS"], answer: "Use ENG FADEC GND POWER pb on Overhead Panel" },
            { q: "REF: OM Part-B Chapter 7<br>According to the image above, how many business class seats are there on the plane?", img: "annexes/examIV/examIV_annex26.png", options: ["20", "25", "30", "35"], answer: "20" },
            { q: "Which of the followings statements are correct regarding benefits of FANS (Future Air Navigation Systems)?<br>I. It allows more traffic in a limited airspace<br>II. It enhances content of the passenger entertainment system<br>III. It creates more direct routings with efficient route change<br>IV. It improves communication", options: ["I, II", "I, II, III", "I, III, IV", "All of the Above"], answer: "I, III, IV" },
            { q: "OM PART B<br>Which of the following statements are correct?<br>I. Basic weight is the weight of the aircraft with all its basic equipment plus a declared quantity of unusable fuel/oil.<br>II. Dry operating weight is the total weight of the aeroplane excluding all usable fuel and traffic load.<br>III. Dry operating weight include equipment in compartment (EIC).<br>IV. Zero fuel weight is the total weight of dry operating weight plus the traffic load.", options: ["I-II", "I-II-III", "I-II-IV", "All of Above"], answer: "I-II-IV" },
            { q: "REF: A320 FCOM-DSC-31<br>Which statement(s) is/are correct about QFE Baro Setting?<br>I-When the barometric reference is set to QFE, pushing again the barometric reference knob changes the reference to QNH<br>II-If QFE is given by the ATC during an approach, then the crew must set QFE if available on the aircraft<br>III-All Turkish Airlines Aircraft operate with reference to the Standard Altimeter Setting (1013.2hPa/29.92in.Hg) of flight level (FL/ QNE) or of altitude (QNH), whichever applies", options: ["Only III", "I-II", "I-III", "I-II-III"], answer: "I-III" },
            { q: "Which one of the following statement are correct for mass values for crew members?<br>I. The standard mass (including hand baggage) of flight crew/ technical crew members is 85 kg<br>II. The standard mass (including hand baggage) of cabin crew members is 75 kg<br>III. Standard operating crew member masses shall be corrected to take into account any additional baggage (layover or ER baggage checked-in or carried in the cabin)<br>IV. Additional baggage shall be calculated at 20 kg per crew member.", options: ["I, II, III", "I, III, IV", "I, II, IV", "I, II, III, IV"], answer: "I, II, III" },
            { q: "REF: A320 FCOM DSC-34<br>Which of the followings are the purposes of the gain adjustment on the Weather Radar?<br>I-To observe the less reflective clouds at high altitude for threat evaluation.<br>II-To observe the greatest area of threat of convective cells reflecting a lot of red areas at lower levels.<br>III-To observe the areas where lightning strikes are located.", options: ["I", "I, II", "II, III", "I, II, III"], answer: "I, II" },
            { q: "REF: A320 FCTM-AS-WXR<br>If you encounter heavy rain conditions ahead of aircraft path, which setting can help the crew to identify heaviest rainfall area?", options: ["Increase gain will help the flight crew", "Reduce gain will help the flight crew", "Manual gain adjustment is irrelevant", "Crew must continue with gain manual adjustment after analysis and area passed"], answer: "Reduce gain will help the flight crew" },
            { q: "Note: Full tank capacity is 200 kg", img: "annexes/examIV/examIV_annex27.png", options: ["25", "80", "75", "50"], answer: "75" },
            { q: "REF: FCOM PRO-NOR-SOP<br>Descent Profile Optimization (DPO) availability shall also be checked from during preliminary cockpit preparation.", options: ["QRH", "FCTM", "MEL", "AFM"], answer: "QRH" },
            { q: "REF: FCOM GEN<br>If there is an OEB effecting the ECAM procedure,", options: ["The flight crew must disregard the ECAM procedure and must apply the QRH's OEB procedure instead.", "The flight crew must disregard the OEB procedure and must apply the ECAM procedure instead.", "Neither ECAM procedure nor OEB procedure shall be performed.", "Both ECAM and OEB procedures must be performed"], answer: "The flight crew must disregard the ECAM procedure and must apply the QRH's OEB procedure instead." },
            { q: "Ref: PR.70.003<br>Which one of the followings is correct about cockpit entry and exit procedure?", options: ["Cabin crew can use Access Code during normal operation.", "Flight crew may open flight deck door during boarding in any case", "Main communication tool is PA during normal operation", "The \"Keypad\" available close to the flight crew compartment door at the forward cabin shall be used only in emergencies."], answer: "The \"Keypad\" available close to the flight crew compartment door at the forward cabin shall be used only in emergencies." },
            { q: "Ref: EK.10.73.001 Chapter 8.2<br>Which one of the followings are special category of passenger?<br>I. Persons with reduced mobility<br>II. Deportees<br>III. Inadmissible passengers<br>IV. Supernumeraries<br>V. Prisoners in custody", options: ["Only I", "II, III and V", "II and III", "I, II, III and V"], answer: "I, II, III and V" },
            { q: "Which one of the followings are a part of Hijacking Resolution Phase?", options: ["Instill fear, establish control", "Negotiation, liberation", "De-humanize hostages, communication with crew", "Despair, boredom"], answer: "Negotiation, liberation" },
            { q: "REF: A320 FCOM-DSC-70<br>When you use Dual Cooling Function for NEO aircrafts, which of the following is correct?", options: ["Activate this function with Air Starter Unit for engine start", "Crew may use Dual Cooling without aerodrome altitude restriction", "After Engine master lever is on, crew can still use Dual Cooling if forget to push before", "After receiving Dual Cooling Not Avail on ECAM, crew may reset this functiomin some aircraft according to QRH"], answer: "After receiving Dual Cooling Not Avail on ECAM, crew may reset this functiomin some aircraft according to QRH" },
            { q: "REF: FCOM DSC-35<br>Which of the following is correct about the fixed oxygen system for cockpit in A320-21 NEO aircrafts?", options: ["One oxygen cylinder supplies oxygen to all occupants.", "Two oxygen cylinder supply oxygen to all occupants. One for the Captain and 3rd occupant. The other for the First Officer and 4th occupant.", "Three oxygen cylinder supply oxygen to all occupants. One for the Captain, one for the First Officer, one for the 3rd and 4th occupants.", "Four oxygen cylinder supply oxygen to all occupants."], answer: "One oxygen cylinder supplies oxygen to all occupants." },
            { q: "REF FCOM - AIRCRAFT SYSTEMS<br>CPDLC and ADS-C are datalink services associated with FANS (Future Air Navigation Systems), Communication can be established;<br>I. VHF<br>II. HF<br>III. SATCOM", options: ["I", "I, II", "I, II, III"], answer: "I, II, III" },
            { q: "REF: FCOM - AIRCRAFT SYSTEMS<br>Which one of the options are part of the ADS-C event contract types?<br>I. Waypoint change event<br>II. Level range deviation event<br>III. Lateral deviation event<br>IV. Vertical rate change event", options: ["I, II", "I, II, III", "II, III, IV", "All of the above"], answer: "All of the above" },
            { q: "Ref Jeppesen<br>Where can you check whether CPDLC is mandatory in a specific airspace?", options: ["Aircraft maintenance log", "Jeppesen", "ATIS broadcast", "Flight crew briefing package"], answer: "Jeppesen" },
            { q: "REF: OM Part-A Chapter 8.1<br>When a flight plan is changed, ID number in OFP section is updated. What is the correct action for flight crew in case of OFP changes?", options: ["The OFP which is held by flight crew is the valid OFP. No action is required", "Flight crew should update plan ID in OFP manually. No further action is required", "Flight crew shall contact with dispatch and request latest OFP via EFB/ACARS or as printed, check the route, alternate aerodromes and required fuel accordingly.", "Flight crew should send the a photo of the OFP to dispatch office via e-mail"], answer: "Flight crew shall contact with dispatch and request latest OFP via EFB/ACARS or as printed, check the route, alternate aerodromes and required fuel accordingly." },
            { q: "REF: A320 FCOM DSC-34<br>Which of the followings are correct about the BUSS (Backup Speed Scale) and DBUS (Digital Backup Speed)?<br>I-BUSS shall be used below FL250<br>II-DBUS has no altitude limitation to use.<br>III-In case of DBUS fault, BUSS replaces the DBUS", options: ["I", "I, II", "I, III", "II, III"], answer: "I, II" },
            { q: "REF: OM Part-A Chapter 8.1<br>Which of the following statements is correct about usage of Self Dispatch Guide?", options: ["Usage of Self Dispatch Guide is recommended for all flights", "Self Dispatch Guide should only be used in special operation required flights such as ETOPS", "If destination aerodrome planned runway is short, there's no need to use Self Dispatch Guide", "If departure and arrival time is within daytime, Self Dispatch Guide items may be disregarded"], answer: "Usage of Self Dispatch Guide is recommended for all flights" },
            { q: "OM PART A 8.1<br>Which of the following statements are correct in terms of flight planning?<br>I-For precision approach only the RVR/CMV/Visibility (also a particular ceiling if required by the state authority) shall be at or above minima.<br>II-For a non-precision approach and/or circling approach both the visibility/CMV and VV/ceiling shall be at or above minima.<br>III-FEW and SCT METAR/TAF codes are taken into account for determining ceiling.<br>IV-BKN and OVC METAR/TAF codes are taken into account for determining ceiling.", options: ["I, III", "II, IV", "I, II, III", "I, II, IV"], answer: "I, II, IV" },
            { q: "REF: OM Part-A 8.1<br>Before the flight you're checking the briefing package. Which of the following factors should be considered while determining the amount of fuel required?<br>I-Expected traffic at departure<br>II-Existence of ground power unit at destination station.<br>III-Weather conditions at departure - enroute - arrival.<br>IV-NOTAM at departure - enroute - arrival.<br>V-MEL restrictions<br>VI-Taxi time at destination", options: ["I-II-III-V", "I-III-IV-V", "I-III-V-VI", "All the factors written above should be considered."], answer: "I-III-IV-V" },
            { q: "Which of the following statements are correct in terms of flight planning?<br>I-Significant Weather Charts are valid for +/- 6 hours.<br>II-When the flight plan shows \"DCT\" instead of a STAR or a transition name, flight crew should check if the RNAV transition waypoints are manually added to the flight plan by dispatchers<br>III-For Category C aerodromes, verbal briefing with dispatch must be carried out. For other aerodromes self dispatch guide can be used.<br>IV-Flight crew may reach duty dispatcher via THY internal phone by dialing 15888 and entering the flight number with asterisks.", options: ["I-II", "II-III", "II-III-IV", "All of Above"], answer: "II-III-IV" },
            { q: "REF: JEPPESEN AIRWAY MANUAL<br>While checking the briefing package, you see that a part of the airspace is closed. Which part of the briefing package gives you this information?", options: ["Operational Flight Plan", "FIR Notams", "Significant Weather Chart", "RAIM Report Page"], answer: "FIR Notams" },
            { q: "Correct Action?", img: "annexes/examIV/examIV_annex28.png", options: ["No action is required because flight planning system does not take the MEL items into account", "You should call dispatch and reduce the fuel on board.", "You should call dispatch and confirm the validity of MEL item because it is expected that flight planning system considers the MEL restriction, displays it on MEL/CDL ITEMS", "No action is required if it is not displayed in MEL/CDL ITEMS section"], answer: "You should call dispatch and confirm the validity of MEL item because it is expected that flight planning system considers the MEL restriction, displays it on MEL/CDL ITEMS" },
            { q: "While checking the weather page of the briefing package, what is the correct way to determine the suitability of airports in OFP in terms of weather?", img: "annexes/examIV/examIV_annex29.png", options: ["All of the weather information displayed in weather page shall be considered regardless of the time periods", "It is enough to check departure and destination weather because only departure and destination airport weather information is required to determine the suitability.", "Weather information of all of the aerodromes displayed in OFP (departure, destination, alternates) shall be checked according to the suitability time periods.", "Only METAR section of weather information shall be checked. Checking of TAF section is not mandatory because TAF is used for advisory."], answer: "Weather information of all of the aerodromes displayed in OFP (departure, destination, alternates) shall be checked according to the suitability time periods." },
            { q: "Action to be taken in this situation?", img: "annexes/examIV/examIV_annex30.png", options: ["Flight crew must check NAV LOG of OFP to be sure that arrival procedure is correctly coded", "Flight crew must accept this as a planning error, no action is required", "No action is required. Flight crew must be ready for a visual approach after NAPSA point.", "No action is required. Flight crew must plan to fly to a NAVAID after NAPSA point and plan a conventional approach procedure"], answer: "Flight crew must check NAV LOG of OFP to be sure that arrival procedure is correctly coded" },
            { q: "REF: Part A 8.1.10<br>What is the reason of difference between two Minimum Clearance Altitudes even if the same routing is used for both?", options: ["Higher one assumes aircraft will fly the pax oxygen profile in case of decompression", "Lower one shows minimum clearance at the point of maximum terrain along the route", "Higher one shows minimum clearance in case of applying obstacle strategy", "Lower one assumes aircraft will fly driftdown profile in case of engine failure"], answer: "Higher one shows minimum clearance in case of applying obstacle strategy" },
            { q: "According to the NOTAM and at night conditions with all aircraft systems operating, which of the following approaches can be executed?", img: "annexes/examIV/examIV_annex31.png", options: ["ILS 10R", "VOR 27R", "LOC 09R", "ILS 27R"], answer: "ILS 27R" },
            { q: "Where can we obtain information to identify the adequate aerodromes on our route?", options: ["Aerodrome Categorization List", "Airport And Aircraft Conformity Reference List", "Jeppesen Airport Directory Section", "Aerodrome Information Notes"], answer: "Airport And Aircraft Conformity Reference List" },
            { q: "REF: OM Part-A Chapter 8.1<br>Refer to the OFP given above. Destination route section on OFP is displayed as \"NAPSA DCT EDDM08L\"<br>During dispatch phase, what is the correct action to be taken in this situation?", img: "annexes/examIV/examIV_annex32.png", options: ["Flight crew must check NAV LOG of OFP to be sure that arrival procedure is correctly coded", "Flight crew must accept this as a planning error, no action is required.", "No action is required. Flight crew must be ready for a visual approach after NAPSA point."], answer: "Flight crew must check NAV LOG of OFP to be sure that arrival procedure is correctly coded" },
            { q: "REF: A320 FCOM <br>What is the correct maneuver to activate SOFT GA Function in NEO A\\C?", options: ["Set THRUST LEVERS TOGA", "Set THR LEVERS TOGA then CLB", "Set THR LEVERS TOGA then FLX/MCT", "Set THR LEVERS THR MCT"], answer: "Set THR LEVERS TOGA then FLX/MCT" },
            { q: "Which following conditions are necessary to engage soft go-around<br>I-All engines are operative<br>II-The slats/flaps are extended<br>III-The aircraft is below the go-around thrust reduction altitude<br>IV-The aircraft is in flight and not performing a touch and go", options: ["Only I", "I- III", "II-IV", "I-II-III-IV"], answer: "I-II-III-IV" },
            { q: "REF: OM PART-B Chapter 7<br>Total traffic load is the total weight of<br>I - Passengers<br>II - Baggage<br>III- Cargo", options: ["I-II", "I-III", "I-II-III", "II-III"], answer: "I-II-III" },
            { q: "REF: OM PART-B Chapter 7<br>Basic Weight (BW) does not include", options: ["Crew members", "Removable passenger service equipment", "Flight deck and aircraft documents, passenger emergency cards and Skylife magazines, etc", "Tare empty weight of all trolleys and galley equipment (hot-cup, hot-jug, etc.)"], answer: "Crew members" },
            { q: "Which statement is correct regarding the supplementary procedure not related to...", options: ["The procedure should be read first then should be applied by memory.", "The procedure should be read first then the PM reads the actions, and the PF acts on the controls.", "The procedure may be performed by memory.", "The procedure should be applied in accordance with the READ and DO principle. The PM reads the procedure"], answer: "The procedure should be applied in accordance with the READ and DO principle. The PM reads the procedure" }
        ],
        part_a_old: [
            { q: "Which explanation is the best definition for OM PART A contents?", options: ["It is designed and developed in accordance with the guidelines of safe operating policies, procedures and techniques as published by manufacturers or authorities for all aeroplane types currently operated by Turkish Airlines", "It contains the operational policies, instructions and procedures required for a safe operation. It explains the duties and responsibilities of all ground and flight operations personnel and their interrelationship to the operations as a whole in detail. It is issued in accordance with the Turkish DGCA Requirements", "It comprises all instructions and information needed for the area of operation", "It comprises training and contains all training instructions and qualifications required for a safe operation."], answer: "It contains the operational policies, instructions and procedures required for a safe operation. It explains the duties and responsibilities of all ground and flight operations personnel and their interrelationship to the operations as a whole in detail. It is issued in accordance with the Turkish DGCA Requirements" },
            { q: "If the restrictions specified within OM PART A are Turkish Airlines' standards, in case of natural disaster, humanitarian flight and national security reasons an exemption may be made by the approval of …………..", options: ["Chief Flight Operations Officer", "Fleet Manager", "Safety Manager", "Quality Manager"], answer: "Chief Flight Operations Officer" },
            { q: "What is the definition of decision height?", options: ["The height above the ground or water of the base of the lowest layer of cloud below 6000m (20000ft) covering more than half of the sky", "The lowest altitude or height which may be used which will provide a minimum clearance of 300 m above all objects located in the area", "The height 1 000 ft above the terrain within a distance of 10 NM", "With respect to the operation of aircraft, means the wheel height above the runway elevation by which a go around must be initiated unless required visual reference has been established and the aircraft position and approach path have been visually assessed as satisfactory to continue the approach and landing in safety"], answer: "With respect to the operation of aircraft, means the wheel height above the runway elevation by which a go around must be initiated unless required visual reference has been established and the aircraft position and approach path have been visually assessed as satisfactory to continue the approach and landing in safety" },
            { q: "A pilot responsible for the operation and safety of an aircraft during flight time is called:", options: ["Pilot Flying (PF)", "Pilot Monitoring (PM)", "Pilot Non Flying (PNF)", "Pilot-in-Command (PIC)"], answer: "Pilot Non Flying (PNF)" },
            { q: "Aerodrome Operating Minima: The limits of usability of an aerodrome for either take-off or landing, usually expressed in terms of runway visual range (RVR) or visibility, Decision Altitude/Height (DA/H), Minimum Descent Altitude/Height (MDA/H) and cloud conditions. Thus, an instrument approach which is flown as a stabilized approach, on a predetermined approach slope that enables a continuous descent to the minimum altitude / height applicable to the approach is called:", options: ["Precision Approach", "Low Visibility Procedures (LVP)", "Continuous Descent Final Approach (CDFA)", "Exemption"], answer: "Continuous Descent Final Approach (CDFA)" },
            { q: "Which of the following statement is not correct about contaminated runway?", options: ["Landing Distance Available (LDA): The length of the runway which is declared available by the appropriate Authority and suitable for the ground run of an aeroplane landing.", "Minimum Equipment List (MEL): A list established for a particular aircraft type by the manufacturer with the approval of the State of Manufacture containing items, one or more of which is permitted to be unserviceable at the commencement of a flight. The MMEL may be associated with special operating conditions, limitations or procedures.", "Low Visibility Procedures (LVP): Procedures applied at the aerodrome for the purpose of ensuring safe operation during CAT II/III approaches and Low Visibility Take-offs.", "Flight crew member: Any pilot assigned to duty in an aircraft during flight time."], answer: "Minimum Equipment List (MEL): A list established for a particular aircraft type by the manufacturer with the approval of the State of Manufacture containing items, one or more of which is permitted to be unserviceable at the commencement of a flight. The MMEL may be associated with special operating conditions, limitations or procedures." },
            { q: "Contaminated Runway is a runway is considered contaminated when more than 25% of the runway area within the required length and width being used is covered by the following:<br><br>1. surface water more than ___ (I) mm (___ (I) in) deep, or by slush or loose snow, equivalent to more than ___ (II) mm (___ (II) in) water;<br>2. snow which has been compressed into a solid mass which resists further compression and will hold together or break into lumps if picked up (compacted snow); or<br>3. ice, including wet ice.<br><br>Please fill in the blanks with the appropriate values.", options: ["I: 3 mm - 0.125 in / II: 6 mm - 0.25 in", "I: 3 mm - 0.125 in / II: 3 mm - 0.125 in", "I: 3 mm - 0.125 in / II: 12 mm - 0.5 in", "I: 6 mm - 0.25 in / II: 6 mm - 0.25 in"], answer: "I: 3 mm - 0.125 in / II: 3 mm - 0.125 in" },
            { q: "………….. is a manual associated with the certificate of airworthiness that contains information (limits, procedures, data, etc.) required to operate the aeroplane at the level of safety established by the aeroplane's certification basis.", options: ["Minimum Equipment List", "Cockpit Supplementary Performance Data", "Aeroplane Flight Manual / Flight Manual", "Configuration Maintenance Procedures"], answer: "Aeroplane Flight Manual / Flight Manual" },
            { q: "Which of the following abbreviations and explanations below is/are correct?<br>I. MOCA: Minimum Obstacle Control Altitude<br>II. Automatic Terminal Information Service: ATIS<br>III. SID: Standard Instrument Departure Route<br>IV. Airborne Collision Avoidance System: ABCAS", options: ["I-II-III", "II-III", "I-III-IV", "II-IV"], answer: "II-III" },
            { q: "Which one of the following is NOT correct about instructional wording used within OM Part A?", options: ["“Shall”, “Must”, “Have to” is mandatory and must always be observed", "“Should” represents a procedure or a provision that is recommended", "“May” represents a procedure or a provision that is optional", "“Shall Not” may be considered as an optional provision"], answer: "“Shall Not” may be considered as an optional provision" },
            { q: "Which department is responsible for updating, editing and publishing OM Part A?", options: ["The Flight Operations Coordination Manager", "Chief Flight Operations Officer(Post Holder)", "Senior Vice President, Quality Assurance", "Senior Vice President Flight Operations"], answer: "The Flight Operations Coordination Manager" },
            { q: "………….. is an aerodrome at which an aircraft would be able to land after experiencing an abnormal or emergency condition during en-route phase of the flight.", options: ["Take-off alternate", "Destination alternate", "Adequate alternate", "En-route alternate"], answer: "En-route alternate" },
            { q: "In case of “Go-Around” call-out by any pilot in the flight deck, PF shall:", options: ["Continue landing if he deems it is the safe course of action", "Ask the reason then decide on his own", "Initiate a go-around maneuver without questioning and assess the situation during level flight", "Disregard any suggestions during critical phases of flight"], answer: "Initiate a go-around maneuver without questioning and assess the situation during level flight" },
            { q: "Which one of the following is true? (1.4)", options: ["Commander has the authority to disembark any passenger, which in his opinion, may represent a potential hazard to the safety of the aeroplane or its occupants.", "Commander has the authority to disembark any person, or any part of the cargo, which in his opinion, may represent a potential hazard to the safety of the aeroplane or its occupants, except government personnel", "Commander has the authority to disembark any person, or any part of the cargo, which in his opinion, may represent a potential hazard to the safety of the aeroplane or its occupants.", "Commander has the authority to disembark any person, or any part of the cargo, which in his opinion, may represent a potential hazard to the safety of the aeroplane or its occupants upon coordination with IOCC."], answer: "Commander has the authority to disembark any person, or any part of the cargo, which in his opinion, may represent a potential hazard to the safety of the aeroplane or its occupants." },
            { q: "Which of the statements below is not a duty and responsibility of the commander?", options: ["Commander is accountable to the Chief Flight Operations Officer (Post-Holder) for the safe, timely and efficient execution of his duties and responsibilities", "Commander shall, in an emergency which requires immediate decision and/or action, take any action he considers necessary and if required, may deviate from rules, operational procedures and methods in the interest of flight safety.", "Commander, whether manipulating the controls or not, is responsible for the operation of the aeroplane in accordance with the rules, methods and procedures prescribed in the Turkish Airlines Operations Manuals.", "Commander shall verify emergency equipment required for the flight is available."], answer: "Commander is accountable to the Chief Flight Operations Officer (Post-Holder) for the safe, timely and efficient execution of his duties and responsibilities" },
            { q: "Which of the statements below is not a responsibility of the co-pilot?", options: ["To carry out take-offs and landings under the supervision of the Commander", "To observe the Standard Operating Procedures and inform the Commander of any deviation from the Standard Operating Procedures", "To assign a cabin crew member to the flight deck to be seated in the jump-seat when a flight crew member (consisting of a minimum of two) needs to leave the cockpit for any reason", "To vigorously monitor the critical phases of flight, specifically take-off, approach and landing. He shall inform the Commander if there are any deviations from safe standards of operation"], answer: "To assign a cabin crew member to the flight deck to be seated in the jump-seat when a flight crew member (consisting of a minimum of two) needs to leave the cockpit for any reason" },
            { q: "Which one of the following statements below is the responsibility of the commander?<br>I. Commander has the authority to give commands as deemed necessary for the purpose of securing the safety of the aeroplane, persons and property carried therein.<br>II. Commander shall ensure that the provisions specified in the operations manual in respect of fuel, oil and oxygen requirements, minimum safe altitudes, aerodrome operating minima and availability of alternate aerodromes, where required, can be complied with for the planned flight<br>III. Commander shall ensure that the pre-flight inspection has been carried out;<br>IV. Commander shall prepare the trip folder (all applicable weather information, NOTAMs, and route meteorological charts) in accordance with the set Turkish Airlines standard requirements", options: ["I-II-III-IV", "I-II", "I-II-III", "II-III-IV"], answer: "I-II-III" },
            { q: "Turkish Airlines' Flight Crew Members are …………….to fly for or to accept flight duties other than Turkish Airlines' unless they are authorized by the Authority and/or Turkish Airlines.", options: ["Not allowed", "Allowed", "Responsible", "Able"], answer: "Not allowed" },
            { q: "Which of the item below is not a responsibility of commander?", options: ["Commander has the authority to apply greater safety margins if he deems necessary.", "Ensure that the correct type of fuel, oil and oxygen is loaded and usable in sufficient quantity to meet the requirements for the proposed flight", "Ensure that the pre-flight inspection has been carried out", "To inform flight crew if any flight crew member has OML endorsement"], answer: "To inform flight crew if any flight crew member has OML endorsement" },
            { q: "The Co-Pilot ………….take control of the aircraft if he is convinced that the Commander's actions endanger flight safety.", options: ["Shall not", "Shall", "Never", "Can not"], answer: "Shall" },
            { q: "Who is responsible for safety, security and quality outcomes, including implementation and monitoring of safety and quality activities and processes?", options: ["CEO & President", "Senior Vice President, Quality Assurance", "Chief Flight Operations Officers", "Senior Vice President, Corporate Safety"], answer: "Senior Vice President, Quality Assurance" },
            { q: "Jump seat/observer briefing consists of:<br>I. Taxi procedures<br>II. Emergency descent<br>III. Sterile cockpit<br>IV. General behavior<br>Which of the following statements above is/are correct?", options: ["II-III", "I-II", "II-III-IV", "I-III-IV"], answer: "II-III-IV" },
            { q: "In Turkish Airlines who is flight operations post holder?", options: ["Chief Pilot", "Accountable Manager", "Chief Flight Operations Officer", "Director of Operations Coordination"], answer: "Chief Flight Operations Officer" },
            { q: "How many nominated post-holders are there in Turkish Airlines?", options: ["1", "2", "5", "10"], answer: "5" },
            { q: "Flight Safety Manager reports to …………..", options: ["CEO & President", "Chief Pilot", "SVP of Flight Training", "Board of Directors"], answer: "CEO & President" },
            { q: "Who delegates his authority to the Commander?", options: ["CEO & President", "Chief Pilot", "Board of Directors", "Chief Flight Operations Officer"], answer: "Chief Flight Operations Officer" },
            { q: "When does Commander's responsibility for safety of all crew members, passenger and cargo starts?", options: ["From the moment he is signed in for duty.", "From the moment he embarks on board.", "From the moment the doors are closed.", "From the moment the aeroplane moves under its own power for the purpose of taxiing for take-off."], answer: "From the moment he embarks on board." },
            { q: "When does Commander's responsibility for operation starts?", options: ["From the moment he is signed in for duty.", "From the moment he embarks on board.", "From the moment the doors are closed.", "From the moment the aeroplane moves under its own power for the purpose of taxiing for take-off."], answer: "From the moment the aeroplane moves under its own power for the purpose of taxiing for take-off." },
            { q: "Commander …………..", options: ["should only comply with laws and regulations of his certifying state.", "has authority to apply greater safety margins if he deems necessary.", "has authority to cancel a flight.", "may not deviate from rules, operational procedures in the interest of flight safety."], answer: "has authority to apply greater safety margins if he deems necessary." },
            { q: "Authority of diversion of a flight rests with the Commander or ……. As applicable, various factors are involved for the diversion of a flight. Any decision concerning flight safety rests solely with the Commander, but for operational reasons, IOCC may suggest the.............. to divert to a specific airport.", options: ["IOCC/ATC", "IOCC/Commander", "ATC/ Fleet Manager", "ATC/……"], answer: "IOCC/Commander" },
            { q: "What are the minimum items that shall be covered during pre-flight crew briefing?<br>I. Establish effective communication between the flight crew and other crew members. Specific emphasis shall be made on the guidelines for the use of the Public Address (PA) and interphone systems.<br>II. Guidelines for the use of the flight deck door.<br>III. Discuss items that may be of concern during flight, such as turbulence, smoking.<br>IV. Brief the crew as to the current security status of the flight and how security incidents are to be handled.<br>V. Discuss items of routine interest, such as flight time, altitude, route of the flight, and any other specific items relating to the safety requirements for the flight concerned.", options: ["I, II, III, V", "II, III, IV, V", "I, II, III, IV, V", "I, II, III, IV"], answer: "I, II, III, IV, V" },
            { q: "Which one of the following statements below is the responsibility of the dispatcher?<br>I. To confirm the total amount of fuel required for the flight in accordance with OM Part A requirements.<br>II. To report to the Commander any conditions which he believes may affect the safe conduct of the flight.<br>III. To provide information about performance restrictions due to an aeroplane technical status or aerodrome NOTAMs.<br>IV. To initiate relevant procedures in the event of an emergency.", options: ["I,II,III", "I,II", "I,II,III,IV", "II,III"], answer: "I,II,III,IV" },
            { q: "The following restrictions shall be taken into account when considering an early departure:<br>1. CTOT, issued slots, or curfews;<br>2. Operational night restrictions;<br>3. NOTAMs with operational restrictions (ex. runway closures); and<br>4. Other relevant limitations.<br><br>Thus, how much time do you need to be made departures with the approval of IOCC prior to the scheduled departure time?", options: ["5 minutes or greater", "11 minutes or greater", "30 minutes or greater", "21 minutes or greater"], answer: "11 minutes or greater" },
            { q: "Even if, Flight Operations Department shall continuously monitor the flight crew member qualifications and certification, each license and certificate holder is......... for retaining issued licenses and certificates valid", options: ["Not responsible", "Responsible", "Eager", "Mandatory"], answer: "Responsible" },
            { q: "If Turkish Airlines ceases to be the operator of that aeroplane or the employer of that crew member:", options: ["Turkish Airlines shall cancel the license of that crew member", "Turkish Airlines shall preserve the information used for the preparation and execution of a flight and personnel training records", "Turkish Airlines shall sell the information of that aeroplane and that crew member", "Turkish Airlines shall not preserve the information used for personnel training records"], answer: "Turkish Airlines shall preserve the information used for the preparation and execution of a flight and personnel training records" },
            { q: "Which of the documents below used for the preparation of the flight?<br>I. Operational Flight Plan (OFP)<br>II. Mass and balance documentation<br>III. Current maps, charts and associated documents<br>IV. Dispatch release form<br>V. Notice(s) to airmen(NOTAM)", options: ["I-II-III-IV-V", "I-III-V", "I-II-III-V", "I-III"], answer: "I-II-III-IV-V" },
            { q: "Which of the documents below stored in post flight?<br>I. Operational Flight Plan (OFP)<br>II. CAT II/III Approach Report Form<br>III. Aeroplane Security Search Checklist<br>IV. Mass and balance documentation", options: ["I-III-IV", "I-IV", "I-II-III-IV", "III-IV"], answer: "I-III-IV" },
            { q: "The.................... recordings may not be used for purposes other than for the investigation of an accident or incident subject to mandatory reporting except with the consent of all crew members concerned.", options: ["Cockpit Voice Recorder", "Flight Director and communication", "Auto throttle", "Auto pilot"], answer: "Flight Director and communication" },
            { q: "Who is the authority for consolidation of flights?", options: ["Regional Station Manager", "Commander", "IOCC", "Chief Flight Operations Officer"], answer: "IOCC" },
            { q: "Who is the authority for termination of a flight?", options: ["Regional Station Manager", "IOCC", "Commander", "Chief Flight Operations Officer"], answer: "Commander" },
            { q: "Authority rests with the ………., Regional Station Manager or...... for delaying of a flight.<br>Note: As applicable, various factors are involved for the delaying of a flight", options: ["Commander/ IOCC", "First officer/ATC", "DGCA/ Commander", "ATC/ IOCC"], answer: "Commander/ IOCC" },
            { q: "In-flight assistance shall be provided when requested by the Commander or whenever information becomes available to IOCC or OPSC which is significant for the safe and efficient conduct of a flight. In-flight assistance shall comprise of:<br>I. Information on any unusual situations such as strike, riots, war and unlawful interference.<br>II. NOTAM, SNOWTAM, ASHTAM and navigational warnings<br>III. Meteorological information (especially SIGMETs)", options: ["I-II", "I-III", "II-III", "I-II-III"], answer: "I-II-III" },
            { q: "In case of operational irregularities, upon completing the required coordination with the applicable departments and offices, IOCC shall take the necessary actions (operational and/or precautionary). In case of operational irregularities, decision making process shall be based on the following principles:<br>I. Safety factors of flight operations shall never be endangered<br>II. Passengers, cargo and mail shall reach the final destination with minimum delay<br>III. Loss of revenue and/or additional expenses should not be considered", options: ["I-II", "I-III", "II-III", "I-II-III"], answer: "I-II-III" },
            { q: "Which item below is not a acceptable reason for delayed flights?", options: ["passenger boarding(whatever the reasoning)", "technical defect deemed necessary by the Commander for the safe conduct of the flight", "to accept Aircraft on Ground (AOG) spare parts for Turkish Airlines grounded aeroplanes.", "Safety assessment of foreign aircraft without high importance finding"], answer: "Safety assessment of foreign aircraft without high importance finding" },
            { q: "Which item below is not a reason for early departure of a flight?", options: ["no additional cargo or mail is expected for the flight", "to avoid certain meteorological or other conditions which may adversely affect the operation of the flight.", "to extend the transit time at the next station provided that no revenue loads are left behind", "Decision of flight dispatcher"], answer: "Decision of flight dispatcher" },
            { q: "All flights shall be planned and conducted in the following order:", options: ["Safety then, operational schedule, economical criteria, passenger comfort.", "Safety then, passenger comfort, operational schedule, economical criteria.", "Safety then, economical criteria, passenger comfort, operational schedule.", "Safety then, passenger comfort, operational schedule, economical criteria."], answer: "Safety then, economical criteria, passenger comfort, operational schedule." },
            { q: "For how long copies of communications records between IOCC and the aeroplane (radio, written, etc.) shall be retained?", options: ["1 Month", "6 months", "3 months", "9 months"], answer: "3 months" },
            { q: "Up to how many minutes prior to scheduled departure time, a flight may depart with the mutual agreement of the Commander and the station representative, without the approval of IOCC?", options: ["20 minutes", "15 minutes", "11 minutes", "10 minutes"], answer: "10 minutes" },
            { q: "What are the acceptable reasons for delayed flights:<br>I. To avoid adverse meteorological conditions at the departure aerodrome, en-route or at the aerodrome of destination (This reasoning is under the direct decision of the Commander),<br>II. Passenger boarding (whatever the reasoning),<br>III. Technical defect rectification as indicated in the AML or as deemed necessary by the Commander for the safe conduct of the flight,<br>IV. To accept Aircraft on Ground (AOG) spare parts for Turkish Airlines grounded aeroplanes", options: ["I, III, IV", "I, II, III", "I, III", "I, II, III, IV"], answer: "I, II, III, IV" },
            { q: "Flights may depart up to ……. minutes prior to the scheduled departure time with the mutual agreement of the Commander and the station representative. On the other hand, departures of ……… minutes or greater prior to the scheduled departure time shall only be made with the approval of IOCC. The station representative shall coordinate the issue and inform the Commander accordingly.", options: ["5/10", "10/11", "15/20", "20/25"], answer: "10/11" },
            { q: "For all aeroplane types operated by Turkish Airlines, standard flight crew composition shall consist of a minimum flight crew composition of two flight crew members as follows:", options: ["One commander and one cabin crew member", "Two co-pilots", "One commander and one co-pilot", "One commander and one load master"], answer: "One commander and one co-pilot" },
            { q: "Which option defines minimum crew composition for initiating boarding on a A320/B737NG aeroplane when passenger seats to be occupied is 95? (4.1)", options: ["A co-pilot, cabin crew chief and a cabin crew.", "A co-pilot and 2 cabin crew.", "Commander and 2 cabin crew.", "Commander, cabin crew chief and a cabin crew."], answer: "Commander, cabin crew chief and a cabin crew." },
            { q: "During actual Low Visibility Operations or ………….. operations, or when deemed necessary, the Designated Commander shall be seated in the left hand seat conducting the flight as the Pilot Flying (PF).", options: ["Short runway", "Narrow runway", "Short and narrow runway", "Special"], answer: "Short and narrow runway" },
            { q: "Which one of the following is NOT true considering a flight crew composition which contains a member with an OML endorsement?<br>The remaining flight crew member:", options: ["Shall not be over the age of 60", "Shall not be subject to an OML", "May be subject to an OML if he is under the age of 60", "If he is a Co-pilot, shall have at least 300 flight hours excluding simulator flight time"], answer: "May be subject to an OML if he is under the age of 60" },
