            { q: "Which one of the following is FALSE concerning braking action and surface wind components and limitations?", options: ["Braking action shall be classified as GOOD or above for all narrow runway operations.", "With one of the spoiler, anti-skid or reverser systems inoperative, take-off and landing shall not be conducted on runways with medium/poor braking coefficient conditions.", "Flight operations shall not commence or be conducted if the reported speed of surface wind including the gust factor is above 50 kts.", "Aeroplane can be dispatched for flight with braking action classified as POOR with the commander's discretion."], answer: "Aeroplane can be dispatched for flight with braking action classified as POOR with the commander's discretion." },
            { q: "If the appropriate weather reports or forecasts, prefixed by BECMG, for the destination aerodrome, indicate that during a period commencing 1 hour before and ending 1 hour after the estimated time of arrival, the weather conditions will be below the applicable planning minima: (Operational interpretation of forecast information)", options: ["The aerodrome shall not be classified as below minima but shall be classified as operationally significant.", "The flight can be dispatched with one destination alternate.", "Based on operational experience a minimum of 15 minutes of extra holding fuel is required.", "The aerodrome shall be classified as below minima."], answer: "The aerodrome shall be classified as below minima." },
            { q: "Which one of the following is FALSE considering contingency fuel?", options: ["It may be the fuel to fly for five minutes at holding speed at 1500ft above the destination aerodrome in standard conditions.", "It is commander's discretion.", "It may be 5% of the planned trip fuel.", "It may be reduced to 3% of the planned trip fuel if the location of the En-Route alternate aerodrome is appropriate."], answer: "It is commander's discretion." },
            { q: "Which one of the following is FALSE to complete the statement below?<br>\"Information in forecasts prefixed by '____', indicating below minima for the applicable time period shall not be classified as below minima but shall be classified as operationally significant.\"<br>(Operational interpretation of forecast information)", options: ["BECMG", "PROB", "PROB 30/40", "PROB TEMPO"], answer: "BECMG" },
            { q: "For planning purposes within the Commonwealth of Independent States (C.I.S) and Peoples Republic of China, based on operational experience, information in forecasts prefixed by “TEMPO”, indicating below minima for the applicable time period shall not be classified as below minima but shall be classified as operationally significant.", options: ["True", "False", "Only for Peoples Republic of China", "Only for Russia"], answer: "True" },
            { q: "Which one of the following is correct regarding operations classified as operationally significant?<br>(Operational interpretation of forecast information)", options: ["Allocated fuel shall consist of a minimum of 60 minutes of extra holding fuel in addition to the OFP requirements.", "If fuel allocation is limited due to aeroplane operational weights, payload shall be reduced to compensate for the required fuel.", "Both are correct."], answer: "Both are correct." },
            { q: "Final reserve fuel shall be fuel to fly for 30 minutes at holding speed at 1,500 ft above aerodrome elevation in ISA conditions, calculated with ___ at the destination alternate aerodrome or the destination aerodrome when a destination alternate aerodrome is not required or available.", options: ["the maximum landing weight", "the estimated take-off weight", "the maximum zero fuel weight", "the estimated mass on arrival"], answer: "the estimated mass on arrival" },
            { q: "If it is not possible to land at the departure aerodrome due to weather conditions, performance factors or other operational factors, a take-off alternate aerodrome shall be specified in the Official Flight Plan (OFP). Take-off alternate aerodrome (in relation to the departure aerodrome) shall be located within ___ flight time at one engine-inoperative cruising speed in still air standard conditions based on the actual take-off mass, for non etops twin engine aircraft.", options: ["30 minutes", "60 minutes", "90 minutes", "120 minutes"], answer: "60 minutes" },
            { q: "With one of the spoiler, anti-skid or reverser systems inoperative, take-off and landing shall not be conducted on runways with medium/poor braking coefficient conditions. When these systems are operational, what is the maximum crosswind component including gust when braking action is reported medium/poor?<br>(Surface wind components and limitations)", options: ["15 kts", "10 kts", "20 kts", "25 kts"], answer: "10 kts" },
            { q: "For non-narrow runway operations with braking action good or above, if the crosswind value is within limits at the take-off alternate aerodrome, maximum crosswind limit may be increased to ___ for the take-off aerodrome.<br>(Surface wind components and limitations)", options: ["25 kts", "40 kts", "45 kts", "30 kts"], answer: "45 kts" },
            { q: "Information in forecasts prefixed by PROB, PROB 30/40 or PROB TEMPO, indicating below minima for the applicable time period shall not be classified as below minima but shall be classified as operationally significant.<br>(Operational interpretation of forecast information)", options: ["True", "False", "True but only for Commonwealth of Independent States and Peoples Republic of China"], answer: "True" },
            { q: "Contingency fuel can be reduced to ……. of the planned trip fuel if the location of En-Route Alternate aerodrome is appropriate according to criteria depicted in Part A.", options: ["% 5", "% 3", "% 6", "% 7"], answer: "% 3" },
            { q: "What is the required level of firefighting protection for ETOPS Alternate Aerodrome/Fuel En- Route Alternate Aerodrome?", options: ["4", "6", "8", "9"], answer: "4" },
            { q: "Which one of the following is WRONG?", options: ["Normal operations require runway widths of 30.0 m and above.", "Normal operations require runway lengths of 6,500 ft and greater.", "3.5 degrees for CAT I, 3.0 degrees for CAT II/III and 7% for NPAs are the nominal angles/gradient of approach and higher is considered a steep approach.", "Circle-to-land procedure will be applied day light only."], answer: "Normal operations require runway widths of 30.0 m and above." },
            { q: "Whenever reported crosswind component of the runway intended to land is or expected to be more than ………….. kts Pilot in Command shall be the PF.", options: ["25", "20", "15", "10"], answer: "15" },
            { q: "Which one of the following is WRONG regarding narrow runway operations?", options: ["Braking action shall be available and classified as GOOD or above for all narrow runway operations.", "Crosswind limits decrease in proportion with the narrower runway width as compared to the standard runway width (147ft).", "Circle to land is permitted during night operations.", "Flight controls, all wheel braking units, nose wheel steering, Anti-Skid system and all reversers shall be fully operational."], answer: "Circle to land is permitted during night operations." },
            { q: "On short runway operations, tail wind component shall not exceed ………….. knots.", options: ["15", "10", "8", "5"], answer: "5" },
            { q: "Normal operations require runway lengths of ………….. ft. and greater.", options: ["5500 ft", "6000 ft", "6500 ft", "7000 ft"], answer: "6500 ft" },
            { q: "Which of the following is NOT true considering steep approach procedures?", options: ["3.5 degrees for CAT I, 3.0 degrees for CAT II/III and 7% for NPAs are the nominal angles/gradient of approach. An approach with a higher descent angle/gradient is considered a steep approach.", "Steep approach procedures with descent angles greater than 4.0 degrees must be studied by the Flight Operations Risk Assessment Department and approved by Chief Flight Operations Officer (Post Holder) before operations can begin.", "All steep approaches must be flown fully stabilized and in landing configuration beyond the FAF.", "Steep approaches can be flown as decelerated approach as needed."], answer: "Steep approaches can be flown as decelerated approach as needed." },
            { q: "Minimum diversion fuel to an alternate aerodrome shall be the sum of:", options: ["Additional Fuel and Final Reserve Fuel.", "Contingency Fuel and Alternate Aerodrome Fuel.", "Alternate Aerodrome Fuel and Final Reserve Fuel.", "Contingency Fuel and Alternate Aerodrome Fuel and Final Reserve Fuel."], answer: "Alternate Aerodrome Fuel and Final Reserve Fuel." },
            { q: "For flights conducted at or below any of the minimum altitudes, ATC instructions consisting of the phrases \"DIRECT TO\" or \"PROCEED OWN NAVIGATION TO\" are …… and ……. not be classified as radar vectors, therefore terrain and obstacle clearance is at the responsibility of the Commander.", options: ["Not/Shall", "Can/ Should", "…../…..", "May/….."], answer: "Not/Shall" },
            { q: "Take-off and landings shall not be conducted on runway widths of less than ………….. meters.", options: ["25", "30", "35", "40"], answer: "30" },
            { q: "Which one of the following aeroplane systems is not necessary to be fully operational for narrow runway operations?", options: ["Flight controls", "All reversers", "Anti-Skid system", "Auto-Brake System"], answer: "Auto-Brake System" },
            { q: "Short and narrow runway takeoff and landings shall be conducted by ………….. (seated in the left hand seat) ……..", options: ["Commander/Co-pilots (P5-P6 seated in the right hand seat)", "Commanders/…..", "Commanders/ Co-pilots (P3-P4 seated in the right hand seat)", "Only CI, CN"], answer: "Commanders/….." },
            { q: "The minimum RVR for a visual approach operation is _____ m", options: ["1500", "800", "550", "400"], answer: "800" },
            { q: "The departure aerodrome …… selected as the takeoff alternate aerodrome in the OFP.", options: ["Can", "Can not", "Shall", "Should"], answer: "Can not" },
            { q: "ATC issued clearances (departure or arrival) does not constitute permission for operations to/from an aerodrome during… The authority to operate during curfew hours rests with the aerodrome authorities (example: DHMI).", options: ["Curfew hours", "Only night time", "Only day time", "All of above"], answer: "Curfew hours" },
            { q: "Which one of the following is WRONG regarding aerodromes with curfew hours?", options: ["It is the responsibility of the dispatch to ensure that flight operations do not commence to/from an aerodrome during published aerodrome curfew hours. If required, IOCC shall obtain the proper authorization prior to commencing flight operations.", "If unforeseeable circumstances occur after the flight operations commence, it is the responsibility of IOCC to obtain permission from the respective aerodrome authority to operate to/from an aerodrome during curfew hours.", "Once flight operations begin, the Commander shall inform IOCC of the revised ETA to the aerodrome with curfew hours. If unable to contact IOCC, flight shall continue as planned unless advised otherwise.", "ATC issued clearances (departure or arrival) constitute permission for operations to/from an aerodrome during curfew hours."], answer: "ATC issued clearances (departure or arrival) constitute permission for operations to/from an aerodrome during curfew hours." },
            { q: "If the actual ZFW stated on the Load Sheet is different from the estimated ZFW used for the OFP calculations and the Commander believes that this change may result in the airplane landing with less than the amount of fuel required to be onboard:", options: ["He/She will offload cargo or passengers to match the original ZFW.", "He/She will request 500 kg of fuel for each 1000 kg increase in ZFW.", "He/She may decide to request a new OFP based on the actual figures and increase the block fuel accordingly or continue with the original after contacting IOCC.", "He/She will do nothing."], answer: "He/She may decide to request a new OFP based on the actual figures and increase the block fuel accordingly or continue with the original after contacting IOCC." },
            { q: "Any malfunction rising up after engine start up, prior to takeoff or during takeoff run, which leads to an abort or delayed takeoff and is either rectified by the flight crew or disappears on its own:", options: ["Does not need a “technical release”.", "Shall be reported to DGCA by the Co-Pilot.", "Shall be reported only by Co-Pilot with an ASR (Air Safety Report).", "Shall be briefed to cabin crew immediately."], answer: "Does not need a “technical release”." },
            { q: "When making low temperature altitude corrections for minimum altitudes, commander:", options: ["Shall inform IOCC.", "Shall brief the cabin crew.", "Does not require informing anybody.", "Shall coordinate with ATC prior to making any corrections to assigned altitudes and inform ATC when corrections to assigned altitudes will be made."], answer: "Shall coordinate with ATC prior to making any corrections to assigned altitudes and inform ATC when corrections to assigned altitudes will be made." },
            { q: "No turn shall be made before ………….. ft AGL after takeoff (except special airport operations published by the Flight Performance and Planning Department).", options: ["350", "400", "500", "1000"], answer: "400" },
            { q: "Which one of the following is WRONG regarding minimum flight altitudes?", options: ["Where the minimum flight altitudes established by Turkish Airlines and a State overflown differ, the higher values shall apply.", "All flights shall be planned and operated at or above the established minimum flight altitudes except for take-off and landing.", "It is the responsibility of Turkish Airlines to establish and publish minimum flight altitudes. As an integral part of OM Part C, Lido Route Manual establishes and publishes the required minimum flight altitudes on behalf of Turkish Airlines.", "Commander is not responsible for terrain and obstacle clearance when using RNAV/RNP procedures as applicable."], answer: "Commander is not responsible for terrain and obstacle clearance when using RNAV/RNP procedures as applicable." },
            { q: "…………….. represents the lowest published altitude between radio fixes that assures acceptable navigational signal coverage and meets obstacle clearance requirements between those fixes.", options: ["Minimum Grid Altitude", "Minimum En-Route Altitude", "Minimum Sector Altitude", "Minimum Terrain Clearance Altitude"], answer: "Minimum En-Route Altitude" },
            { q: "When an IFR flight is being vectored by radar, ATC may assign ……………. altitudes which are below the minimum sector altitude. Minimum vectoring altitudes provide obstacle clearance at all times until the aeroplane reaches the point where the pilot will resume own navigation.", options: ["Minimum Radar Vectoring", "Minimum Enroute", "Minimum Obstacle Clearance", "All of above"], answer: "Minimum Radar Vectoring" },
            { q: "The calculated minimum safe altitudes/heights must be adjusted when the ambient temperature on the surface is much lower than that predicted by the standard atmosphere. In such conditions, an approximate correction is ………….. height increase for every 10°C below standard temperature as measured at the altimeter setting source. This is safe for all altimeter setting source altitudes for temperatures above –15°C.", options: ["%3", "%4", "%5", "%6"], answer: "%4" },
            { q: "Which one of the following is WRONG regarding wind and terrain effects for altimeter corection?", options: ["The combination of strong winds and mountainous terrain can cause local changes in atmospheric pressure due to the Bernoulli effect. This occurs particularly when the wind direction is across mountain crests or ridges.", "The clearance of controllers include wind and terrain effects.", "It is up to the pilot-in-command to evaluate whether the combination of terrain, wind strength and direction are such as to make a correction for wind necessary.", "Corrections for wind speed should be applied in addition to the standard corrections for pressure and temperature, and ATC should be advised."], answer: "The clearance of controllers include wind and terrain effects." },
            { q: "Which one of the following is not a criteria of that low pressure correction is required?", options: ["When using QNH altimeter settings", "When using QNE altimeter settings", "When radar vectors are not available or not acceptable", "When the pressure in the vicinity (published QNH value) is lower than the standard atmosphere (1013 hPa)."], answer: "When using QNH altimeter settings" },
            { q: "Which one of the following is WRONG regarding procedures in respect to altitude corrections?", options: ["Accepting an IFR assigned altitude by ATC rests with the pilot-in-command. The pilot- in command should refuse this clearance if he finds unacceptable due to low temperature.", "Once an IFR altitude is accepted, any temperature correction can be applied to compensate for cold temperature.", "ATC should be informed about the amount of correction applied to any published procedure altitude.", "The pilot-in-command is responsible for the obstacle clearance of the aeroplane, except when an IFR flight is being vectored by radar."], answer: "Once an IFR altitude is accepted, any temperature correction can be applied to compensate for cold temperature." },
            { q: "Which one of the following is WRONG regarding determining the adequacy and selection of aerodromes to be used?", options: ["Aerodromes listed in OM Part C (Lido Route Manual) are authorized for operational use byTurkish Airlines.", "Aerodromes to be used as emergency are stated within Route Manual.", "Before an aerodrome can be used as a destination or as an alternate, there is no need to be classified as adequate aerodrome.", "Using an isolated aerodrome as destination aerodrome requires the prior approval by the Turkish DGCA."], answer: "Before an aerodrome can be used as a destination or as an alternate, there is no need to be classified as adequate aerodrome." },
            { q: "For inaugural (initial) flights, applicable Fleet Manager shall ensure that the flight crew composition is based on qualification and experience. For this purpose flight crew composition shall consist of a minimum of two Commanders and:<br>1- one Commander is ranked as ………….. and<br>2- remaining Commander is ranked as a CM, CI, CN or C1.", options: ["CI", "CN", "CM", "C1"], answer: "CI" },
            { q: "Which one of the following is WRONG regarding selection of aerodromes?", options: ["Where it is not possible to use the departure aerodrome due to meteorological, performance or other reasons, an adequate take-off alternate aerodrome shall be specified in the Operational Flight Plan (OFP).", "An aerodrome shall be considered as adequate if, at the expected time of use, the aerodrome is available and equipped with necessary ancillary services such as air traffic services (ATS), sufficient lighting, communications, weather reporting, navigation aids and emergency services.", "The departure aerodrome can be selected as the takeoff alternate aerodrome in the OFP.", "The departure aerodrome can be selected as the destination alternate aerodrome in the OFP."], answer: "The departure aerodrome can be selected as the takeoff alternate aerodrome in the OFP." },
            { q: "………….. represents the lowest safe altitude which can be flown off-track.", options: ["Minimum Grid Altitude", "Minimum En-Route Altitude", "Minimum Sector Altitude", "Minimum Terrain Clearance Altitude"], answer: "Minimum Grid Altitude" },
            { q: "Which one of the following is WRONG regarding selection of take-off alternate aerodromes?", options: ["Where it is not possible to use the departure aerodrome due to meteorological, performance or other reasons, an adequate take-off alternate aerodrome shall be specified in the Operational Flight Plan (OFP).", "The take-off alternate aerodrome shall be no further from the departure aerodrome than two hour flying time at the one engine inoperative cruising speed according to the AFM in still air standard conditions based on the actual take-off mass, for non-etops twin engine aircraft", "If the AFM does not contain a one engine inoperative cruising speed cruising speed, the speed to be used for calculation shall be that which is achieved with the remaining engine(s) set at maximum continuous power.", "The departure aerodrome shall not be selected as the take-off alternate aerodrome in the OFP."], answer: "The take-off alternate aerodrome shall be no further from the departure aerodrome than two hour flying time at the one engine inoperative cruising speed according to the AFM in still air standard conditions based on the actual take-off mass, for non-etops twin engine aircraft" },
            { q: "Which one of the following is not a criteria of that selection of a destination alternate aerodrome is not required?", options: ["The duration of the planned flight from take-off to landing or, in the event of in-flight replanning in accordance with Subchapter 8.1.7, the remaining flying time to destination does not exceed six hours", "two separate runways (runways which are constructed with separate landing surfaces but the runways may overlay or cross, but if one runway is blocked, it shall not prevent operations on the other runway and each runway shall have a separate approach procedure based on a separate navigation aid) are available and usable at the destination aerodrome", "the appropriate weather reports and/or forecasts for the destination aerodrome indicate that, for the period from one hour before until one hour after the expected time of arrival at the destination aerodrome the ground visibility will be at least 10 km.", "the appropriate weather reports and/or forecasts for the destination aerodrome indicate that, for the period from one hour before until one hour after the expected time of arrival at the destination aerodrome the ceiling will be at least 2000 ft or circling height + 500 ft, whichever is greater."], answer: "the appropriate weather reports and/or forecasts for the destination aerodrome indicate that, for the period from one hour before until one hour after the expected time of arrival at the destination aerodrome the ground visibility will be at least 10 km." },
            { q: "Which one of the following is WRONG regarding selection of two destination alternate aerodromes?", options: ["Two destination alternate aerodromes shall be selected when the appropriate weather reports and/or forecasts for the destination aerodrome indicate that during a period commencing one hour before and ending one hour after the estimated time of arrival, the weather conditions will be below the applicable planning minima.", "Two destination alternate aerodromes shall be selected when no meteorological information is available.", "IOCC, based on economical and operations factors, shall determine whether the flight is to be conducted on-time/ delayed/ combined with another flight or cancelled if the conditions in the destination aerodrome requires two destination alternate aerodromes to be selected.", "Commander can cancel the flight if the conditions in the destination aerodrome requires two destination alternate aerodromes to be selected."], answer: "Commander can cancel the flight if the conditions in the destination aerodrome requires two destination alternate aerodromes to be selected." },
            { q: "Which one of the following is WRONG regarding calculated take off time (CTOT) assigned by ATS?", options: ["The CTOT is defined as a specified time with a tolerance of minus 5 min to plus 10 min which the aeroplane shall commence take-off. The tolerance is primarily intended for use by flight crew members.", "In some states time restrictions will refer to an en-route fix rather than take-off. Therefore, the Commander must plan for an off-block time consistent with the CTOT.", "The Commander shall be informed of the assigned or amended CTOT, via radio, datalink, station personnel or the flight dispatcher.", "When it becomes apparent that for unforeseeable reasons the passenger boarding or aeroplane handling cannot be accomplished at the targeted time, a revised target shall be established between the station representative and the Commander."], answer: "The CTOT is defined as a specified time with a tolerance of minus 5 min to plus 10 min which the aeroplane shall commence take-off. The tolerance is primarily intended for use by flight crew members." },
            { q: "The crosswind limit for a 117 ft narrow runway based on GOOD braking conditions is ………….. kts.", options: ["20", "21", "22", "23"], answer: "22" },
            { q: "Which one of the following is WRONG regarding narrow runway operations?", options: ["Take-off and landings may only be conducted by the Commander (seated in the left hand seat) or co-pilot (P3-P4 seated in the right hand seat).", "Narrow runway operations require special flight crew certification for runway widths of 30.0 m and above up to 40.0 m.", "Braking action shall be available and classified as “GOOD”.", "In case of commander (seated in the left hand seat) incapacitation, P5 (seated in the right hand seat) may continue the approach if he deems a safe, stabilized approach and landing can be made."], answer: "In case of commander (seated in the left hand seat) incapacitation, P5 (seated in the right hand seat) may continue the approach if he deems a safe, stabilized approach and landing can be made." },
            { q: "Which one of the following is WRONG regarding short runway operations?", options: ["Normal operations require runway lengths of 6,500 ft and greater.", "Aerodrome operating minima visibility shall be at or above 1,500 m (regardless of the type of approach to be conducted, higher values if minima dictate as such).", "Tail wind component shall not exceed 10 knots.", "Takeoff and landings may only be conducted by Commanders (seated in the left hand seat) or co-pilots (P3-P4 seated in the right hand seat)."], answer: "Tail wind component shall not exceed 10 knots." },
            { q: "Which one of the following is WRONG regarding surface conditions and wind limitations?", options: ["It is the Commander's responsibility to acquire the information in reference to the direction and the velocity of surface wind prior to initiating a take-off or an approach to land.", "Flight operations shall not commence or be conducted if the reported speed of surface wind including the gust factor is above 50 kts.", "Whenever reported crosswind component of the runway intended to land is or expected to be more than 15 kts pilot in command shall be PF.", "All landings shall be planned so as to attain positive touchdown within the first 1,500 ft of the runway with selected landing flaps (as applicable) at the targeted approach speed."], answer: "All landings shall be planned so as to attain positive touchdown within the first 1,500 ft of the runway with selected landing flaps (as applicable) at the targeted approach speed." },
            { q: "In case of commander (seated in the left hand seat) is authorized to operate CAT III and co-pilot (seated in the right hand seat) is authorized to operate CAT I, which type of minima are the flight crew members limited to operate?", options: ["CAT III", "CAT II", "CAT I", "NPA"], answer: "CAT I" },
            { q: "Which one of the following is WRONG regarding methods and responsibilities for establishing aerodrome operating minima?", options: ["The term “minima” refers to aerodrome weather conditions and defines the minimum visibility (horizontal / vertical) prescribed for take-off or landing at an aerodrome.", "Turkish Airlines minima the lowest minima to which Turkish Airlines is authorized to use at a specific aerodrome. This minimum can be lower than items aeroplane capability minima or/and aerodrome operating minima", "Aeroplane Flight Manual (AFM) defines the lowest minima for which the aeroplane has been certified.", "Lido aerodrome charts are established in accordance with respective national authority minima for aerodromes."], answer: "Turkish Airlines minima the lowest minima to which Turkish Airlines is authorized to use at a specific aerodrome. This minimum can be lower than items aeroplane capability minima or/and aerodrome operating minima" },
            { q: "Which one of the following is WRONG regarding surface conditions and wind limitations?", options: ["For non-short runway operations, tailwind may be increased up to 15 kts if approved by the applicable aeroplane type AFM and/or FCOM, unless local restrictions contradicts.", "Braking action shall be classified as “MEDIUM/POOR” or above for all non-narrow runway operations. Aeroplane shall not be dispatched for flight with braking action classified as “POOR” unless the runway classification can be improved to “MEDIUM/POOR” or above classification prior to the Estimated Time of Arrival (ETA) at the aerodrome.", "With one of the spoiler, anti-skid or reverser systems inoperative, take-off and landing shall not be conducted on runways with medium/poor braking coefficient conditions.", "For non-narrow runway operations with braking action good or above, if the crosswind value is within limits at the take-off alternate aerodrome, maximum crosswind limit may be increased to 35 kts for the take-off aerodrome."], answer: "For non-narrow runway operations with braking action good or above, if the crosswind value is within limits at the take-off alternate aerodrome, maximum crosswind limit may be increased to 35 kts for the take-off aerodrome." },
            { q: "Approach and landing is not authorised when the airport operating landing visibility minimum is below ………….. meters unless RVR reporting is available for the runway of intended use.", options: ["400", "800", "550", "1500"], answer: "800" },
            { q: "Which one of the following is WRONG regarding take-off and departure minima?", options: ["Without an approval low visibility take-off, if the runway has no facility, the minimum RVR/Visibility is 400 meters during the day.", "The Commander shall not commence take-off unless the weather conditions at the aerodrome of departure are equal to or better than applicable minima for landing at that aerodrome unless a weather-permissible take-off alternate aerodrome is available.", "When no reported meteorological visibility or RVR is available, a take-off may only be commenced if the Commander can determine that the visibility along the take-off runway is equal to or better than the required minimum.", "Take-off minima shall be expressed as visibility or runway visual range (RVR) limits, taking into account all relevant factors for each aerodrome planned to be used and aircraft characteristics."], answer: "Without an approval low visibility take-off, if the runway has no facility, the minimum RVR/Visibility is 400 meters during the day." },
            { q: "Which one of the following is WRONG regarding determination and applicability of visibility and RVR?", options: ["If both RVR and visibility are reported, RVR value is controlling factor. Visibility shall be used only if RVR value is not reported.", "For precision approach only the RVR/CMV/Visibility (also a particular ceiling if required by the state authority), for a non-precision approach and/or circling approach both the visibility/CMV and VV/ceiling shall be at or above the minima.", "If the RVR is reported as being above the maximum value assessed by the aerodrome operator, e.g. ‘RVR more than 1 500 m’, it should not be considered as a reported value.", "Conversion from meteorological visibility to RVR/CMV can be used for calculating take-off minima."], answer: "Conversion from meteorological visibility to RVR/CMV can be used for calculating take-off minima." },
            { q: "Which one of the following is WRONG regarding effect on landing minima of temporarily failed or downgraded ground equipment?", options: ["It is not expected that the Commander would consult such instructions after passing 1000 ft above the aerodrome.", "Failures other than ILS does not affect both RVR and DH.", "If failures of ground aids are announced at such a late stage, the approach could be continued at the Commander’s discretion.", "If failures are announced before such a late stage in the approach, their effect on the approach should be considered as described in ‘failed or downgraded equipment- effect on landing minima for Operations."], answer: "Failures other than ILS does not affect both RVR and DH." },
            { q: "During approach to LTAF, if you receive the clerance from ATC “clear to descent 3000ft via KEMER1D” what is the correct action?", img: "annexes/examIV/examIV_annex10.png", options: ["Since we are under radar control we may descent directly to 3000ft", "Descent to 14000ft until D35ADA,10000ft D25ADA, 8500ftD20ADA, 4000ft D10ADA, 3000ft to ADA", "12200ft D35ADA, 11600ft D25 ADA, 9100ftD20ADA, 5700ft D10ADA,3000ft to ADA", "14000ft D35ADA, 11600FT D25ADA,9100ft D20ADA, 5700 D10ADA, 3000FTADA"], answer: "Descent to 14000ft until D35ADA,10000ft D25ADA, 8500ftD20ADA, 4000ft D10ADA, 3000ft to ADA" },
            { q: "During approach to JRO-HTKJ if you receive following instruction from ATC “clear to ILS09 via EVATO1A” what is correct action?", img: "annexes/examIV/examIV_annex11.png", options: ["12000ft to LOSIN, 10000ft to EVAMU, 10000ft to UMTOD, 6500ft to TESOV", "11400ft to LOSIN, 10700ft to EVAMU, 10700ft to UMTOD, 8500ft to TESOV", "12000ft to LOSIN, 10700ft to EVAMU, 10700ft to UMTOD, 8500ft to TESO", "11.700ft to LOSIN, 10700ft to EVAMU, 10700ft to UMTOD, 8500ft to TESOV"], answer: "12000ft to LOSIN, 10000ft to EVAMU, 10000ft to UMTOD, 6500ft to TESOV" },
            { q: "What is the MSA’s for following chart? FRU-UCFM STAR’s RWY08/26", img: "annexes/examIV/examIV_annex12.png", options: ["BETWEEN R225 AND R350 25NM MNS 4500FT,BETWEEN R350 AND R130 25NM MNS 5900FT,BETWEEN R130 AND R225 25NM MNS 13200FT, BETWEEN R130 AND R225 10NM MNS 4600FT", "BETWEEN R225 AND R350 25NM MNS 4800FT,BETWEEN R350 AND R130 25NM 11600FT, BETWEEN R130 AND R225 17500FT", "BETWEEN R225 AND R350 4500FT,BETWEEN R350 AND R130 5900FT,BETWEEN R130 AND R225 13200FT", "BETWEEN R225 AND R350 4500FT,BETWEEN R350 AND R130 5900FT,BETWEEN R130 AND R225 4600"], answer: "BETWEEN R225 AND R350 25NM MNS 4500FT,BETWEEN R350 AND R130 25NM MNS 5900FT,BETWEEN R130 AND R225 25NM MNS 13200FT, BETWEEN R130 AND R225 10NM MNS 4600FT" },
            { q: "During approach to FRU-UCFM via KALIN1 if you receive instruction to descent to 3400ft what is the correct descent path?", img: "annexes/examIV/examIV_annex13.png", options: ["BASAN FL60, DESCENT TO 3900FT TO KALIN", "BASAN FL60, DESCENT TO 4800 TO KALIN", "BASAN FL60 OR ABOVE, KALIN FL60 OR ABOVE", "DUE TO RADAR VECTOR DESCENT UNRESTRICTEDLY 3400FT"], answer: "BASAN FL60 OR ABOVE, KALIN FL60 OR ABOVE" },
            { q: "What is the cross wind limit for a 30m(97ft) narrow runway reported breaking action good to medium?", options: ["20", "23", "NO OPERATION", "15"], answer: "NO OPERATION" },
            { q: "What is the correct action for the flight crew seated on right hand seat in case of commander incapacition during an approach to a short and narrow runway ?", options: ["If he/she P3-P4 may continue the approach if the deems a safe, stabilized approach and landing can be made.", "If he/she is captain may continue the approach if the deems a safe, stabilized approach and landing can be made.", "He/she shall initiate go around.", "He/she may continue the approach if the deems a safe, stabilized approach and landing can be made."], answer: "If he/she P3-P4 may continue the approach if the deems a safe, stabilized approach and landing can be made." },
            { q: "Which is not a reason to use contingency fuel?", options: ["Deviations of an individual aeroplane from the expected fuel consumption data", "Deviations from forecast meteorological conditions", "Planned taxi times before take-off", "Deviations from planned routings and/or cruising levels/altitudes"], answer: "Planned taxi times before take-off" },
            { q: "Xwind limit on narrow rwy Rwy 29, wind 200/20kts, rwy width=35m ( 107ft) Rwy condition is good. Are we allowed to operate on this rwy ?", options: ["Yes, as we are under maximum limitation of 25kts Xwind.", "No, our limitation is 15kts Xwind on a narrow rwy.", "Yes as long as the commander is comfortable with hıs skills.", "Yes, we have a small margin."], answer: "Yes, we have a small margin." },
            { q: "Flight from AAA to BBB aiport, at night, WX condition are CAVOK at BBB. Runway 13 in use ( no ILS approach). Approach ILS 31 with a circle to land Rwy 13. During the transfer with ATC, crews are informed that the PAPI 13 is u/s.", options: ["It doesn´t affect our flight, continue.", "As we will be in visual condition, we can continue to land Rwy13", "We can´t continue, we need to divert", "After checking the wind, the tail wind is within limit for landing Rwy31. We request rwy 31 with ATC, otherwise we need to divert"], answer: "After checking the wind, the tail wind is within limit for landing Rwy31. We request rwy 31 with ATC, otherwise we need to divert" },
            { q: "At the planning stage, flight with B737/700 from AAA airport to XXX airport with DDD as alternate. Checking the Notams, crew noticed that the FFRS for DDD airport is downgraded to 3.", options: ["We are not allowed to dispatch with this alternate, we request another one", "We can dispatch as the alternate airport doesn´t need any minimum", "We can dispatch as the level of protection may be reduced by maximum 1 category below the required", "We are allowed as the dispatcher didn’t say anything about it"], answer: "We are not allowed to dispatch with this alternate, we request another one" },
            { q: "During daytime, an aircraft is about to start descent towards BBB airport. The minima of the procedure are: RVR = 800m / DH=350 ft<br>ATC informs the crew that RVR equipment just failed and give them a visibility of 600m and ceiling of 1500 ft…", options: ["You are not allowed to land, you request to divert.", "Anyway, you can start the approach until the OM and if no contact with the runway, going around.", "You can proceed for the approach as long as ATC confirmed that you have the HI approach and runway lights.", "You request to hold"], answer: "You are not allowed to land, you request to divert." },
            { q: "Low QNH and Wind correction<br>You are cruising at FL 350. ATC cleared you descent to 8000 ft and inform you QNH at your destination is not available. It gives you QNH for the nearest airport which is 1000 hpa. The MTCA is 7300 ft and wind aloft is 60kts.<br>Are you able to descent safely to this altitude ?", options: ["Yes, the ATC is responsible for the obstacle clearance.", "Yes, if you do the correction, you still do have a margin", "No, you have to request 8400 ft minimum", "No, you have to request 8000 ft minimum"], answer: "No, you have to request 8400 ft minimum" },
            { q: "Which system shall not be fully operational for narrow runway operations?", options: ["Flight controls, nose wheel steering", "Auto brake system", "All wheel braking units and reversers", "Anti-skid system"], answer: "Auto brake system" },
            { q: "With a one-step de-icing/anti-icing operation the holdover time begins at the .................. and with a two-step operation the holdover time begins at the .......................", options: ["end of the operation, start of the final (anti-icing) step", "start of the operation, end of the final (anti-icing) step", "start of the operation, start of the final (anti-icing) step", "start of the operation, end of the first (de-icing) step"], answer: "start of the operation, start of the final (anti-icing) step" },
            { q: "FOR UAKK (KARAGANDA- KAZAKHSTAN) CAT I AERODROME; YOUR PLANNED LANDING TIME IS 02:00Z AND TAF IS AS BELOW:<br>UAKK 051600Z 0519/0612 20005MPS 1200 BR FU SCT010 BKN100 TX05/0608Z TNM05/0601Z TEMPO 0518/0600 0500 FG FU TEMPO 0600/0606 0200 FZFG VV002 BECMG 0606/0607 04005MPS 3000 TEMPO 0611/0612 0800<br>For planning purpose how it shall be classified and what is the correct action?", options: ["Information in forecasts prefixed by “TEMPO” indicating below minima in accordance with planning minima for the applicable time period, shall be classified as below minima and flight shall be delayed", "Information in forecasts prefixed by “TEMPO” indicating below minima in accordance with planning minima for the applicable time period, shall be classified as below minima and minimum of 60 minutes of extra holding fuel shall be allocated", "Information in forecasts prefixed by “TEMPO”, indicating below minima in accordance with planning minima for the applicable time period, shall not be classified as below minima but shall be classified as operationally significant and flight shall be delayed", "Information in forecasts prefixed by “TEMPO”, indicating below minima in accordance with planning minima for the applicable time period, shall not be classified as below minima but shall be classified as operationally significant and minimum of 60 minutes of extra holding fuel shall be allocated"], answer: "Information in forecasts prefixed by “TEMPO”, indicating below minima in accordance with planning minima for the applicable time period, shall not be classified as below minima but shall be classified as operationally significant and minimum of 60 minutes of extra holding fuel shall be allocated" },
            { q: "As a 320 F/O, it is said that your captain and one of the cabin crew were called from standby duty and would be able to arrive after duty start time. You are also informed there will be a commander onboard at all times during boarding. IOCC asked if you are able to start boarding before commander arrives to prevent delay. Which situations you can start boarding?<br>I. If the commander onboard is type rated/ qualified<br>II. If one of the cabin crew is cabin chief<br>III. If number of passenger on board less than 150<br>IV. F/O's shall not start boarding without the designated commander V.", options: ["IV", "I, II", "II, III", "I, II, III"], answer: "IV" },
            { q: "Which is not one of the safety precautions during refuelling and defuelling?", options: ["Aeroplane weather radar shall be selected OFF and a test of the system shall not be conducted.", "Aeroplane HF radio(s) shall not be used to transmit and a test of the system shall not be conducted.", "Aeroplane lights shall not be switched “ON” or “OFF”", "Aeroplane strobe light shall not be switched “ON” or “OFF”."], answer: "Aeroplane lights shall not be switched “ON” or “OFF”" },
            { q: "During walk-around check you notice fuel spilling. Which one is not one of the actions you shall take?", options: ["Fuelling shall be stopped", "Appropriate authorities shall be informed immediately", "Fueling truck shall be positioned at a safe distance from the aeroplane", "APU bleed load shall be unloaded immediately and APU shall not be started until the spillage is removed and there is no risk from fuel or vapors."], answer: "Fueling truck shall be positioned at a safe distance from the aeroplane" },
            { q: "In case of thunderstorms in the vicinity of the aerodrome which actions shall be taken?<br>I. Immediately cease fuelling operation<br>II. Ensure the fuelling truck is disconnected from the aeroplane<br>III. The fuelling truck positioned at a safe distance from the aeroplane.<br>IV. If IOCC does not call us to stop fuelling we don't need to take extra action", options: ["I", "I, II", "I, II, III", "IV"], answer: "I, II, III" },
            { q: "During walk around check if refuelling procedure is being conducted which situation shall be checked about location of ground equipment and vehicles?", options: ["Fuelling vehicles shall be positioned such that they do not obstruct access to the aeroplane for rescue or fighting vehicles or obstruct the evacuation routes, including chute deployment areas", "Tank fuellers and hydrant dispensers shall have a clear exit path at all times", "Ground equipment positioned below the aeroplane, which may cause damage to the aeroplane as the aeroplane settles down due to increase in weight during refuelling, shall be repositioned", "All above"], answer: "All above" },
            { q: "Which one is the action shall be taken during refuelling / defuelling in the event of an APU fire?", options: ["The APU shall be shut down and the APU fire extinguishing system shall be activated.", "The Airport Fire Services shall be alerted", "Type of disembarkation (normal or emergency evacuation) shall be decided", "All above"], answer: "All above" },
            { q: "Which circumstance do you accept Refuelling/ defuelling with one engine running?", options: ["We are not allowed to Refuelling/ defuelling with one engine running", "If APU unserviceable and IOCC wants us to perform this procedure due to CTOT.", "If our turn around time is too short for waiting the GPU.", "If the GPU is not available and the APU is unserviceable."], answer: "If the GPU is not available and the APU is unserviceable." },
            { q: "A passenger who is refused admission into a State, or who is refused onward carriage by a State authority at a point of transfer (expired or no visa, expired passport, etc).<br>The definition above is for:", options: ["Deportee", "Unaccompanied Minor", "Inadmissible Passenger", "Infant"], answer: "Inadmissible Passenger" },
            { q: "A person who had legally been admitted into a State or who had entered a State illegally, and who at some later time is formally ordered (may be in the form of a person in custody) to be removed from that State.<br>The definition above is for:", options: ["Unaccompanied Minor", "Deportee", "Inadmissible Passenger", "Infant"], answer: "Deportee" },
            { q: "While cabin crews perform a security check, they reveals an unidentified item. What are the correct actions?<br>1- Passenger embarkation may commence<br>2- Appropriate security department shall be notified<br>3- Immediately leave the aircraft<br>4- Upon completion of all applicable security procedures, no further actions are required<br>5- Commander must be informed about the situation", options: ["1, 2, 3, 4", "1, 3, 5", "3, 4, 5", "2, 4, 5"], answer: "2, 4, 5" },
            { q: "With which form the Commander shall be notified about the presence of any inadmissible passengers or deportees (DEPA or DEPU) prior to commencing any boarding?", options: ["NOTOC", "PRE NOTOC", "Special Categories of Passenger Notification", "Load Sheet"], answer: "Special Categories of Passenger Notification" },
            { q: "If the Commander refuses the carriage of deportees classified as DEPU, he shall inform …………. by filling out an operational report stating the reason of refusal upon return to main base.", options: ["The SVP, Flight Operations", "Fleet Manager", "The SVP, Corporate Safety", "The SVP, Aviation Security"], answer: "The SVP, Flight Operations" },
            { q: "Which one of the following statements is FALSE concerning carriage of sick passengers, pregnant passengers and persons with reduced mobility (PRMs)?", options: ["All passengers mentioned within this category, during any abnormal circumstances or emergencies (evacuation, etc.), shall be provided with the same assistance as normal passengers", "It is the responsibility of the cabin chief to ask a passenger if she is pregnant", "The responsibility for the admittance of sick passengers, pregnant passengers and PRMs has been granted to ground handling firms", "It is the responsibility of station managers to make the final decision for carriage of such passengers"], answer: "It is the responsibility of the cabin chief to ask a passenger if she is pregnant" },
            { q: "Which one of the following is WRONG considering admittance of live animals (AVI)?", options: ["The responsibility for the admittance of live animals has been granted to ground handling firms.", "It is the responsibility of station managers to make the final decision for carriage of live animals.", "Live animals consist of pets limited to domestic dogs, cats and songbirds that are traveling with their owners.", "Dangerous dog breeds can only be carried within the flight deck"], answer: "Dangerous dog breeds can only be carried within the flight deck" },
            { q: "Which one of the following is WRONG considering carriage of infants?", options: ["Infant is a person who is less than the age of 2 years.", "Infants less than 48 hours old shall be denied to travel with Turkish Airlines", "Infants older than 48 hours but younger than 7 days shall be permitted to travel with Turkish Airlines if a medical clearance report is provided indicating able to fly (healthy baby) without any restrictions", "If an able-bodied travel companion is to travel with two infants, then the responsibility for the second infant may be handed over to a volunteering cabin crew"], answer: "If an able-bodied travel companion is to travel with two infants, then the responsibility for the second infant may be handed over to a volunteering cabin crew" },
            { q: "Which one of the following statements is NOT true regarding carriage of infants and children?", options: ["Infant is a person who is less than the age of 2 years.", "Minor is a person who is 2 years of age and older but less than 12 years of age.", "Minors who are 7 years of age and older but less than 12 years of age are not required to be accompanied by an able-bodied travel companion (UM).", "A minor who is 2 years of age and older but less than 7 years of age may travel without an able-bodied travel companion only upon Commander's consent."], answer: "A minor who is 2 years of age and older but less than 7 years of age may travel without an able-bodied travel companion only upon Commander's consent." },
            { q: "Inadmissible passengers shall be seated", options: ["Close to the flight deck", "At emergency exit rows", "At a vacant cabin crew jump-seat", "Rear section of business/comfort or economy class depending on the booking code indicated on the passenger's ticket"], answer: "Rear section of business/comfort or economy class depending on the booking code indicated on the passenger's ticket" },
            { q: "The responsibility to make the final decision for carriage of live animals (AVI) is with …………..", options: ["Commander", "Cabin Chief", "Station Managers", "Dispatch"], answer: "Station Managers" },
            { q: "Which of the following statements is correct concerning for refuelling?<br>I. Refuelling / defuelling procedures shall be conducted by qualified personnel only<br>II. Parking brake shall be set<br>III. Electrical equipment and vehicles with hot parts shall not be positioned close to the fuel vent points.<br>IV. Smoking and use of naked lights is prohibited in the area of refeuelling.<br>V. In the event of an APU fire, the APU shall be shutdown.", options: ["I-II-III", "I-III-IV-V", "I-III-V", "All of the above"], answer: "All of the above" },
            { q: "Which one is not correct about refuelling?", options: ["In case of thunderstorms in the vicinity of the aerodrome, immediately cease fuelling operations and ensure the fuelling truck is disconnected from the aeroplane", "Cabin chief shall always be on board during refuelling", "Oxygen bottles shall not be filled during refueling / defuelling operation", "In the event of a fuel spill, fuelling shall be stopped and APU bleed load shall be unloaded"], answer: "Cabin chief shall always be on board during refuelling" },
            { q: "When passengers on board during refuelling; “Fasten Seat Belt” signs shall be selected “.....”, “No Smoking” signs shall be selected “....”, The emergency lighting switch shall be positioned to “.....” and Interior lighting shall be set to the brightest position", options: ["OFF, ON, ARM", "ON, ON, ARM", "OFF, ON, OFF", "OFF, OFF, OFF"], answer: "OFF, ON, ARM" },
            { q: "I. Turkish Airlines aeroplanes can be fuelled with wide cut fuel or any mixture, while the passengers are onboard, embarking, or disembarking<br>II. Refueling operator is responsible for ensuring that the required fuel is on board the aeroplane and distributed appropriately prior to push-back or taxiing<br>III. Passenger disembarkation shall only commence after receiving the initial approval from the Commander and the final approval from the appropriate ground personnel<br>IV. Crew members shall remain on board (at stations) until all of the passengers have disembarked the aeroplane. The only exception shall be when a ground personnel is delegated to remain on board for the disembarkation of passengers in need of assistance (wheelchair/stretcher/ambulance) or transit stops (passengers remaining on board) where crew change is required.<br>Which statements are correct?", options: ["I-II- III", "II- III- IV", "III- IV", "All of above"], answer: "III- IV" },
            { q: "Which of below is not correct during embarkation/disembarkation?", options: ["The Commander of the aeroplane is responsible for the safety of all crew members, passengers and cargo on board an aeroplane, as soon as he embarks the aeroplane until he disembarks the aeroplane at the end of the flight", "Smoking shall not be permitted on any part of the ramp area in the vicinity of the aeroplane to be boarded", "Passenger embarkation or cargo loading shall not commence until the Turkish Airlines approved security checklist has been successfully completed", "It is not possible to start embarkation without getting permission from ATC"], answer: "It is not possible to start embarkation without getting permission from ATC" },
            { q: "Which is correct while embarking/disembarking during transit stop?", options: ["Transit passengers disembarking shall take all personal carry-on items along with them.", "After completion of ground handling procedures, cabin crew members shall perform a security check of the aeroplane in accordance with the appropriate security checklist", "If the security check conducted reveals no findings, passenger embarkation may recommence", "All of the above"], answer: "All of the above" },
            { q: "Crew scheduling department is responsible for ensuring that the required number of crew members for the scheduled flight shall be ready for duty onboard the aeroplane at least ................ prior to the scheduled (original or rescheduled) departure time", options: ["15 minutes", "30 minutes", "45 minutes", "60 minutes"], answer: "15 minutes" },
            { q: "A Commander ( ............ be delegated to a first officer - may be a Commander type rated/qualified but not assigned for the specific flight), and a Cabin Chief ( ……… be delegated to a cabin crew member - may be a Cabin Chief type qualified but not assigned for the specific flight) shall be onboard the aeroplane at all times prior to commencing boarding", options: ["can not / must", "must / can", "must / can not", "can not / can not"], answer: "can not / can not" },
            { q: "In case of passenger count discrepancies, which one of the following procedures shall be carried out when a passenger checked in but missing at the gate", options: ["If any checked baggage, it shall be off-loaded", "No further action is necessary", "Cabin crew shall conduct a new security check", "Cabin chief shall conduct recount"], answer: "If any checked baggage, it shall be off-loaded" },
            { q: "What is the initial required action shall be performed by cabin chief in case of passenger count discrepancy between the boarding gate and aeroplane", options: ["Cabin chief shall conduct a new security check", "Cabin chief shall conduct a recount of the boarding cards to confirm the number of passengers checked through the gate.", "Cabin Chief shall conduct a recount (maximum three times) of all passengers on board the aeroplane", "Cabin chief shall make a PA announcement"], answer: "Cabin Chief shall conduct a recount (maximum three times) of all passengers on board the aeroplane" },
            { q: "Which one is not a part of procedure when a passenger refusing to travel after embarking the aeroplane?", options: ["Local security procedures may include such actions as detaining the passenger under security control until the aeroplane has reached its destination", "Commander has right to insist not to disembark passenger", "If the passenger decides to continue to travel after being advised of consequences, no further action is necessary.", "Turkish Airlines has the legal right to claim any reimbursement which may be incurred because of passenger refusing to travel after embarking the aeroplane"], answer: "Commander has right to insist not to disembark passenger" },
            { q: "If the passenger still refuses to travel after being informed about the consequences, what is the security procedure to be utilized by Commander?", options: ["Passenger refusing to travel shall disembark the aeroplane with all personal belongings", "The remaining passengers in the cabin are asked via PA whether they got anything from someone else in order to transport on board and shall be instructed to place all personal carry on items on their laps.", "Cabin crew members shall perform a detailed security search of the aeroplane including seat pockets, under the seat, seat backs, lavatories and any other areas of the cabin easily accessible to the passenger.", "All of the above"], answer: "All of the above" },
            { q: "Which is not correct about carriage of minors?", options: ["Minor is 2 years of age and older but less than 12 years of age", "Passengers who are 7 years of age and older but less than 12 years of age traveling in groups are called Minor Group Travel.", "There is maximum permitted number of accompanied minor", "Unaccompanied minor is 7 years of age and older but less than 12 years of age"], answer: "There is maximum permitted number of accompanied minor" },
            { q: "Embarkation/disembarkation shall only be conducted from doors which are on the same side of the running engine<br>II. A Commander shall be onboard the aeroplane at all times prior to commencing boarding and his/her responsibility can be delegated to a first officer.<br>III. If the number of passengers onboard is more than the number of passengers that should be onboard, a physical check of all passengers boarding pass shall be conducted by the ground personnel to identify the passenger(s) who should not be onboard.<br>IV. Minor is 2 years of age and older but less than 12 years of age. Each minor shall occupy a seat (fitted with a safety belt) onboard an aeroplane<br>Which statements are correct?", options: ["I- II- III", "III- IV", "I- III", "All of above"], answer: "III- IV" },
            { q: "Who has the responsibility for the admittance of sick passengers, pregnant passengers and PRMs?", options: ["Commander", "Cabin chief", "Ground handling firms", "OCC"], answer: "Ground handling firms" },
            { q: "The Commander, for the purpose of ensuring the safety of the aeroplane and its occupants, …………… the authority to deny or off-load inadmissible passengers. If the Commander refuses the carriage of inadmissible passengers, he …………… fill out an operational report stating the reason of refusal upon return to main base.", options: ["shall have / may", "has / shall", "doesn't have / may", "has / may"], answer: "has / shall" },
            { q: "Which one is not one of the conditions to transport of dangerous goods within the cabin?", options: ["They are required to be onboard the aeroplane for operational reasons", "They are carried as catering or cabin service supplies", "They are used as an extra oxygen supply for cockpit crew", "They are carried for use in flight for medical aid for a patient"], answer: "They are carried for use in flight for medical aid for a patient" },
            { q: "When anti-collision beacon light is \"ON\", universally it means:<br>I. Engines are about to be started.<br>II. Engines are running.<br>III. Aircraft is being towed.<br>IV. Aircraft is moving under its own power.<br>V. All ground personnel shall remain clear of aircraft.", options: ["I-III-IV", "II-III-IV-V", "I-II-III-IV", "All of the above"], answer: "All of the above" },
            { q: "Which of the following is not correct about inadmissible passengers?", options: ["Inadmissible passengers shall be boarded separately and prior to any other passengers", "Inadmissible passengers shall disembark separately and after all other passengers have disembarked", "Inadmissible passengers shall be seated at the rear section of business/ comfort or economy class depending on the booking code indicated on the passenger's ticket.", "Inadmissible passengers shall be escorted during flight"], answer: "Inadmissible passengers shall be escorted during flight" },
            { q: "Which of the followings is not the right procedure about the operation of aeroplane doors?", options: ["The cabin or compartment doors shall not be opened before the anti-collision beacon has been switched “OFF” upon arrival at the gate/parking position", "Cabin chief may open the applicable cabin doors when related slides are disarmed without confirmation with the Commander", "The aeroplane doors shall be opened or closed by the operating cabin crew members or by a qualified technician or by flight crew members", "Prior to commencing push-back, slides shall be armed by the cabin crew or a qualified personnel"], answer: "Cabin chief may open the applicable cabin doors when related slides are disarmed without confirmation with the Commander" },
            { q: "Which of the following statements is not correct concerning de-icing/anti-icing procedure?", options: ["During cold weather operations, two procedures(de-icing, anti-icing) are available, which can also be used in combination.", "Heated water may be used as an anti-ice fluid", "The selection of a one or two-step process depends upon weather conditions, available equipment, available fluids and the holdover time to be achieved.", "The de-icing/anti-icing process should be continuous and as short as possible"], answer: "Heated water may be used as an anti-ice fluid" },
            { q: "Which of the followings shall be given to the commander after de-icing/anti-icing procedures?<br>I. Fluid type<br>II. Name of the handling company<br>III. Concentration of fluid within the fluid/water mixture<br>IV. Braking action around ramp area<br>V. Local time at the beginning of the final de-icing/anti-icing step", options: ["I-II-III", "I-III-V", "II-III-V", "III-IV-V"], answer: "I-III-V" },
            { q: "I. Multiple occupancy of any aeroplane seating, for both passengers (other than infants) or crew members, may be possible with the approval of station manager and commander when conditions deemed necessary.<br>II. Switching “OFF” the anti-collision beacon light is an indication that it is safe to approach the aircraft.<br>III. Under no circumstance, no items or hand baggages other than the on duty pilots' flight bags shall be carried as baggage in the cockpit.<br>IV. Commander or ground personnel shall deny the boarding of any inadmissible passenger if they verbally or physically resists boarding the aeroplane.<br>Which statements are correct?", options: ["All of above", "I-II-III", "II- IV", "II- III- IV"], answer: "II- III- IV" },
            { q: "Which one is NOT correct for refuelling with passengers on board?", options: ["A flight crew member shall remain in the flight deck,", "A two-way communication shall be established and maintained via the aeroplane intercommunication system between the ground crew supervising the refuelling or defueling and the flight crew on board.", "The ramp area beneath the exits intended for emergency evacuation and slide deployment areas shall be kept clear of any obstructions.", "All aeroplane aisle(s) shall be kept clear except passenger meal/beverage servicing"], answer: "All aeroplane aisle(s) shall be kept clear except passenger meal/beverage servicing" },
            { q: "Which one is NOT correct for refuelling with passengers on board?", options: ["A two-way communication shall be established and maintained via the aeroplane inter- communication system between the ground crew supervising the refuelling or defueling and the flight crew on board.", "Fire trucks shall be positioned alongside the aeroplane unless otherwise is dictated by local aerodrome policies.", "“Fasten Seat Belt” signs shall be selected “ON”,", "“No Smoking” signs shall be selected “ON”,"], answer: "“Fasten Seat Belt” signs shall be selected “ON”," },
            { q: "Please choose the correct order of fuel types according to priority of Turkish Airlines:", options: ["Jet A / Jet A-1/ JP 5 / JP 8", "JP 8 / JP 5 / Jet A -1 / Jet A", "Jet A-1/ Jet A / JP 8 / JP 5", "TS-1 / JP 8 / JP 5 / Jet A"], answer: "Jet A-1/ Jet A / JP 8 / JP 5" },
            { q: "After completion of boarding coordinator informed you that passenger count made 2 times and they could not agree with Chief of Cabin about the number of passengers on board, what will you do?", options: ["Ask coordinator to do LMC and close the door.", "Off load all passengers and request a security check.", "Ask Cabin chief to do a last re-count.", "Ask for physical boarding pass check."], answer: "Ask Cabin chief to do a last re-count." },
            { q: "What is the maximum number of unaccompanied minor permitted on A321 aeroplane?", options: ["2", "4", "5", "There is no limit."], answer: "4" },

            { q: "Cabin chief comes to the cockpit and informs you that there is an unaccompanied Blind passenger, what will you do?", options: ["Disembark the blind passenger.", "Ask him/her to sign liability form.", "Request a passenger to escort Blind person.", "Thank cabin chief for information and continue normal operation."], answer: "Thank cabin chief for information and continue normal operation." },
            { q: "Cabin chief comes to the cockpit and informs you that there is a passenger asking about her husband who had a surgical chest operation 1 week ago, what will you do?", options: ["Disembark the passenger", "Ask for medical clearance report", "Ask him/her to sign liability form", "Thank cabin chief for information and continue normal operation"], answer: "Thank cabin chief for information and continue normal operation" },
            { q: "Cabin chief comes to the cockpit and informs you that there is a passenger asking about her husband who is having treatment for cancer, what will you do?", options: ["Disembark the passenger", "Ask for medical clearance report", "Ask him/her to sign liability form", "Thank cabin chief for information and continue normal operation"], answer: "Thank cabin chief for information and continue normal operation" },
            { q: "Which statement below is NOT true about safety precautions during refueling?", options: ["Aeroplane strobe light shall not be switched “ON” or “OFF”.", "Ground Power Unit (GPU) and/or APU may be operating, but shall not be switched “ON” or “OFF”.", "A normal APU shutdown must be completed if a fuel spill has occurred.", "Aeroplane HF radios may be used to transmit and a test of the system can be conducted."], answer: "Aeroplane HF radios may be used to transmit and a test of the system can be conducted." },
            { q: "Cabin chief comes to the cockpit and informs you that there is a passenger who is 30 weeks pregnant, what will you do?", options: ["Disembark the passenger.", "Ask for medical clearance report.", "Ask him/her to sign liability form.", "Nothing, admittance of pregnant passengers are responsibility of ground handling firms and station managers."], answer: "Nothing, admittance of pregnant passengers are responsibility of ground handling firms and station managers." },
            { q: "During two-step de-ice/anti-ice procedures the holdover time begins at:", options: ["completion of de-icing", "completion of anti-icing", "beginning of de-icing", "beginning of anti-icing"], answer: "beginning of anti-icing" },
            { q: "What is the hold over time for %50Type II Fluid in freezing fog conditions when OAT is -1C?", options: ["0:20 - 1:05", "0:15 - 0:30", "0:05 - 0:15", "0:10 - 0:25"], answer: "0:15 - 0:30" },
            { q: "In which situation fuelling shall be stopped?", options: ["Any fire or overheat warning is known or displayed on the flight deck.", "In the event of a fuel spill", "In case of thunderstorms in the vicinity of the aerodrome", "All above"], answer: "All above" },
            { q: "Which statement(s) is (are) correct or incorrect about Policy and Procedures for In-Flight Fuel Management?<br>Expected usable fuel remaining on arrival at the destination aerodrome is not less than:<br>I. the required alternate fuel plus final reserve fuel<br>II. the final reserve fuel if no alternate aerodrome is required", options: ["I is correct, II is correct", "I is incorrect, II is incorrect", "I is incorrect, II is correct", "I is correct, II is incorrect"], answer: "I is correct, II is correct" },
            { q: "During flight, flight crew recognizes that fuel check shows that the expected usable fuel remaining on arrival at the destination aerodrome is less than alternate and final reserve. What action can be done for safe operation?", options: ["Commander will decide whether to proceed to the destination aerodrome or to divert so as to perform a safe landing with not less than final reserve fuel", "Commander can insist to continue to destination regardless of remaning fuel at destination", "Flight can continue only in case an agreement between ATC unit", "Flight crew will provide information to IOCC department and proceed regardless of remaning fuel at destination"], answer: "Commander will decide whether to proceed to the destination aerodrome or to divert so as to perform a safe landing with not less than final reserve fuel" },
            { q: "During flight, flight crew recognizes that fuel check shows that the expected usable fuel remaining on arrival at the destination aerodrome is less than final reserve with no alternate destination flight plan. What action can be done for safe operation?", options: ["Commander shall take appropriate action and proceed to an adequate aerodrome so as to perform a safe landing with not less than final reserve fuel", "Commander can insist to continue to destination regardless of remaning fuel at destination", "Flight can continue only in case an agreement between ATC unit", "Flight crew will provide information to IOCC department and proceed regardless of remaning fuel at destination"], answer: "Commander shall take appropriate action and proceed to an adequate aerodrome so as to perform a safe landing with not less than final reserve fuel" },
            { q: "What does “Minimum Fuel” mean?", options: ["Informs ATC unit that safe landing can be done during planned delay, but any change to existing clearance may result landing less than final reserve", "Informs ATC unit that safe landing can not be done, because fuel will be less than final reserve at landing", "A request for priority message to ATC", "Decleration of emergency situation about fuel"], answer: "Informs ATC unit that safe landing can be done during planned delay, but any change to existing clearance may result landing less than final reserve" },
            { q: "What is (are) required remaining fuel item(s) on a flight using Reduced Contingency Fuel (RCF) Procedure, to proceed to the destination aerodrome (destination 1 aerodrome):<br>I. trip fuel from the decision point to the destination aerodrome<br>II. contingency fuel equal to 5 % of trip fuel from the decision point to the destination aerodrome<br>III. destination aerodrome alternate fuel, if a destination alternate aerodrome is required<br>IV. final reserve fuel.", options: ["I, II", "Only I", "I, III, IV", "I, II, III, IV"], answer: "I, II, III, IV" },
            { q: "What is (are) required remaining fuel item(s) on a flight using Predetermined Point (PDP) Procedure, to proceed to the destination aerodrome:<br>I. trip fuel from the PDP to the destination aerodrome<br>II. contingency fuel from the PDP to the destination aerodrome<br>III. additional fuel", options: ["I, II", "Only I", "I, II, III", "I, III"], answer: "I, II, III" },
            { q: "What does “Commitment to Stay” mean?", options: ["Consuming alternate and final reserve fuel above or near the destination", "passenger decision of staying in the cabin during disembarkation", "holding over alternate aerodrome to land", "Consuming only alternate fuel above or near the destination"], answer: "Consuming only alternate fuel above or near the destination" },
            { q: "In order for a “Commitment to Stay” decision to be taken, which one of the following is NOT required?", options: ["Expected Approach Time (EAT) must be received.", "Two separate (Not intersecting) runways are available.", "Weather conditions at EAT will be at or above the applicable minima.", "One of the runways must be at least 3000 meters long."], answer: "One of the runways must be at least 3000 meters long." },
            { q: "Which of the following is WRONG regarding commitment to stay decision?", options: ["With the commitment to stay decision the Commander can continue to hold consuming Final Reserve Fuel.", "The EAT should be received from ATC so that the Commander may calculate that the remaining fuel after landing will be more than the final reserve fuel.", "Two separate (not intersecting) runways are available", "The weather conditions at EAT (Expected Approach Time) will be at or above the applicable minima for the intended approach."], answer: "With the commitment to stay decision the Commander can continue to hold consuming Final Reserve Fuel." },
            { q: "In exceptional cases for safety reasons, to continue the flight to the destination aerodrome without commitment to stay requirements,", options: ["if commander decides", "is not possible in any case", "if aeroplane can land with alternate and final reserve", "if aeroplane can land with contingency, alternate and final reserve"], answer: "if commander decides" },
            { q: "The Commander shall declare an emergency when calculated usable fuel upon landing at the nearest adequate aerodrome where a safe landing can be performed is less than …", options: ["Final Reserve", "Minimum fuel", "Trip Fuel", "Alternate Fuel"], answer: "Final Reserve" },
            { q: "It …………….. to simulate IMC, abnormal or emergency situations by artificial means (e.g. pulling of circuit breakers) except on non-revenue training flights or test flights.", options: ["is not allowed", "is permitted", "can be permitted", "is possible if commander or examiner demands"], answer: "is not allowed" },
            { q: "Turkish Airlines does not operate to…………...", options: ["uncontrolled airports", "controlled airports", "national airports", "international airports"], answer: "uncontrolled airports" },
            { q: "Cancellation of IFR flight ………..", options: ["is not permitted", "is permitted", "can be permitted", "is possible if commander or examiner demands"], answer: "is not permitted" },
            { q: "Which statement(s) is (are) correct or incorrect?<br>Clearances to maintain “own separation in VMC” or a Visual Approach in order to avoid undue fuel penalties or delays may be accepted or requested by the commander for limited portions of climb, descent or approach under the following conditions:<br>I. relevant traffic can be clearly identified and kept in sight<br>II. There is no requirement that sufficient separation will exist at all times;", options: ["I is correct, II is correct", "I is incorrect, II is incorrect", "I is incorrect, II is correct", "I is correct, II is incorrect"], answer: "I is correct, II is incorrect" },
            { q: "Which statement(s) is (are) correct or incorrect?<br>Clearances to maintain “own separation in VMC” or a Visual Approach in order to avoid undue fuel penalties or delays may be accepted or requested by the commander for limited portions of climb, descent or approach under the following conditions:<br>I. during the daytime<br>II. Under IMC", options: ["I is correct, II is correct", "I is incorrect, II is incorrect", "I is incorrect, II is correct", "I is correct, II is incorrect"], answer: "I is correct, II is incorrect" },

            { q: "All flights to/from VFR classified aerodromes shall be conducted under ……… restrictions in VMC.", options: ["IFR", "VFR", "IFR or VFR", "VFR then IFR"], answer: "IFR" },

            { q: "During descend in IMC conditions, if ATC radar vectors are not available, or MVA is not published, or radar vectors are not acceptable, the Commander shall execute the ……….. procedure as published and descend in accordance with the published ……….", options: ["STAR / IAP", "SID / IAP", "EOSID /EOSID", "STAR / EOSID"], answer: "STAR / IAP" },

            { q: "During climb in IMC conditions, what is correct action if a SID procedure is not available?", options: ["published engine-out procedures may be used", "take off can not be conducted", "take off must be conducted only in VMC", "take off must be conducted only in daytime and VMC"], answer: "published engine-out procedures may be used" },
            { q: "During descend in VMC conditions, Commander may accept radar vectors if ATC issued clearances are……………………….", options: ["at or above the published MVA", "only above the published MVA", "at or below the published MVA", "only below the published MVA"], answer: "at or above the published MVA" },
            { q: "During climb in VMC conditions, radar vectors below the MVA ………….if terrain and obstacle clearance can not be assured by the Commander.", options: ["may be accepted", "shall not be accepted", "can be accepted", "must be accepted"], answer: "may be accepted" },
