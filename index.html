<!DOCTYPE html>
<html lang="tr">
<head>

    <title>type.tv</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root { --primary: #2563eb; --primary-dark: #1e40af; --secondary: #64748b; --success: #22c55e; --danger: #dc2626; --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text-main: #1e293b; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .app-container { background: var(--card); width: 100%; max-width: 900px; min-height: 780px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .page { display: none; flex-grow: 1; padding: 30px; flex-direction: column; animation: fadeIn 0.3s ease-out; }
        .page.active { display: flex; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .login-wrapper { margin: auto; text-align: center; width: 100%; max-width: 400px; }
        .login-input { width: 100%; padding: 16px; border-radius: 8px; border: 2px solid var(--border); background: #f8fafc; font-size: 1.1rem; margin-bottom: 20px; text-align: center; }
        .login-input:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn { background: white; border: 2px solid var(--border); color: #334155; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
        .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }
        .btn-danger { background: #fee2e2; color: var(--danger); border-color: #fecaca; }
        .btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .user-header { position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; align-items: center; gap: 15px; font-size: 0.9rem; color: var(--secondary); background: rgba(255,255,255,0.95); padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logout-link { color: var(--danger); cursor: pointer; font-weight: 600; }
        .stats-card { background: #f8fafc; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; margin-top: auto; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stats-title { font-size: 0.95rem; color: var(--text-main); font-weight: 700; text-transform: uppercase; }
        .stats-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .stat-tab { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--secondary); white-space: nowrap; transition: all 0.2s; }
        .stat-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .stat-tab:hover:not(.active) { background: #e2e8f0; }
        .quiz-row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .quiz-user-badge { font-size: 0.9rem; font-weight: 600; color: var(--primary); background: #eff6ff; padding: 5px 12px; border-radius: 15px; }
        .quiz-row-2 { margin-bottom: 15px; }
        .progress-container { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .quiz-row-3 { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .question-counter { font-weight: 700; color: var(--secondary); font-size: 1rem; }
        .question-text { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; }
        .option-card { padding: 18px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 1.05rem; margin-bottom: 10px; background: white; color: #334155; position: relative; display: flex; align-items: center; }
        .option-key-hint { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; background: #e2e8f0; color: #64748b; border-radius: 4px; margin-right: 12px; font-size: 0.8rem; font-weight: bold; flex-shrink: 0; }
        .option-card:hover { border-color: #94a3b8; background: #f1f5f9; }
        .option-card.correct { background: #dcfce7; border-color: var(--success); color: #14532d; font-weight: 600; }
        .option-card.incorrect { background: #fee2e2; border-color: var(--danger); color: #7f1d1d; }
        .option-card.hint { border-color: var(--success); background: #f0fdf4; color: var(--success); font-weight: 600; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; }
        .btn-prev { background: #e2e8f0; color: #475569; }
        .btn-next { background: var(--primary-dark); color: white; }
        .fast-access-container { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; }
        .fast-access-title { text-align: center; font-size: 0.85rem; color: var(--secondary); margin-bottom: 10px; }
        .access-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 6px; max-height: 150px; overflow-y: auto; padding: 5px; }
        .access-btn { height: 35px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #64748b; cursor: pointer; transition: all 0.1s; }
        .access-btn:hover { background: #e2e8f0; }
        .access-btn.current { border: 2px solid #0f172a; color: #0f172a; font-weight: 800; background: white; transform: scale(1.05); }
        .access-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .access-btn.incorrect { background: var(--danger); color: white; border-color: var(--danger); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { display:none; }
        .slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background-color: #cbd5e1; transition:.3s; border-radius: 34px; }
        .slider:before { position: absolute; content:""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition:.3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }
        .switch-label { font-size: 0.9rem; color: var(--secondary); font-weight: 600; margin-right: 10px; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 20px; font-size: 2.2rem; font-weight: 800; color: var(--text-main); border: 10px solid #e2e8f0; }
        .score-circle.good { border-color: var(--success); color: var(--success); }
        .score-circle.bad { border-color: var(--danger); color: var(--danger); }
        .score-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #64748b; margin-top: 5px; }
        .access-grid::-webkit-scrollbar { width: 6px; }
        .access-grid::-webkit-scrollbar-track { background: #f1f1f1; }
        .access-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        @media screen and (max-width: 768px) {
            body { padding: 0 !important; background-color: white; }
            .app-container { width: 100%; max-width: 100%; border: none; border-radius: 0; box-shadow: none; padding: 10px 12px; min-height: 100vh; }
            .page { padding: 0; }
            .question-text { font-size: 0.9rem !important; line-height: 1.35; font-weight: 600; margin-bottom: 12px; color: #0f172a; }
            .option-card { font-size: 0.85rem !important; padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; min-height: auto; }
            .option-key-hint { width: 18px; height: 18px; line-height: 18px; font-size: 0.7rem; margin-right: 6px; }
            h1 { font-size: 1.2rem !important; margin-top: 5px; margin-bottom: 5px; }
            h2 { font-size: 1rem !important; margin-bottom: 10px; }
            .btn { font-size: 0.8rem; padding: 8px; height: auto; }
            .grid-menu { gap: 8px; grid-template-columns: 1fr; }
            .nav-buttons { margin-top: 15px; gap: 10px; }
            .nav-btn { font-size: 0.8rem; padding: 8px; }
            .stat-tab { padding: 4px 8px; font-size: 0.7rem; }
            .user-header { position: relative; top: 0; right: 0; margin-bottom: 10px; justify-content: flex-end; border: none; background: none; box-shadow: none; padding: 0; }
            #quiz-title { font-size: 0.85rem !important; font-weight: 700 !important; max-width: 50%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        }
    </style>
</head>

            { q: "When hot air \"fault\" light comes ON, on the air conditioning panel due to overheat :", options: ["The hot air press regulating valve closes and the trim air valves close.", "The hot air press regulating valve opens and the trim air valves close.", "The hot air press regulating valve closes and trim air valves open."], answer: "The hot air press regulating valve closes and the trim air valves close." },
            { q: "During normal flight and with skin temp below threshold, the avonics ventilation system controls the temperature of the cooling air by :", options: ["Adding air from the cockpit.", "Passing air through a skin heat exchanger.", "Adding conditioned air to the flow.", "Extracting air from overboard."], answer: "Passing air through a skin heat exchanger." },
            { q: "The ram air switch should be used :", options: ["At any time.", "Only when the diff press is less than 1 PSI.", "When the diff press is greater than 1 PSI.", "Only when outflow valve is fully closed."], answer: "Only when the diff press is less than 1 PSI." },
            { q: "Pack flow control valve:", options: ["Pneumatically-operated and electrically-controlled.", "Electrically-operated and pneumatically-controlled", "Electrically operated and controlled."], answer: "Pneumatically-operated and electrically-controlled." },
            { q: "What happens in case of failure of the secondary channel of the pack controllers ?", options: ["No effect on pack regulation, back up mode is lost.", "Pack is lost.", "No effect."], answer: "No effect on pack regulation, back up mode is lost." },
            { q: "What happens in case of failure of the primary and secondary channels of the pack controllers ?", options: ["Pack outlet temperature is controlled by the ANTI-ICE valve", "The pack is closed."], answer: "Pack outlet temperature is controlled by the ANTI-ICE valve" },
            { q: "What happens if the hot air press Reg valve fails open ?", options: ["Optimised regulation is lost.", "The temperature stays at the value selected when the failure occurred.", "No effect."], answer: "No effect." },
            { q: "When bleed air is supplied from the APU (APU bleed valve open), the pack flow is automatically selected :", options: ["High or 120% of the normal flow", "Normal", "Low"], answer: "High or 120% of the normal flow" },
            { q: "Each trim air valve optimizes the temperature by:", options: ["Adding hot air.", "Adding fresh air.", "Modulation of pack flow."], answer: "Adding hot air." },
            { q: "The hot air pressure regulating valve :", options: ["Regulates the pressure of hot air trapped upstream of the packs.", "Is springloaded open in the absence of air.", "Opens automatically in case of duct overheat."], answer: "Regulates the pressure of hot air trapped upstream of the packs." },
            { q: "The pack flow control valve is:", options: ["Pneumatically operated and electrically controlled.", "Electrically operated and pneumatically controlled.", "Opens automatically during engine starting."], answer: "Pneumatically operated and electrically controlled." },
            { q: "The temperature selectors are located in :", options: ["The cockpit.", "The cabin.", "Both."], answer: "The cockpit." },
            { q: "Pack flow may be selected from:", options: ["The cockpit.", "The cabin.", "Both."], answer: "The cockpit." },
            { q: "For engine pressure demand, when the heating or cooling demand in one zone cannot be satisfied :", options: ["The minimum idle must be increased manually.", "The minimum idle is increased automatically by both EIUs.", "In any case, flight idle is sufficient."], answer: "The minimum idle is increased automatically by both EIUs." },
            { q: "What is the max norm CAB ALT ?", options: ["8.000 FT", "9.550 + 350 FT", "14.000 FT"], answer: "8.000 FT" },
            { q: "What is the max negative differential pressure for the cabin ?", options: ["0 PSI", "-1 PSI", "-2 PSI"], answer: "-1 PSI" },
            { q: "Is it possible to simultaneously use packs and LP ground unit during long stops in hot airfied ?", options: ["Yes", "No", "Yes, if external temperature is > 50 C"], answer: "No" },
            { q: "The Trim air valves are electrically-controlled by :", options: ["The air conditioning system controllers or the zone controller", "Pack controllers.", "Hot air pressure regulating valve."], answer: "The air conditioning system controllers or the zone controller" },
            { q: "The mixing unit is connected to :", options: ["Packs, cabin air, emergency ram air inlet and LP ground connector.", "Packs, emergency ram air inlet and LP ground connector.", "Packs and cabin air."], answer: "Packs, cabin air, emergency ram air inlet and LP ground connector." },
            { q: "Once set to \"ON\" the air conditioning packs operate :", options: ["Automatically and independently of each other.", "Manually and independently of each other.", "Automatically, pack 1 as master, pack 2 as slave."], answer: "Automatically and independently of each other." },
            { q: "When the ram air push button is \"ON\": the The outflow valve opens about 50%, provided that it is under automatic control and ∆P is less than one psi.", options: ["true", "false"], answer: "true" },
            { q: "In case of air conditioning system controller 1, both lanes failure:", options: ["The related pack is lost, and the hot air pressure regulating valve and associated trim air valves close.", "No effect, as the third lane takes over.", "The outlet temperature for pack 1 and 2 is fixed at 15ºC (69ºF )."], answer: "The related pack is lost, and the hot air pressure regulating valve and associated trim air valves close." },
            { q: "Conditioned air is distributed to:", options: ["Cockpit , cargo bays and cabin.", "Cockpit , forward and AFT cabin.", "Cockpit , avionics bay , cabin."], answer: "Cockpit , forward and AFT cabin." },
            { q: "The cabin zone temperature sensors are ventilated by the air extracted by the lavatory and gallery fans:", options: ["True", "False"], answer: "True" },
            { q: "Temperature regulation is controlled by:", options: ["Mixer unit.", "Air cycle machines.", "Air conditioning system controllers."], answer: "Air conditioning system controllers." },
            { q: "If air conditioning system controller 2, single lane failure occurs:", options: ["The related pack is lost, and the hot air pressure regulating valve and associated trim air valves close", "Each controller is comprised of three lanes.", "No effect, as the second lane takes over."], answer: "No effect, as the second lane takes over." },
            { q: "The ram air inlet flaps position during take off and landing:", options: ["Fully open to increase airflow with the low airspeed.", "Closed to avoid ingestion of foreign matter.", "Partially open."], answer: "Closed to avoid ingestion of foreign matter." },

            { q: "AIRCRAFT ON RWY CENTERLINE, READY FOR TAKE-OFF. TO PRESET A HDG OF 233º: ", options: ["PULL HDG KNOB TO DISARM NAV MODE, SET 233º AND PRESS HDG KNOB TO ENGAGE", "TURN HDG KNOB, SET 233º AND PULL TO ARM", "TURN HDG KNOB, SET 233º AND PULL HDG KNOB WHEN ATC CLEARS TO TURN TO 233º"], answer: "TURN HDG KNOB, SET 233º AND PULL HDG KNOB WHEN ATC CLEARS TO TURN TO 233º" },
            { q: "WHICH OF THE SRS DISENGAGEMENT CONDITIONS IS NOT TRUE ?", options: ["DISENGAGES AUTOMATICALLY AT FCU ALT", "DISENGAGES AUTOMATICALLY AT ACCELERATION ALTITUDE", "DISENGAGES BY MANUALLY PULLING THE ALTITUDE KNOB", "DISENGAGES BY SETTING A NEW FCU ALTITUDE"], answer: "DISENGAGES BY SETTING A NEW FCU ALTITUDE" },
            { q: "CONTROL OF THE A/C CAN BE AUTOMATIC OR MANUAL. GUIDANCE OF THE A/C CAN BE MANAGED OR SELECTED. HOW DO YOU UNDERSTAND THIS SITUATION : MANAGED GUIDANCE - MANUAL CONTROL - SELECTED SPEED :", options: ["FMGC COMPUTES AND SENDS STEERING ORDERS FOR NAVIGATION PURPOSES. THE PILOT FLIES USING THE SIDE STICK. SPEED IS ADJUSTED IN THE FCU WINDOW.(KNOB HAS BEEN PULLED).", "THE AUTOPILOT FOLLOWS THE F-PLN. THE PILOT SETS THE NECESSARY DATA FOR LONGITUDINAL AND LATERAL CONTROL OF THE A/C. THE TARGET SPEED IS COMPUTED AND DISPLAYED BY THE FMGC."], answer: "FMGC COMPUTES AND SENDS STEERING ORDERS FOR NAVIGATION PURPOSES. THE PILOT FLIES USING THE SIDE STICK. SPEED IS ADJUSTED IN THE FCU WINDOW.(KNOB HAS BEEN PULLED)." },
            { q: "A HOLD HAS BEEN ENTERED IN THE F-PLN, SPEED AND NAV ARE MANAGED. YOU WANT TO LEAVE THIS HOLD : ", options: ["USE THE CLR KEY", "HOLD IS AUTOMATICALLY CANCELLED WHEN OVERFLYING THE FIX", "ACTIVATE \"IMM EXIT\" PROMPT"], answer: "ACTIVATE \"IMM EXIT\" PROMPT" },
            { q: "FOR A/C POSITION DETERMINATION, FMGC USES DATA FROM :", options: ["DME, VOR OR ILS SYSTEMS", "CLOCKS+GROUND SPEED COMPUTATION", "3 ADIRS", "A AND C"], answer: "A AND C" },
            { q: "In flight, following a manual position up-dating of the FMGC :", options: ["It is also necessary to up-date the IRS position", "An IRS cannot be up-dated while the A/C is in motion"], answer: "An IRS cannot be up-dated while the A/C is in motion" },
            { q: "Tuning of VOR/DME and ILS are provided by :", options: ["Automatic tuning, Manual tuning, Back up tuning", "Automatic tuning, Manual tuning", "Automatic tuning, Back up tuning"], answer: "Automatic tuning, Manual tuning, Back up tuning" },
            { q: "When expedite mode is active, to disengage it, which statements is not correct :", options: ["Pull the V/S-FPA knob", "Pull the SPD knob", "Pull the ALT knob", "Press the EXPD push button again to cancel this mode"], answer: "Press the EXPD push button again to cancel this mode" },
            { q: "What are the basic modes of the AP/FD :", options: ["Pitch and roll", "V/S and HDG", "Alt and nav", "Spd and hdg"], answer: "V/S and HDG" },
            { q: "During an ILS approach, the engagement of both autopilots is possible:", options: ["When \"LAND\" illuminates green on FMA", "When A/C is stabilized at G/S interception altitude", "As soon as the LOC has been intercepted", "After APPR push button switch is pressed and illuminated"], answer: "After APPR push button switch is pressed and illuminated" },
            { q: "The align light flashes :", options: ["If IR alignment fault or no present position entry after 10 minutes", "If the difference between position at shut down and entered position, exceeds 1º of latitude or longitude", "When alignment has been completed", "Both A and B"], answer: "Both A and B" },
            { q: "Can you read the HDG on the PFD :", options: ["Yes", "No"], answer: "Yes" },
            { q: "If the flight augmentation computer detects that the angle of attack is above a predetermined threshold, which is a function of the configuration:", options: ["Stall warning is activated", "THR LK starts flashing on FMA", "Alpha floor protection is triggered"], answer: "Alpha floor protection is triggered" },
            { q: "During an ILS Cat III Dual approach with a DH of 20 feet, a failure of one engine below alert height causes landing capability to downgrade and you must initiate a go-around.", options: ["True", "False"], answer: "False" },
            { q: "During an ILS approach, the NAV mode will be deactivated at :", options: ["Glideslope capture", "Localizer capture", "A+B"], answer: "Localizer capture" },
            { q: "Can you display FD bars and FPV at the same time, for cross-checking on different pfd's", options: ["Yes", "No"], answer: "No" },
            { q: "Maximum wind conditions for Cat II or Cat III automatic approach landing and roll out:", options: ["Headwind 30kt, tailwind 10kt, crosswind 20kt", "Headwind 40kt, tailwind 10kt, crosswind 15kt", "Headwind 20kt, tailwind 10kt, crosswind 20kt"], answer: "Headwind 30kt, tailwind 10kt, crosswind 20kt" },
            { q: "The continuous cavalry charge audio identifies only one of the following situations :", options: ["Over speed for the actual A/C configuration", "Fire or oil low press on one engine", "Autopilot disengagement", "Auto land warning, requiring a GO ARAUND"], answer: "Autopilot disengagement" },
            { q: "Setting the thrust levers to IDLE will disengage the A/THR mode. A/THR will be armed and activated", options: ["As soon as the thrust levers position is changed", "When the A/THR pushbutton on FCU is pressed", "Provided the levers are set in CLB detent", "Thrust levers must be moved from IDLE position before A/THR pushbutton on FCU is pressed"], answer: "When the A/THR pushbutton on FCU is pressed" },
            { q: "In one of the cases listed below, A/THR will not disengage :", options: ["When the two thrust levers are set to IDLE position", "Pressing the A/THR push button on the FCU", "When the aural warning announces \"RETARD !\"", "Pressing the instinctive disconnect button"], answer: "When the aural warning announces \"RETARD !\"" },
            { q: "The LOC pushbutton on the FCU, is pressed to ARM the LOC mode. This mode can also be used for tracking a VOR beam if a VOR fequency is set on the RAD NAV page.", options: ["True", "False"], answer: "False" },
            { q: "What does a triple click mean, during an ILS approach :", options: ["A/P disconnection due to failure", "A primary failure is occuring, prepare for a go around", "Flaps are set at config3 and the landing gear is not down", "Landing capability downgrade"], answer: "Landing capability downgrade" },
            { q: "The active F-PLN is erased when :", options: ["The pilot calls the A/C status page", "The wheels touch the runway at landing", "The A/C has been on ground for 30 seconds following the landing", "One engine is shut down at parking place"], answer: "The A/C has been on ground for 30 seconds following the landing" },
            { q: "Following a dual engine generator failure with the emergency generator supplying the A/C :", options: ["FMGC 1 is available (NAV function only)", "FMGC 2 only is available", "Both FMGCs are available", "No FMGC is available"], answer: "FMGC 1 is available (NAV function only)" },
            { q: "In which case are : AP/FD, ATS and landing capacities totally lost :", options: ["Failure of 2 IRS's or failure of 2 ADR's", "Failure of 2 RA's", "Failure of 2 ILS's", "Failure of both FAC's"], answer: "Failure of 2 IRS's or failure of 2 ADR's" },
            { q: "The parameter which triggers the alpha floor protection is :", options: ["Speed", "Bank angle", "Pitch", "Angle of attack"], answer: "Angle of attack" },
            { q: "Rudder travel limitation is a function of :", options: ["FAC only", "FAC in normal and ELAC in alternate", "ELAC only", "ELAC in normal and FAC in alternate"], answer: "FAC only" },
            { q: "When the two yaw damper functions are engaged :", options: ["Yaw damper 1 has priority, yaw damper actuator 2 is slaved", "Yaw damper 2 has priority, yaw damper actuator 1 is slaved", "Yaw damper 1 and 2 are active, the two actuators pressurized", "A hydraulic device gives priority to yaw damper 1"], answer: "Yaw damper 1 has priority, yaw damper actuator 2 is slaved" },
            { q: "The FMGC internal test is automatically performed :", options: ["On ground, at computer power up", "In case of discrepancy between 2 computers", "In flight when a failure occurs", "In flight at autopilot engagement"], answer: "On ground, at computer power up" },
            { q: "When the two rudder trim functions are engaged :", options: ["Rudder trim 1 and 2 control their motors together", "Rudder trim 1 controls the single trim motor", "Rudder trim 1 controls its motor, rudder trim 2 is in standby", "A mechanical device gives priority to rudder trim 1"], answer: "Rudder trim 1 controls its motor, rudder trim 2 is in standby" },
            { q: "Each FMGC is devided into two main parts :", options: ["Flight guidance and flight envelope protection", "Flight management and flight envelope protection", "Flight management and flight guidance", "Flight envelope protection and yaw axis control"], answer: "Flight management and flight guidance" },
            { q: "The trim function of the FAC is :", options: ["Pitch trim", "Rudder trim", "Aileron trim", "Pitch trim and rudder trim"], answer: "Rudder trim" },
            { q: "In flight, in case of temporary loss of electrical power on FAC 2, FAC 2 P/B \"FAULT\" comes on and :", options: ["It will be automatically reset", "It can be manually reset and the safety tests are performed", "It can be manually reset and safety tests are not performed", "There is no way to re-engage FAC 2"], answer: "It can be manually reset and safety tests are not performed" },
            { q: "The Flight Management Guidance System computers are:", options: ["FMGCs and ELACs", "FMGCs and SECs", "FMGCs and FACs", "ELACs and SECs"], answer: "FMGCs and FACs" },
            { q: "With AP1 and AP2 not engaged, FD1 and FD2 engaged an A/THR active :", options: ["FMGC1 controls engine 1, FMGC2 control engine 2", "FMGC1 controls both engines", "FMGC2 controls both engines", "Flight controls and engines are controlled by only one FMGC"], answer: "FMGC1 controls both engines" },
            { q: "In normal operation, with the two MCDU showing the same page, A modification made by the pilot on MCDU1 is sent to MCDU2 :", options: ["Directly", "Via FMGC1", "Via FMGC1 AND FMGC2", "Via FMGC1, FMGC2 and RMP2"], answer: "Via FMGC1 AND FMGC2" },
            { q: "The Flight Guidance part of the FMGS controls:", options: ["Autopilot, fligth plan, autothrust", "Autopilot, performance, flight plan", "Autopilot, flight director, autothrust", "Flight management, autopilot, autothrust"], answer: "Autopilot, flight director, autothrust" },
            { q: "The position of the aircraft, used in the flight plan is computed by :", options: ["FG part of the FMGC", "FM part of the FMGC", "The DMC", "The MCDU"], answer: "FM part of the FMGC" },
            { q: "The flight director is engaged :", options: ["By pressing the FD push button on the FCU", "Automatically at system power up", "By selecting a mode on the FCU", "By selecting the init page on the MCDU"], answer: "Automatically at system power up" },
            { q: "With autopilot engaged, the rudder is normally controlled by :", options: ["The FMGC", "The FAC", "The ELAC", "The SEC"], answer: "The FAC" },
            { q: "The normal FMGC operation is :", options: ["Only one FMGC can operate at a time", "FMGC 1 has priority, FMGC 2 is in standby", "FMGC's operate according to master/slave principle", "FMGC's operate independently"], answer: "FMGC's operate according to master/slave principle" },
            { q: "The FCU alllows :", options: ["Modification of the flight plan of FM part", "Selection of FG function modes", "Selection of radio-nav frequencies", "IRS alignment"], answer: "Selection of FG function modes" },
            { q: "In cruise, lateral ap orders are executed by :", options: ["Ailerons and spoilers", "Ailerons and rudder", "Rudder and spoilers", "Ailerons, spoilers and rudder"], answer: "Ailerons, spoilers and rudder" },
            { q: "With the aircraft in flight, AP engaged and A/THR active, the A/THR MODE :", options: ["Can be chosen by the pilot on the FCU", "Can be chosen by the pilot on the MCDU", "Depends on the AP lateral mode", "Depends on the AP longitudinal mode"], answer: "Depends on the AP longitudinal mode" },
            { q: "With the aircraft in flight, A/THR not engaged, thrust levers at IDLE, an alpha-floor is detected :", options: ["A/THR does not engage because the thrust levers are at IDLE", "A/THR is automatically armed but will not be active", "A/THR automatically engages and sets CLB thrust on the engines", "A/THR automatically engages and sets TO/GA thrust on the engines"], answer: "A/THR automatically engages and sets TO/GA thrust on the engines" },
            { q: "The FAC computes rudder travel limit", options: ["Only when AP is engaged", "Only at low speed", "Only in case of ELAC failure", "Always"], answer: "Always" },
            { q: "With AP engaged in land mode, the yaw damper actuator is controlled by :", options: ["A yaw order computed by the FAC", "A dutch roll damping order computed by the FAC", "A turn coordination order computed by the FAC", "An AP yaw order computed by the FMGC, via the FAC"], answer: "An AP yaw order computed by the FMGC, via the FAC" },
            { q: "On the second line of the FMA ", options: ["ALT can be only in green or magenta", "ALT in blue indicates that ALT mode is active", "ALT in blue indicates that ALT mode is armed", "ALT in blue indicates that ALT mode is active or an FM altitude constraint"], answer: "ALT in blue indicates that ALT mode is armed" },
            { q: "With the thrust levers in the CLB detent and autothrust is disconnected via autothrust pushbutton on th FCU, thrust setting on the engines:", options: ["Is increased to CLB thrust limit", "Is frozen at the existing thrust", "Corresponds to the thrust levers position", "Progressively becomes equal to the thrust levers position"], answer: "Is frozen at the existing thrust" },
            { q: "When thrust levers are set for take-off:", options: ["A/THR automatically engages and is active", "A/THR automatically engages but is not active", "A/THR does not automatically engage", "A/THR does not automatically engage and the engines are controlled by the last thrust target"], answer: "A/THR automatically engages but is not active" },
            { q: "ADIRU 3 CAN SUPPLY INFORMATION TO :", options: ["DMC 1 AND DMC 2 ONLY", "DMC 1 AND DMC 3 ONLY", "DMC 2 AND DMC 3 ONLY", "DMC 1, DMC 2 AND DMC 3"], answer: "DMC 1, DMC 2 AND DMC 3" },
            { q: "Air Data Modules (ADMs) convert pneumatic data into numerical data for the ADIRUs, which is supplied from:", options: ["All pitot probes and static ports", "Pitot probes only", "Static ports only", "Captain and F/O pitot probes and static ports only"], answer: "All pitot probes and static ports" },
            { q: "ADIRU 3 RECEIVES TAT INFORMATION FROM :", options: ["THE CAPTAIN'S TAT SENSOR", "THE FIRST OFFICER'S TAT SENSOR", "THE CAPTAIN AND FIRST OFFICER'S TAT SENSORS", "THE STAND-BY TAT SENSOR"], answer: "THE CAPTAIN'S TAT SENSOR" },
            { q: "The baro reference is sent to each ADIRU via:", options: ["The master FMGC", "The FCU", "The RMPS", "The DMCS"], answer: "The FCU" },
            { q: "IN FLIGHT, THE FMGS POSITION IS AUTOMATICALLY UPDATED :", options: ["USING DATA FROM THE SELECTED NDB, VOR OR DME STATIONS", "WHENEVER A DME STATION IS SELECTED BY THE PILOT", "BY THE DME'S THROUGH THE AUTOTUNING FUNCTION"], answer: "BY THE DME'S THROUGH THE AUTOTUNING FUNCTION" },
            { q: "EACH ADIRU RECEIVES TWO ANALOG INPUTS, THEY ARE :", options: ["ANGLE OF ATTACK (AOA) AND TOTAL AIR TEMPERATURE (TAT)", "ANGLE OF ATTACK (AOA) AND BARO CORRECTION OR REFERENCE", "TOTAL AIR TEMPERATURE (TAT) AND BARO CORRECTION OR REFERENCE", "FMGC STATUS AND BARO CORRECTION OR REFERENCE"], answer: "ANGLE OF ATTACK (AOA) AND TOTAL AIR TEMPERATURE (TAT)" },
            { q: "In normal operation, the ADIRUs are aligned using position information from:", options: ["The ADIRS CDU", "The CFDS", "The FCU", "The MCDU"], answer: "The MCDU" },
            { q: "IF ADIRU 2 FAILS, THE CORRECT ACTION IS :", options: ["Set ATT HDG and AIR DATA selectors to CAPT 3", "Set ATT HDG and AIR DATA selectors to F/O 3", "Set ATT HDG SELECTOR to CAPT 3 and AIR DATA selector to F/O 3", "Set ATT HDG SELECTOR to F/O 3 and AIR DATA selector to CAPT 3"], answer: "Set ATT HDG and AIR DATA selectors to F/O 3" },
            { q: "IN NORMAL OPERATION ADIRU 1 SUPPLIES INFORMATION TO :", options: ["THE CAPTAIN'S PFD AND THE FIRST OFFICER'S ND", "THE CAPTAIN'S ND AND THE FIRST OFFICER'S PFD", "THE CAPTAIN'S PFD AND ND", "THE FIRST OFFICER'S PFD AND ND"], answer: "THE CAPTAIN'S PFD AND ND" },
            { q: "IN ROSE NAV MODE WITH VOR 1 SELECTED, THE ND DISPLAYS WHAT VOR INFORMATION : ", options: ["DEVIATION BAR, SELECTED COURSE AND THE BEARING POINTER", "BEARING POINTER ONLY", "DEVIATION BAR AND SELECTED COURSE ONLY", "DEVIATION BAR AND BEARING POINTER ONLY"], answer: "BEARING POINTER ONLY" },
            { q: "IN ROSE ILS MODE, WHAT ILS INFORMATION DOES THE ND DISPLAY : ", options: ["G/S AND LOC SCALES", "DEVIATION BAR AND SELECTED COURSE", "DEVIATION BAR, SELECTED COURSE AND G/S SCALE", "DEVIATION BAR, SELECTED COURSE, G/S AND LOC SCALES"], answer: "DEVIATION BAR, SELECTED COURSE, G/S AND LOC SCALES" },
            { q: "During an ILS approach with FDs ON, \"LAND\" illuminates in green on FMA when radio altitude is below:", options: ["1.000 ft", "200 ft", "700 ft", "400 ft"], answer: "400 ft" },
            { q: "IN THE EVENT OF NO ADF1 RECEPTION, WITH ADF1 SELECTED ON ND :", options: ["THE BEARING POINTER GOES OUT OF VIEW AND ADF FLAG IS DISPLAYED", "THE BEARING POINTER GOES OUT OF VIEW AND STATION ID IS REPLACED BY RED CROSSES", "THE BEARING POINTER GOES RED AND STATION ID IS REPLACED BY FREQUENCY", "THE BEARING POINTER GOES OUT OF VIEW AND STATION ID IS REPLACED BY FREQUENCY"], answer: "THE BEARING POINTER GOES OUT OF VIEW AND STATION ID IS REPLACED BY FREQUENCY" },
            { q: "ON THE ND, IN THE EVENT OF VOR RECEIVER FAILURE :", options: ["THE RED VOR FLAG IS DISPLAYED. THE COURSE POINTER BECOMES RED", "THE VOR BEARING BECOMES RED AND THE COURSE POINTER DISAPPEARS", "THE VOR BEARING AND THE COURSE POINTER DISAPPEAR", "THE VOR BEARING FLASHES AND THE COURSE POINTER DISAPPEARS"], answer: "THE RED VOR FLAG IS DISPLAYED. THE COURSE POINTER BECOMES RED" },
            { q: "DURING TAKE-OFF AND GO AROUND.THE SPEED WINDOW ON THE FCU DISPLAYS :", options: ["THE SPEED MANUALLY INSERTED BY THE CREW INTO THE FCU AND THE LIGHT IS OUT", "THE SPEED MANUALLY INSERTED BY THE CREW INTO THE MCDU AND THR LIGHT IS ILLUMINATED", "DASHES AND THE DOT ARE ILLUMINATED WHITE : MANAGED SPEED SUCH AS V2 OR MEMORIZED VAPP ARE AUTOMATICALLY USED BY THE FMGS"], answer: "DASHES AND THE DOT ARE ILLUMINATED WHITE : MANAGED SPEED SUCH AS V2 OR MEMORIZED VAPP ARE AUTOMATICALLY USED BY THE FMGS" },
            { q: "THE FOLLOWING AP/FD LATERAL MODES ARE MANAGED :", options: ["NAV, HDG, APPR, LOC, RWY, RWY TRK", "HDG, NAV, APPR, LOC, GA TRK", "NAV, APPR NAV, LOC, RWY, RWY TRK, GA TRK, LAND, ROLL OUT"], answer: "NAV, APPR NAV, LOC, RWY, RWY TRK, GA TRK, LAND, ROLL OUT" },
            { q: "ON GROUND, THE ENGAGEMENT OF THE AUTOTHRUST FUNCTION :", options: ["IS AUTOMATIC AT THE ENGAGEMENT OF THE TAKE OFF MODES OF THE FD(OR PROVIDED AT LEAST ONE FD IS ON)", "MUST BE CARRIED OUT MANUALLY BY THE CREW BEFORE TAKE OFF", "IS PERFORMED AUTOMATICALLY UPON THE SECOND ENGINE START"], answer: "IS AUTOMATIC AT THE ENGAGEMENT OF THE TAKE OFF MODES OF THE FD(OR PROVIDED AT LEAST ONE FD IS ON)" },
            { q: "CLIMBS AND DESCENTS ARE ALWAYS RESTRICTED :", options: ["BY THE ALTITUDE MANUALLY SELECTED ON THE FCU", "BY THE AIRCRAFT WEIGHT CALCULATED BY THE FMGC", "BY FLIGHT PLAN (T/C) AND (T/D) POINTS"], answer: "BY THE ALTITUDE MANUALLY SELECTED ON THE FCU" },
            { q: "Complete IRS alignment: ADIRS selector...............................................................OFF for ……..then NAV.", options: ["more than 5 s", "more than 10s", "within 5 s", "more than 6 s"], answer: "more than 5 s" },
            { q: "Fast IRS alignment: ADIRS selector................................................. OFF then back to NAV ……….. s.", options: ["more than 5 s", "more than 10s", "within 5 s", "more than 6 s"], answer: "within 5 s" },
            { q: "ENHANCED GROUND PROXIMITY WARNING SYSTEM (EGPWS) If the TERR ON ND is not selected, and a terrain alert is generated, the terrain is automatically displayed on the ND.", options: ["TRUE", "FALSE"], answer: "TRUE" },
            { q: "THE LOUDSPEAKER ANNOUNCES “RETARD” AT … OR … IF AUTOTRUST IS ACTIVE AND ONE AP IS IN LAND MODE", options: ["20 feet or 10 feet", "20 feet or 5 feet", "50 feet or 10 feet", "100 feet"], answer: "20 feet or 10 feet" },
            { q: "WINDSHEAR ALERTS ARE INHIBITED ABOVE … KNOT AND UP TO… FEET", options: ["100 knot 40 feet", "100 knot 50 feet", "50 knot 100 feet", "100 knot 100 feet"], answer: "100 knot 50 feet" },
            { q: "FLAP MODE PUSHBUTTON \"OFF\" SELECTION INHIBITS \"TOO LOW FLAPS\" CAUTION", options: ["TRUE", "FALSE"], answer: "TRUE" },
            { q: "ALL TA AURAL MESSAGES ARE INHIBITED BELOW 600 FT IN CLIMB AND BELOW 400 FT IN DESCENT.", options: ["TRUE", "FALSE"], answer: "TRUE" },
            { q: "THE FWC GENERATES A SYNTHETIC VOICE FOR RADIO HEIGHT ANNOUNCEMENT BELOW;", options: ["2350 FT", "2500 FT", "1600 FT", "1000 FT"], answer: "2500 FT" },

        sop_english: [
            { q: "Which one is wrong for MCDU programming and using FCU?", options: ["When flying manually, MCDU programming shall be accomplished by the PNF.", "Below 10,000' even with an autopilot engaged, PF must not program the MCDU.", "During manual flight, it is recommended that ATC instructions requiring FCU changes be read back to the ATC unit and then immediately programmed by the PNF upon PF‟s request.", "During manual flight ATC instructions requiring FCU changes be performmed by PF."], answer: "During manual flight ATC instructions requiring FCU changes be performmed by PF." },
            { q: "When/where should we start to approach briefings?", options: ["To prevent any rush in initiating the descent and the resulting increased workload in conducting the approach, should be started latest 10 minutes / 80 NM before reaching the top of descent,", "When ATIS information is received.", "At the top of descent point.", "To prevent any rush in initiating the descent and the resulting increased workload in conducting the approach, the descent preparation and the approach and go around or low visibility approach briefings typically should be started 20 NM before reaching the top of descent, when ATIS information is received. if not received it should be done according to the expected landing runway ."], answer: "To prevent any rush in initiating the descent and the resulting increased workload in conducting the approach, should be started latest 10 minutes / 80 NM before reaching the top of descent," },

            { q: "Who must be made , “1000 TO GO” call-out At 1000ft to the target altitude for reducing the rate of climb to a maximum of 1000ft/min considering speed decay. V/S should be arranged so as to be maintaining a maximum of 1000fpm within the last 1000ft?", options: ["PF", "PNF", "Safety Pilot", "There is no call-out"], answer: "PNF" },
            { q: "Which one is wrong answer for noise management in the cocpit?", options: ["Headsets shall be put on before “BEFORE START”, and may be taken off at TOC. Headsets shall also be put on before TOD and shall be kept on until after parking.", "When a flight crew member leaves the cockpit, the other flight crew member shall put on his headset and make sure that VHF-1 volume level is turned up. Crew member remaining in the cockpit shall give a short briefing about the phase of the flight when the other crew member returns in to the cockpit.", "Below 10,000ft AGL, there shall be no conversation in the cockpit that is related to the execution of the flight.", "Any misinterpreted or unclear information by the ATC shall first be confirmed by the other flight crew member. If uncertainty remains, flight crew member in charge of ATC communications shall verify information with the ATC."], answer: "Below 10,000ft AGL, there shall be no conversation in the cockpit that is related to the execution of the flight." },
            { q: "What can we say about the pushback procedures?", options: ["Good communication between the flight deck and ground personnel is essential for a safe pushback operation.", "Parking brake shall not be released without confirmation of ground crew that they are ready for “Push Back”. “Brake Released and Clear for Push Back” callout should be announced to the headset operator before commencing push back.", "The headset operator, who is walking in the vicinity of the nose wheels, should be visible.", "All above are correct."], answer: "All above are correct." },
            { q: "PNF will make a call-out “ ’STABILIZED’ or ‘UNSTABILIZED and GO AROUND FLAPS’ at 1000ft. OR 500ft AAL.", options: ["“1000ft” (Straight in) OR “500ft” (non Straight in)", "“500ft” (Straight in) OR “1000ft” (non Straight in)", "“1000ft” ( non Straight in) OR “500ft” (Straight in)", "“1500ft” ( non Straight in) OR “1000ft” (Straight in)"], answer: "“1000ft” (Straight in) OR “500ft” (non Straight in)" },

            { q: "Which one is the wrong action after landing?", options: ["Runway exit or ground spoiler disarm will normally be the cue for CM2 to begin the \"AFTER LANDING CHECKLIST‟. When a situation requires a lengthy taxi on the runway (e.g. backtrack), the CM1 may initiate the relevant checklist when the aircraft has decelerated to taxi speed. CM2 will complete this check and then announce \"AFTER LANDING CHECKLIST COMPLETE‟.", "After landing, controls of “Lights Switches” are Captain's responsibility. However CM2 may remind the captain in case of deviation and may use this control after Captain‟s approval.", "CM2 shall involve in any other unnecessary items (i.e. stowing the AIP charts, recording the Flight Log Book, Maintenance Book etc.) after completing procedures and checklists.", "If icing conditions have been encountered during approach and landing, CM2 shall have Captain's approval before retracting flaps"], answer: "If icing conditions have been encountered during approach and landing, CM2 shall have Captain's approval before retracting flaps" },
            { q: "Which one is the wrong executions of procedurs for parking?", options: ["During final turn to parking position, CM2 shall switch APU Bleed ON and turn TAXI and TURN OFF LIGHT off with the CM1's discretion.", "Captain shall check “BRAKE PRESS” on “BRAKES and ACCUM PRESS indicator” after setting parking brake ON. Release parking brake only after having ascertained by verbal confirmation or by a visual check of the cockpit crew that chocks are correctly positioned.", "Beacon and Seat Belts should switched to OFF position when N2 is below %20.", "Cockpit door shall be closed until last passenger left the aircraft that informed by senior cabin attendant."], answer: "During final turn to parking position, CM2 shall switch APU Bleed ON and turn TAXI and TURN OFF LIGHT off with the CM1's discretion." },
            { q: "When an abnormal situation occurs, the following guidelines apply:<br>- Abnormal Recognition<br>- Analyze The Situation<br>- Take The Proper Action<br>- Apply Recommended Procedures And Other Agreed Actions", options: ["True", "False"], answer: "True" },

            { q: "STP-NON-0001 Which one(s) of the following approaches is/are classified as a steep approach procedure based on their descent angle according to ICAO regulations?<br>I. LTFJ ILS Z or LOC Z Rwy 0GL CAT1 (Descent Angle 3.50)<br>II. HDAM VOR Ry 0U (Descent Angle 3,GG)<br>III. LFML RNP Z Rwy 31L (Descent Angle 4.00)", options: ["II and III"], answer: "II and III" },
            { q: "RVS-NON-0004 Which one of the following is correct about the prescribed in-flight procedures for RVSM airspace regarding altimeter checks and altitude deviations?", options: ["Altimeters shall be cross-checked every hour with a permissible error of ±200 feet, and any deviation beyond ±300 feet reported by ATC must be corrected immediately."], answer: "Altimeters shall be cross-checked every hour with a permissible error of ±200 feet, and any deviation beyond ±300 feet reported by ATC must be corrected immediately." },
            { q: "RVS-NON-0005 Please select the correct statements about the Pre-Flight Procedures for RVSM airspace.<br>I. Review AML and check MEL items to determine the condition of equipment required for flight in the RVSM airspace.<br>II. Check the condition of static sources and the fuselage skin near each static source.<br>III. All altimeters should be set to the QNH of the airfield and should display a known altitude, within the limits depicted in the FCOM. The two primary altimeters should be within limits specified by the FCOM. The difference between the known elevation and the elevation displayed on the altimeters should not exceed 75 ft.", options: ["All of above"], answer: "All of above" },
            { q: "Which of the following statements are correct for Low Temperature Correction, if reported OAT is -10° C ? (Aircraft VNAV capable and LNAV/VNAV Minima intended to be used)<br>I. Over LBU Low Temperature correction shall be made (if there is no radar coverage),<br>II. Since the temperature is within promulgated limits, from UNSER to DA(H) Low Temperature Correction shall not be made.<br>III. Since the temperature is within promulgated limits, flight crew shall not make low temperature correction for missed approach altitude (5000ft). (if there is no radar coverage)", img: "annexes/examIV/examIV_annex5.png", options: ["I-II"], answer: "I-II" },
            { q: "PBN-320-0002 The minimum equipment required to start a RNAV (GNNS) approach:", options: ["1 FMGC, 1 GPS, 2 IRS, 1 MCDU, 1 FD, 1 PFD (PF side), 2 ND, 2 FCU"], answer: "1 FMGC, 1 GPS, 2 IRS, 1 MCDU, 1 FD, 1 PFD (PF side), 2 ND, 2 FCU" },

            { q: "LVO-320-0005 Which one of the following is correct about the required equipment for CAT II and CAT III approaches;", options: ["Autothrust is only required for CAT III"], answer: "Autothrust is only required for CAT III" },

            { q: "LVO-320-0004 Which of the following is correct when flying CAT II / CAT III A / CAT IIIB approach using LOC and G/S guidance:", options: ["Below 700 feet RA, data coming from FMS is frozen."], answer: "Below 700 feet RA, data coming from FMS is frozen." },
            { q: "LVO-320-0001 Minimum decision height for ILS CAT II is ... feet and for manual landing AP should be disconnected no later than ... feet AGL.", options: ["100 feet / not greater than 80% of applicable DH"], answer: "100 feet / not greater than 80% of applicable DH" },
            { q: "INC-NON-0003 In case of incapacitation of Commander during the flight, choose the violated principle implemented by Co-pilot:", options: ["After landing continues to taxi to the gate/parking position."], answer: "After landing continues to taxi to the gate/parking position." },
            { q: "INC-NON-0004 In case of incapacitation of the cabin chief, cabin chief duties must be transferred to the below listed crew, following order of priority with the Commander's final decision:", options: ["Most appropriately qualified cabin chief in operating or deadhead crew."], answer: "Most appropriately qualified cabin chief in operating or deadhead crew." },
            { q: "Who determine the limitation and method of De-icing/Anti-icing application ?", options: ["Trained and qualified ground crew and flight crew"], answer: "Trained and qualified ground crew and flight crew" },
            { q: "Which one of the following fluids shall not be used for de-icing/anti-icing treatment ?", options: ["Kerosen"], answer: "Kerosen" },
            { q: "OMC-NTR-0002 Which of the following statements are correct about United Kingdom Rules and Procedures?<br>I. All aircraft when operating under normal circumstances, when inside controlled airspace within London and Scottish FIRs should not operate with a climb or descent rate exceeding 8000ft per minute.<br>II. Pilots of aircraft cleared for a climb or descent should inform the controller if their rate of climb or descent during the level change will be less than 500ft per minute.<br>III. When a departing aircraft on a SID is cleared to climb to the cleared level with complying the published vertical restrictions on the SID, ATC will include the word \"now\" in climb instructions.<br>IV. When a departing aircraft on a SID is cleared to climb directly to the cleared level without complying with the published vertical restrictions on the SID, ATC will include the word \"now\" in climb instructions.", options: ["I-II-IV"], answer: "I-II-IV" },
            { q: "Which of the following factors effect the holdover time ?<br>I. Training and experience of ground staff,<br>II. Outside air temperature,<br>III. Fluid type<br>IV. Mixture ratio (for type 2 and 4)<br>V. Precipitation type (if exists)", options: ["II-III-IV-V"], answer: "II-III-IV-V" },
            { q: "OMC-NTR-0007 Which of the following statements are correct about IATA In-Flight Broadcast Procedure (IFBP) on 126.9 in AFI Region? A broadcast should be clearly pronounced in English:<br>I. 10 minutes before entering or crossing an FIR within IFBP region<br>II. at not less than 20 minute intervals<br>III. before a change in flight level<br>IV. at any other time considered necessary by the pilot", options: ["All of the Above"], answer: "All of the Above" },
            { q: "OMC-NTR-0005 During an ILS DME Rwy 27L approach to EGLL, at glide slope capture; What altitude shall be set on altitude panel of FCU/ME?", img: "annexes/examIV/examIV_annex6.png", options: ["2000ft"], answer: "2000ft" },
            { q: "For which meteorological condition there is no holdover time guidelines exist?", options: ["Heavy Snow"], answer: "Heavy Snow" },
            { q: "ASH-NON-0004 You have encountered volcanic ash cloud while flying at FL320, which of the following is a recommended action ?", options: ["Fly on the upwind side, try to escape by descending and 180 degrees turn."], answer: "Fly on the upwind side, try to escape by descending and 180 degrees turn." },
            { q: "SNR-NON-0001 What is the runway width that is considered as narrow by Turkish Airlines?", options: ["Runways narrower than 40 meters but at least 30 meters wide"], answer: "Runways narrower than 40 meters but at least 30 meters wide" },
            { q: "PER-320-0024 When reaching cruise FL, the crew will ensure that the wind and temperatures are correctly entered and the lateral and vertical F-PLAN reflect the CFP. Wind entries should be made at waypoints when there is a difference of either .....° or ..... kt for the wind data and  °C for temperature deviation. This will ensure that the FMS fuel and time predictions are as accurate as possible.", options: ["30, 30, 5"], answer: "30, 30, 5" },
            { q: "PER-320-0030 Which of the following statements are correct considering an engine failure during cruise?<br>I. For standard strategy, the speed of 0.78/300 kt is chosen to ensure the aircraft is within the stabilized windmill engine relight in-flight envelope.<br>II. LRC Engine-Out maximum FL with anti-icing off is displayed on the MCDU PERF CRZ page.<br>III. For standard strategy, when the V/S becomes less than 500 ft/min, select V/S -500 ft/min and A/THR on.<br>IV. To maintain the highest possible level due to terrain, the drift down procedure must be adopted. The speed target in this case is green dot.", options: ["I-III-IV"], answer: "I-III-IV" },
            { q: "PER-320-0003 Which of the following statements are correct?<br>Landing Climb is the aeroplane's climb capability assuming that:<br>I. All engines are operating<br>II. TOGA thrust, available 8 seconds after lever is moved from idle<br>III. Slats and flaps in landing configuration (Conf 3 or FULL)<br>IV. Gear Extended", options: ["All of Above"], answer: "All of Above" },
            { q: "PER-320-0017 Which of the following statements are correct?<br>I. For a given Cost Index (CI), ECON Mach is defined as the Mach for which Direct Operating Costs are minimum.<br>II. The Long Range Cruise speed (LRC) is defined as the Mach for which the specific range is equal to 99% of the maxium specific range.<br>III. Maximum speed is either MMO or VMO or the speed limited by the available thrust.<br>IV. Turbulence speeds are recommended when the aircraft flies in a turbulent atmosphere.", options: ["All of Above"], answer: "All of Above" },
            { q: "RVS-NON-0022 Choose the correct letter that represents RVSM approval status on the flight plan form.", options: ["W"], answer: "W" },
            { q: "OMC-GEN-0002 What is the distance to Touch Down at FAF?", options: ["0.7 nm"], answer: "0.7 nm" },
            { q: "OMC-GEN-0027 What are the meanings of the symbols, respectively?", options: ["1 Visual track - 2 Radar vector - 3 Miss approach"], answer: "1 Visual track - 2 Radar vector - 3 Miss approach" },
            { q: "OMB-320-3042 When does the cooling period begin following a landing where a One Engine Taxi arrival procedure is utilized?", options: ["At touchdown, unless maximum reverse thrust is applied during landing."], answer: "At touchdown, unless maximum reverse thrust is applied during landing." },
            { q: "OMB-320-302G Which procedure is correct regarding Approach Type and Landing Runway Changes?", options: ["If the aircraft has not yet reached the FAF/FAP and there is sufficient time, the flight crew should complete the briefing for an alternative runway if a change is requested by ATC."], answer: "If the aircraft has not yet reached the FAF/FAP and there is sufficient time, the flight crew should complete the briefing for an alternative runway if a change is requested by ATC." },
            { q: "OMB-320-3013 During the after start procedure; rudder trim will be reset by pressing the RESET pb. After the reset, up to which value may normally be observed in the RUD TRIM position indication?", options: ["0.3° (L or R)"], answer: "0.3° (L or R)" },
            { q: "Which one is the all clear signal (ground crew indicating that all de-icing/anti-icing applications are completed and that all personnel and any equipment has been removed from around the aircraft)?", options: ["1"], answer: "1" },
            { q: "OMC-NTR-0001 In UK airspace, During the SID, if ATC cleared you to Climb level without vertical restriction, ATC will include the word", options: ["Now"], answer: "Now" },
            { q: "PBN-320-0004 Which one of the following is correct about the principles of management of degraded navigation during RNP 1 Operation;", options: ["If GPS PRIMARY LOST on both NDs/MCDUs is displayed, the flight crew should check the navigation accuracy with navaid raw data via MCDU PROG page in order to identify which FMCG position is correct and resume navigation with FMCG that provides the correct position."], answer: "If GPS PRIMARY LOST on both NDs/MCDUs is displayed, the flight crew should check the navigation accuracy with navaid raw data via MCDU PROG page in order to identify which FMCG position is correct and resume navigation with FMCG that provides the correct position." },
            { q: "TWA-NON-0004 Approaching EHAM runway 27 you have noticed on weather radar, red echoes within 5 NM from the runway end along the missed approach procedure path. Under these conditions, which of the following would be the best action if you have 1 hour of extra fuel on board?<br>I. No considerations required, continue approach and land.<br>II. Request an instrument approach to the same runway with a different go-around flight path.<br>III. No other options available, divert to destination alternate.<br>IV. Request an alternative instrument approach to another runway with a different go around flight path.", options: ["II-IV"], answer: "II-IV" },
            { q: "CWO-NON-000U While radar vectoring, air traffic controller (ATC) instructed to descent 4000ft.Airport elevation is 2000ft and OAT is -10°C. Which altitude you should descent?", options: ["4000 ft"], answer: "4000 ft" },
            { q: "TAW-NON-0008 Which of the following equipment is required for the EGPWS system to function?<br>I- Radio Altimeter<br>II- Air Data Computer<br>III- Flaps<br>IV- Window heat", options: ["I-II-III"], answer: "I-II-III" },
            { q: "TUR-NON-0002 When encountering turbulence, pilots are urgently requested to report such conditions to ATC as soon as practicable. The PIREPs should state;<br>1. Aircraft location<br>2. Time of occurrence in UTC<br>3. Turbulence intensity<br>4. Separation from clouds<br>5. Aircraft altitude or flight level<br>6. Type of approach<br>7. Location of turbulence", options: ["1, 2, 3, 5"], answer: "1, 2, 3, 5" }
        ],
        phase5a: [
            { q: "REF: OMA-88-0002<br>Which statement is correct about \"Minimum Requirements for Supplemental Oxygen for Pressurized Aeroplanes Following Emergency Descent\"?", options: ["For all occupants of the flight deck seats on flight deck duty, entire flight time at pressure altitudes above 10.000 ft.", "For all required cabin crew members, entire flight time when cabin pressure altitude exceeds 13.000 ft but not less than 30 minutes.", "For all required cabin crew members, the remainder of flight time when cabin pressure altitude is higher than 10.000 ft but does not exceed 15,000 ft after the first 30 minutes at these altitudes.", "For 100% of passengers, entire flight time when the cabin pressure altitude exceeds 15.000 ft, but in no case less then 10 minutes."], answer: "For all occupants of the flight deck seats on flight deck duty, entire flight time at pressure altitudes above 10.000 ft." },
            { q: "REF: OMA-6-0002<br>Flight crew members normally should not act as blood donors. If for any reason they have done so, they shall inform the company immediately following each donation, and shall not undertake flying duties for at least ____ hours after donating blood/plasma. Flight crew members shall report to an AME for hemoglobin determination and blood count before returning to flight duty.", options: ["12", "16", "24", "36"], answer: "24" },
            { q: "REF: OMA-3-0001<br>Reckless behavior and deliberate violations of Turkish Airlines standards and procedures or a history of repeated occurrences:", options: ["will be considered acceptable in just culture philosophy.", "will not be tolerated.", "will be tolerated if reported via AQD and extra ground training will be planned.", "will have no consequences if reported via Safety Reporting System within 24 hours."], answer: "will not be tolerated." },
            { q: "REF: OMA-3-0002<br>Turkish Airlines supports a non-punitive reporting and safety process. A fundamental part of Safety Management is internal occurrence reporting and hazard analysis. In this respect, continuation of an instrument approach beyond the relevant OM-C minima with inadequate visual references,", options: ["will be considered acceptable in just culture philosophy if reported via Safety Reporting System within 24 hours.", "will not be tolerated.", "will be considered as human error if reported by the flight crew as an Air Safety Report.", "will be considered as an occurrence and no report is required if a safe landing has been made."], answer: "will not be tolerated." },
            { q: "REF: Side Step Maneuver<br>Which one of the following is Side Step Maneuver Approach Minima?", options: ["Visibility: 1000 or circle to land/ side step minimum and MDA: AAL+700ft or circle to land/side step minimum, whichever is higher.", "Visibility: 5000 or Circle to Land / Sidestep Minimum and MDA: AAL+1000 or Circle to Land / Sidestep Minimum whichever is lower.", "Visibility: 5000m and MDA: AAL+1500ft", "Visibility: 5000 or Circle to Land / Sidestep Minimum and MDA: AAL+1000 or Circle to Land / Sidestep Minimum whichever is higher."], answer: "Visibility: 5000 or Circle to Land / Sidestep Minimum and MDA: AAL+1000 or Circle to Land / Sidestep Minimum whichever is higher." },
            { q: "REF: CAT IIIA Visual Reference<br>For ILS CAT IIIA, the required visual reference consists of at least three consecutive lights being the centerline of the approach lights, or touchdown zone lights, or runway centerline lights, or runway edge lights, and an RVR not less than ____ m.", options: ["200/600", "200/550", "100/300", "100/350"], answer: "200/550" },
            { q: "REF: Final Reserve Fuel<br>Final reserve fuel shall be fuel to fly for 30 minutes at holding speed at 1,500 ft above aerodrome elevation in standard conditions, calculated with ____ at the destination alternate aerodrome or the destination aerodrome, if a destination alternate aerodrome is not required or available.", options: ["the maximum landing weight", "the estimated take off weight", "the maximum zero fuel weight", "the estimated mass on arrival"], answer: "the estimated mass on arrival" },
            { q: "REF: LVTO Precautions<br>If RVR is below 400 m, but not less than 125 m (LVTO), the commander may perform LVTO even LVP is not in progress by taking required precautions. Please select the correct precautions listed below:<br>I. Only one aircraft at a time is allowed on the maneuvering area which needs to be confirmed by the controller.<br>II. Vehicle traffic on the maneuvering area is controlled and is restricted to the absolute minimum.<br>III. It is not possible to take off from this kind of airport.", options: ["I", "II", "III", "I-II"], answer: "I-II" },
            { q: "REF: Autoland Braking Action<br>What should be the minimum braking action report in order to perform an autoland?", options: ["Poor to Medium", "Medium", "Medium to Good", "Good"], answer: "Good" },
            { q: "REF: Lowest RVR Takeoff<br>What is the lowest RVR for takeoff satisfying the appropriate conditions? (high intensity runway centerline lights spaced 15 m or less apart and high intensity edge lights spaced 60 m or less apart are in operation; a 90 m visual segment; the required RVR value is achieved for all of the relevant RVR reporting points.)", options: ["below 150 m but not less than 75 m", "below 150 m but not less than 125 m", "below 150 m but not less than 100 m", "below 150 m but not less than 50 m"], answer: "below 150 m but not less than 125 m" },
            { q: "REF: Incapacitation LVO<br>Which of the following statements are correct about incapacitation during a low visibility approach?", options: ["Above 1000 feet, flight crew shall execute a missed approach.", "Below 1000 feet, approach shall be continued and completed manually.", "Flight crew should assess the situation and decide whether it would be safer to complete the approach.", "If the aircraft has passed the IAF, then approach shall be completed."], answer: "Flight crew should assess the situation and decide whether it would be safer to complete the approach." },
            { q: "REF: CAT IIIA Approach Failure<br>You are making an ILS CAT IIIA approach with DH 70 feet and your current altitude is 400 feet. ATC reports that some of the approach lights in last 100 meters segment are unserviceable. Which of the following statements are correct?<br>I. Flight crew can continue approach and landing<br>II. Flight crew have to check the effect of failed equipment<br>III. Approach must be cancelled", options: ["I", "I-II", "II-III", "None of Above"], answer: "II-III" },
            { q: "REF: OMB-320-2002<br>On long and straight taxiways including taxiing on active/inactive runways maximum taxi speed is....", options: ["10 kts", "20 kts", "30 kts", "40 kts"], answer: "30 kts" },
            { q: "REF: OMB-320-2003<br>In the apron and ramp areas or during turns exceeding 30 degrees, maximum taxi speed is....", options: ["8 kts", "10 kts", "12 kts", "15 kts"], answer: "10 kts" },
            { q: "REF: OMB-320-3018<br>Take off thrust setting and sidestick usage procedure changes:", options: ["If the crosswind is greater than 15 kts", "If there is tailwind or if crosswind is greater than 20 kts", "Take off procedure is always the same", "If there is tailwind or if crosswind is greater than 25 kts"], answer: "If there is tailwind or if crosswind is greater than 20 kts" },
            { q: "REF: OMB-320-3019<br>When approaching with CONF 3 (not overweight), during go around initial flap setting shall be:", options: ["CONF 1+F", "CONF 2", "CONF 3", "CONF FULL"], answer: "CONF 2" },
            { q: "REF: OMB-320-3021<br>The departure briefing is conducted by", options: ["PF and PM together", "PF and Cabin Crew", "PF and Dispatcher", "Dispatcher and Commander"], answer: "PF and PM together" },
            { q: "REF: OMB-320-4007<br>During an emergency descent, the flight crew must press the MASK MAN ON pb, if the cabin altitude exceeds (or when it is obvious that it will exceed) which altitude?", options: ["10000 ft", "12000 ft", "14000 ft", "16000 ft"], answer: "14000 ft" },
            { q: "REF: OMB-320-4006<br>When there are several VREF increments, only select:", options: ["The highest Delta VREF", "The lowest Delta VREF", "The sum of Delta VREFS", "The difference between Delta VREFS"], answer: "The highest Delta VREF" },
            { q: "REF: OMB-320-4005<br>Which criteria is NOT suitable for Time Critical FORDEC?", options: ["Runway (Min. Landing distance, width)", "Weather (Compare minimums)", "NOTAMS (Closure of Rwy or Aerodrome)", "Commercial Aspect"], answer: "Commercial Aspect" },
            { q: "REF: OMC-GEN-0005<br>On Jeppesen charts, how can we find out if there is a difference between approach and ground chart field elevation?", options: ["By checking SIDS", "By checking STARS", "By checking Instrument Approach Chart", "By comparing Ground Chart and Instrument Approach Chart"], answer: "By comparing Ground Chart and Instrument Approach Chart" },
            { q: "REF: OMC-GEN-0001<br>What is the Inbound Track of holding over CRL VOR?", img: "annexes/examIV/examIV_annex34.png", options: ["301", "121", "120", "300"], answer: "121" },
            { q: "REF: OMC-NTR-0002<br>Which of the following statements are correct about United Kingdom Rules and Procedures?<br>I. All aircraft when operating under normal circumstances, when inside controlled airspace within the London and Scottish FIRs should not operate with a climb or descent rate exceeding 8000ft per minute.<br>II. Pilots of aircraft cleared for a climb or descent should inform the controller if their rate of climb or descent during the level change will be less than 500ft per minute.<br>III. When a departing aircraft on a SID is cleared to climb to the cleared level with confirmation of the vertical restrictions on the SID, ATC will include the word \"now\" in climb instructions.<br>IV. When a departing aircraft on a SID is cleared to climb directly to the cleared level without regard with the published vertical restrictions on the SID, ATC will include the word \"now\" in climb instructions.", options: ["I-III", "II-IV", "I-II-III", "I-II-IV"], answer: "I-II-IV" },
            { q: "REF: IFBP Africa<br>Which one of the following statement is correct for Inflight Broadcast Procedure (IFBP) in Africa?", options: ["Broadcast is not required as long as positive Radar Contact service provided by ATC.", "It is required over whole Africa Continent either by VHF or by HF Voice.", "It is required over whole Africa Continent except CPDLC Coverage areas.", "It is required only in applicable areas as mentioned in Jeppesen Route Manual by VHF."], answer: "It is required only in applicable areas as mentioned in Jeppesen Route Manual by VHF." },
            { q: "REF: OMC-NTR-0005<br>During an ILS DME Rwy 27L approach to EGLL, at glide slope capture; What altitude shall be set on altitude panel of FCU/MCP?", img: "annexes/examIV/examIV_annex35.png", options: ["2000 ft", "2500 ft", "3000 ft", "6000 ft"], answer: "2000 ft" },
            { q: "REF: De-icing Application<br>Which of the following is correct about de-icing application operation at an airport?", options: ["An airport may have special de-icing operational procedure and if exists, this procedure can be reached via reference charts.", "In all airports, de-icing/anti-icing process must be performed at a remote deicing area.", "In some airports, de-icing/anti-icing process must be performed at a remote deicing area.", "It is mandatory to complete de-icing/anti-icing process after landing."], answer: "An airport may have special de-icing operational procedure and if exists, this procedure can be reached via reference charts." },
            { q: "REF: LOUT Definition<br>What does LOUT stand for?", options: ["Freezing point of a de-icing fluid.", "Concentration of Type I fluid.", "Lowest Operational Use Temperature for deicing/anti_icing fluids.", "Concentration of Type IV fluid."], answer: "Lowest Operational Use Temperature for deicing/anti_icing fluids." },
            { q: "REF: Holdover Time Exceeded<br>Which of the followings can be done when the holdover time has been exceeded ? general procedures:<br>I-) Commander may request pre-takeoff contamination check from qualified ground personnel<br>II-) Commander may request retreatment<br>III-) Commander may commence take-off with TOGA thrust", options: ["Only I", "I-II-III", "II-III", "I-II"], answer: "I-II" },
            { q: "REF: INC-NON-0001<br>To determine the succession of command in the event of the incapacitation of the designated Commander which order of priority shall be followed?<br>I - Most senior operating Commander<br>II - Any Turkish Airlines non-operating type qualified Commander on board<br>III-Any other Airlines type qualified Commander on board,<br>IV- Operating most senior Co-pilot in order as P3, P4, P5, P6,<br>V-Non-operating most senior P3, P4, P5, P6, J2 on board. Succession of Command in order:", options: ["I-II-IV", "I-II-III-IV", "I-II-III-IV-V", "I-II-IV-V"], answer: "I-II-IV" },
            { q: "REF: INC-NON-0002<br>Which one is correct about flight crew incapacitation during LVO?", options: ["If incapacity is recognized during takeoff roll after V1 other pilot must execute rejected takeoff maneuver.", "The consideration should be given to whether it would be safer for the remaining crew to continue the approach and landing or to execute a missed approach and divert.", "If the decision is to continue to the approach after declaring an emergency a manual landing must be completed by the remaining flight crew.", "if the decision is to execute a missed approach, the diversion aerodrome should have weather conditions at or above CAT II minima."], answer: "The consideration should be given to whether it would be safer for the remaining crew to continue the approach and landing or to execute a missed approach and divert." },
            { q: "REF: LVO-320-0001<br>Minimum decision height for ILS CAT II is... feet and for manual landing AP should be disconnected no later than ... feet AGL", options: ["Alert height / 80 feet", "100 feet / Autoland is mandatory for CAT II", "100 feet/not greater than 80% of applicable DH", "101 feet / 80 feet"], answer: "100 feet/not greater than 80% of applicable DH" },
            { q: "REF: LVO-320-0004<br>Which of the following is correct when flying CAT II/CAT III A/CAT IIIB approach using LOC and GS?", options: ["Below 700 feet RA, data coming from FMS is frozen.", "Below 350 feet RA, the FCU is frozen.", "At 400 feet LAND must be displayed on FMA.", "Below 200 feet, the AUTOLAND red light illuminates if one AP trips off."], answer: "Below 700 feet RA, data coming from FMS is frozen." },
            { q: "REF: LVO-320-0003<br>The Alert Height is the height above the runway based on the characteristics of the aeroplane and its fail operational automatic landing system. On single aisle Airbus family AH is;", options: ["100 feet", "400 feet", "200 feet", "40 feet"], answer: "100 feet" },
            { q: "REF: LVO-320-0002<br>What are the glide slope angles permitted for autoland?", options: ["-2.5 and -3.15", "-2.5 and -3.00", "-3.0 and -3.90", "-2.0 and -3.25"], answer: "-2.5 and -3.15" },
            { q: "REF: LVO-320-0005<br>Which one of the following is correct about the required equipment for CAT II and CAT III approach?", options: ["Autoland light is required for CAT III and is recommended for CAT II", "Autothrust is only required for CAT III", "Only 1 PFD at PF side is required for CAT II/ CAT III", "Standby attitude indicator is not required for CAT II / CAT III."], answer: "Autothrust is only required for CAT III" },
            { q: "REF: PBN-320-0004<br>Which one of the following is correct about the principles of management of degraded navigation on druing RNP1 Operation;", options: ["If GPS PRIMARY LOST on one ND/MCDU is displayed, the flight crew should inform ATC navigation capability is lost.", "IF NAV ACCUR DOWNGRAD on one ND/MCDU is displayed, the flight crew should cancel RNP and request radar vectors.", "IF GPS PRIMARY LOST on both NDs/MCDUs is displayed, the flight crew should check the navigation accuracy with navaid raw data via MCDU PROG page in order to identify which FMCG position is correct and resume navigation with FMCG that provides the correct position.", "If NAV ACCUR DOWNGRAD is displayed on both sides the flight crew should inform ATC that the required navigation accuracy will be considered as +/- 1 NM during final approach."], answer: "IF GPS PRIMARY LOST on both NDs/MCDUs is displayed, the flight crew should check the navigation accuracy with navaid raw data via MCDU PROG page in order to identify which FMCG position is correct and resume navigation with FMCG that provides the correct position." },
            { q: "REF: PBN-320-0001<br>The Performance Based Navigation (PBN) concept implies that the aircraft follows the defined target of navigation performance and includes RNAV and RNP operations. The minimum navigation equipment to enter RNP1 airspace is:", options: ["1 FMGC, 1 MCDU, 1 GPS, 1 DME, 1 FD, 2 NDs", "1 FMGC, 1 MCDU, 2 GPS, 1 IRS, 1 FD, 1 NDs", "1 FMGC, 1 MCDU, 1 GPS, 2 IRS, 1 FD, 2 NDs", "1 FMGC, 1 GPS, 1 MCDU, 1 GPS, 2 IRS, 1 FD, 2 NDs"], answer: "1 FMGC, 1 MCDU, 1 GPS, 2 IRS, 1 FD, 2 NDs" },
            { q: "REF: PBN General Statements<br>Which of the following statements are correct?<br>I. PBN reduces enviromental impact<br>II. PBN improves safety<br>III. PBN increases airspace capacity<br>IV. PBN improves operational efficiency", options: ["I-II", "I-II-III", "II-III-IV", "All of the above"], answer: "All of the above" },
            { q: "REF: RVS-NON-0002<br>In areas where meters are used for altitude and where, Reduced Vertical Separation Minimum (RVSM), vertical separation of ...... is applied between ........ ..... Inclusive.", options: ["300 mt/8900-12500 mt", "1000 mt/29000-41000 mt", "300 mt/9000-13.000 mt", "330 mt/9700-13700 mt"], answer: "300 mt/8900-12500 mt" },
            { q: "REF: RVS-NON-0005<br>Please select the correct statements about the Pre-Flight Procedures for RVSM airspace.<br>I. Review AML and check MEL items to determine the condition of equipment required for flight in RVSM.<br>II. Check the condition of static sources and the fuselage skin near each static source.<br>III. All altimeters should be set to the QNH of the airfield and should display a known altitude, within limits of the FCOM.<br>IV. The difference between the known elevation and the elevation displayed on the altimeters should be noted.", options: ["Only I", "Only IV", "All of above", "I-III"], answer: "All of above" },
            { q: "REF: STP-NON-0001<br>Which one(s) of the following approaches is/are classified as a steep approach procedure based on their descent angle according to ICAO regulations?<br>I. LTFJ ILS Z or LOC Z Rwy 06L CAT1 (Descent Angle 3.50)<br>II. HDAM VOR Rwy 09 (Descent Angle 3.66)<br>III. LFML RNP Z Rwy 31L (Descent Angle 4.00)", options: ["None of them", "II and III", "I, II, and III", "Only III"], answer: "II and III" },
            { q: "REF: SNR-NON-0003<br>For narrow runway operations, which of the airplane systems must be fully operational?<br>1- Flight controls, 2- All wheel braking units, 3- Nosewheel steering, 4- Autobrake system, 5- Antiskid system, 6- All reversers.", options: ["1, 2, 3, 5, 6", "2, 3, 5, 6", "1, 2, 4, 6", "1, 2, 3, 4, 5, 6"], answer: "1, 2, 3, 5, 6" },
            { q: "REF: Narrow Runway Procedure<br>Which of the following statements is correct regarding narrow runway operations?", options: ["LIFUS flight may be planned.", "Either the captain or the co-pilot may perform landings.", "In case of crew incapacitation, an alternative non-narrow runway must be used for landing.", "The braking action code must be \"GOOD\"."], answer: "The braking action code must be \"GOOD\"." },
            { q: "REF: CDF-NON-0003<br>CDFA is a technique consistent with stabilized approach procedures for flying the final approach segment of a non-precision instrument approach procedure as a continuous descent. Choose the correct answer:", options: ["CDFA procedures consider the MDA/H as a decision altitude (DA) and if the runway is not in sight when the aircraft reaches the MDH, a level flight must be flown.", "Any turns on the missed approach shall not begin until the aircraft reaches the MDA/H.", "If the aircraft reaches the MAPt before descending to near the MDA/H, the missed approach shall be initiated at the MAPt if visual references are not acquired.", "There is a level flight segment after reaching the MDA/H."], answer: "If the aircraft reaches the MAPt before descending to near the MDA/H, the missed approach shall be initiated at the MAPt if visual references are not acquired." },
