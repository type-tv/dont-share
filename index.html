<!DOCTYPE html>
<html lang="tr">
<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root { --primary: #2563eb; --primary-dark: #1e40af; --secondary: #64748b; --success: #22c55e; --danger: #dc2626; --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text-main: #1e293b; }
        * { box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .app-container { background: var(--card); width: 100%; max-width: 900px; min-height: 780px; border-radius: 16px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .page { display: none; flex-grow: 1; padding: 30px; flex-direction: column; animation: fadeIn 0.3s ease-out; }
        .page.active { display: flex; }

        .login-wrapper { margin: auto; text-align: center; width: 100%; max-width: 400px; }
        .login-input { width: 100%; padding: 16px; border-radius: 8px; border: 2px solid var(--border); background: #f8fafc; font-size: 1.1rem; margin-bottom: 20px; text-align: center; }
        .login-input:focus { border-color: var(--primary); outline: none; background: #fff; }
        .btn { background: white; border: 2px solid var(--border); color: #334155; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }

        .btn-primary { background: var(--primary); color: white; border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-dark); color: white; border-color: var(--primary-dark); }
        .btn-danger { background: #fee2e2; color: var(--danger); border-color: #fecaca; }
        .btn-danger:hover { background: var(--danger); color: white; border-color: var(--danger); }
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .user-header { position: absolute; top: 20px; right: 20px; z-index: 10; display: flex; align-items: center; gap: 15px; font-size: 0.9rem; color: var(--secondary); background: rgba(255,255,255,0.95); padding: 6px 16px; border-radius: 20px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logout-link { color: var(--danger); cursor: pointer; font-weight: 600; }
        .stats-card { background: #f8fafc; border-radius: 12px; padding: 20px; border: 1px solid #e2e8f0; margin-top: auto; }
        .stats-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .stats-title { font-size: 0.95rem; color: var(--text-main); font-weight: 700; text-transform: uppercase; }
        .stats-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .stat-tab { padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: white; color: var(--secondary); white-space: nowrap; transition: all 0.2s; }
        .stat-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        .stat-tab:hover:not(.active) { background: #e2e8f0; }
        .quiz-row-1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .quiz-user-badge { font-size: 0.9rem; font-weight: 600; color: var(--primary); background: #eff6ff; padding: 5px 12px; border-radius: 15px; }
        .quiz-row-2 { margin-bottom: 15px; }
        .progress-container { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .quiz-row-3 { display: flex; justify-content: space-between; align-items: center; padding-bottom: 15px; border-bottom: 2px solid var(--border); margin-bottom: 20px; }
        .question-counter { font-weight: 700; color: var(--secondary); font-size: 1rem; }
        .question-text { font-size: 1.3rem; font-weight: 700; color: var(--text-main); margin-bottom: 25px; line-height: 1.6; }
        .option-card { padding: 18px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: 0.2s; font-size: 1.05rem; margin-bottom: 10px; background: white; color: #334155; position: relative; display: flex; align-items: center; }
        .option-key-hint { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; background: #e2e8f0; color: #64748b; border-radius: 4px; margin-right: 12px; font-size: 0.8rem; font-weight: bold; flex-shrink: 0; }
        .option-card:hover { border-color: #94a3b8; background: #f1f5f9; }
        .option-card.correct { background: #dcfce7; border-color: var(--success); color: #14532d; font-weight: 600; }
        .option-card.incorrect { background: #fee2e2; border-color: var(--danger); color: #7f1d1d; }
        .option-card.hint { border-color: var(--success); background: #f0fdf4; color: var(--success); font-weight: 600; }
        .nav-buttons { display: flex; justify-content: space-between; margin-top: 25px; gap: 15px; }
        .nav-btn { flex: 1; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 1rem; }
        .btn-prev { background: #e2e8f0; color: #475569; }
        .btn-next { background: var(--primary-dark); color: white; }
        .fast-access-container { margin-top: auto; border-top: 1px solid var(--border); padding-top: 20px; }
        .fast-access-title { text-align: center; font-size: 0.85rem; color: var(--secondary); margin-bottom: 10px; }
        .access-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(35px, 1fr)); gap: 6px; max-height: 150px; overflow-y: auto; padding: 5px; }
        .access-btn { height: 35px; display: flex; align-items: center; justify-content: center; background: #f1f5f9; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: #64748b; cursor: pointer; transition: all 0.1s; }
        .access-btn:hover { background: #e2e8f0; }
        .access-btn.current { border: 2px solid #0f172a; color: #0f172a; font-weight: 800; background: white; transform: scale(1.05); }
        .access-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .access-btn.incorrect { background: var(--danger); color: white; border-color: var(--danger); }
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { display:none; }
        .slider { position: absolute; cursor: pointer; top:0; left:0; right:0; bottom:0; background-color: #cbd5e1; transition:.3s; border-radius: 34px; }
        .slider:before { position: absolute; content:""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition:.3s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(20px); }
        .switch-label { font-size: 0.9rem; color: var(--secondary); font-weight: 600; margin-right: 10px; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; background: transparent; display: flex; flex-direction: column; justify-content: center; align-items: center; margin: 0 auto 20px; font-size: 2.2rem; font-weight: 800; color: var(--text-main); border: 10px solid #e2e8f0; }
        .score-circle.good { border-color: var(--success); color: var(--success); }
        .score-circle.bad { border-color: var(--danger); color: var(--danger); }
        .score-label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #64748b; margin-top: 5px; }
        .access-grid::-webkit-scrollbar { width: 6px; }
        .access-grid::-webkit-scrollbar-track { background: #f1f1f1; }
        .access-grid::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        @media screen and (max-width: 768px) {
            body { padding: 0 !important; background-color: white; }
            .app-container { width: 100%; max-width: 100%; border: none; border-radius: 0; box-shadow: none; padding: 10px 12px; min-height: 100vh; }
            .page { padding: 0; }
            .question-text { font-size: 0.9rem !important; line-height: 1.35; font-weight: 600; margin-bottom: 12px; color: #0f172a; }
            .option-card { font-size: 0.85rem !important; padding: 8px 10px; margin-bottom: 6px; border-radius: 6px; min-height: auto; }
            .option-key-hint { width: 18px; height: 18px; line-height: 18px; font-size: 0.7rem; margin-right: 6px; }
            h1 { font-size: 1.2rem !important; margin-top: 5px; margin-bottom: 5px; }
            h2 { font-size: 1rem !important; margin-bottom: 10px; }
            .btn { font-size: 0.8rem; padding: 8px; height: auto; }
            .grid-menu { gap: 8px; grid-template-columns: 1fr; }
            .nav-buttons { margin-top: 15px; gap: 10px; }
            .nav-btn { font-size: 0.8rem; padding: 8px; }
            .stat-tab { padding: 4px 8px; font-size: 0.7rem; }
            .user-header { position: relative; top: 0; right: 0; margin-bottom: 10px; justify-content: flex-end; border: none; background: none; box-shadow: none; padding: 0; }
            #quiz-title { font-size: 0.85rem !important; font-weight: 700 !important; max-width: 50%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        }
    </style>
</head>

            { q: "When hot air \"fault\" light comes ON, on the air conditioning panel due to overheat :", options: ["The hot air press regulating valve closes and the trim air valves close.", "The hot air press regulating valve opens and the trim air valves close.", "The hot air press regulating valve closes and trim air valves open."], answer: "The hot air press regulating valve closes and the trim air valves close." },

            { q: "The ram air switch should be used :", options: ["At any time.", "Only when the diff press is less than 1 PSI.", "When the diff press is greater than 1 PSI.", "Only when outflow valve is fully closed."], answer: "Only when the diff press is less than 1 PSI." },

            { q: "What happens in case of failure of the primary and secondary channels of the pack controllers ?", options: ["Pack outlet temperature is controlled by the ANTI-ICE valve", "The pack is closed."], answer: "Pack outlet temperature is controlled by the ANTI-ICE valve" },

            { q: "The hot air pressure regulating valve :", options: ["Regulates the pressure of hot air trapped upstream of the packs.", "Is springloaded open in the absence of air.", "Opens automatically in case of duct overheat."], answer: "Regulates the pressure of hot air trapped upstream of the packs." },

            { q: "Pack flow may be selected from:", options: ["The cockpit.", "The cabin.", "Both."], answer: "The cockpit." },
            { q: "For engine pressure demand, when the heating or cooling demand in one zone cannot be satisfied :", options: ["The minimum idle must be increased manually.", "The minimum idle is increased automatically by both EIUs.", "In any case, flight idle is sufficient."], answer: "The minimum idle is increased automatically by both EIUs." },

            { q: "The mixing unit is connected to :", options: ["Packs, cabin air, emergency ram air inlet and LP ground connector.", "Packs, emergency ram air inlet and LP ground connector.", "Packs and cabin air."], answer: "Packs, cabin air, emergency ram air inlet and LP ground connector." },
            { q: "Once set to \"ON\" the air conditioning packs operate :", options: ["Automatically and independently of each other.", "Manually and independently of each other.", "Automatically, pack 1 as master, pack 2 as slave."], answer: "Automatically and independently of each other." },

            { q: "AIRCRAFT ON RWY CENTERLINE, READY FOR TAKE-OFF. TO PRESET A HDG OF 233º: ", options: ["PULL HDG KNOB TO DISARM NAV MODE, SET 233º AND PRESS HDG KNOB TO ENGAGE", "TURN HDG KNOB, SET 233º AND PULL TO ARM", "TURN HDG KNOB, SET 233º AND PULL HDG KNOB WHEN ATC CLEARS TO TURN TO 233º"], answer: "TURN HDG KNOB, SET 233º AND PULL HDG KNOB WHEN ATC CLEARS TO TURN TO 233º" },
            { q: "WHICH OF THE SRS DISENGAGEMENT CONDITIONS IS NOT TRUE ?", options: ["DISENGAGES AUTOMATICALLY AT FCU ALT", "DISENGAGES AUTOMATICALLY AT ACCELERATION ALTITUDE", "DISENGAGES BY MANUALLY PULLING THE ALTITUDE KNOB", "DISENGAGES BY SETTING A NEW FCU ALTITUDE"], answer: "DISENGAGES BY SETTING A NEW FCU ALTITUDE" },
            { q: "CONTROL OF THE A/C CAN BE AUTOMATIC OR MANUAL. GUIDANCE OF THE A/C CAN BE MANAGED OR SELECTED. HOW DO YOU UNDERSTAND THIS SITUATION : MANAGED GUIDANCE - MANUAL CONTROL - SELECTED SPEED :", options: ["FMGC COMPUTES AND SENDS STEERING ORDERS FOR NAVIGATION PURPOSES. THE PILOT FLIES USING THE SIDE STICK. SPEED IS ADJUSTED IN THE FCU WINDOW.(KNOB HAS BEEN PULLED).", "THE AUTOPILOT FOLLOWS THE F-PLN. THE PILOT SETS THE NECESSARY DATA FOR LONGITUDINAL AND LATERAL CONTROL OF THE A/C. THE TARGET SPEED IS COMPUTED AND DISPLAYED BY THE FMGC."], answer: "FMGC COMPUTES AND SENDS STEERING ORDERS FOR NAVIGATION PURPOSES. THE PILOT FLIES USING THE SIDE STICK. SPEED IS ADJUSTED IN THE FCU WINDOW.(KNOB HAS BEEN PULLED)." },
            { q: "A HOLD HAS BEEN ENTERED IN THE F-PLN, SPEED AND NAV ARE MANAGED. YOU WANT TO LEAVE THIS HOLD : ", options: ["USE THE CLR KEY", "HOLD IS AUTOMATICALLY CANCELLED WHEN OVERFLYING THE FIX", "ACTIVATE \"IMM EXIT\" PROMPT"], answer: "ACTIVATE \"IMM EXIT\" PROMPT" },
            { q: "FOR A/C POSITION DETERMINATION, FMGC USES DATA FROM :", options: ["DME, VOR OR ILS SYSTEMS", "CLOCKS+GROUND SPEED COMPUTATION", "3 ADIRS", "A AND C"], answer: "A AND C" },
            { q: "In flight, following a manual position up-dating of the FMGC :", options: ["It is also necessary to up-date the IRS position", "An IRS cannot be up-dated while the A/C is in motion"], answer: "An IRS cannot be up-dated while the A/C is in motion" },
            { q: "Tuning of VOR/DME and ILS are provided by :", options: ["Automatic tuning, Manual tuning, Back up tuning", "Automatic tuning, Manual tuning", "Automatic tuning, Back up tuning"], answer: "Automatic tuning, Manual tuning, Back up tuning" },
            { q: "When expedite mode is active, to disengage it, which statements is not correct :", options: ["Pull the V/S-FPA knob", "Pull the SPD knob", "Pull the ALT knob", "Press the EXPD push button again to cancel this mode"], answer: "Press the EXPD push button again to cancel this mode" },
            { q: "What are the basic modes of the AP/FD :", options: ["Pitch and roll", "V/S and HDG", "Alt and nav", "Spd and hdg"], answer: "V/S and HDG" },
            { q: "During an ILS approach, the engagement of both autopilots is possible:", options: ["When \"LAND\" illuminates green on FMA", "When A/C is stabilized at G/S interception altitude", "As soon as the LOC has been intercepted", "After APPR push button switch is pressed and illuminated"], answer: "After APPR push button switch is pressed and illuminated" },
            { q: "The align light flashes :", options: ["If IR alignment fault or no present position entry after 10 minutes", "If the difference between position at shut down and entered position, exceeds 1º of latitude or longitude", "When alignment has been completed", "Both A and B"], answer: "Both A and B" },
            { q: "Can you read the HDG on the PFD :", options: ["Yes", "No"], answer: "Yes" },
            { q: "If the flight augmentation computer detects that the angle of attack is above a predetermined threshold, which is a function of the configuration:", options: ["Stall warning is activated", "THR LK starts flashing on FMA", "Alpha floor protection is triggered"], answer: "Alpha floor protection is triggered" },
            { q: "During an ILS Cat III Dual approach with a DH of 20 feet, a failure of one engine below alert height causes landing capability to downgrade and you must initiate a go-around.", options: ["True", "False"], answer: "False" },
            { q: "During an ILS approach, the NAV mode will be deactivated at :", options: ["Glideslope capture", "Localizer capture", "A+B"], answer: "Localizer capture" },
            { q: "Can you display FD bars and FPV at the same time, for cross-checking on different pfd's", options: ["Yes", "No"], answer: "No" },
            { q: "Maximum wind conditions for Cat II or Cat III automatic approach landing and roll out:", options: ["Headwind 30kt, tailwind 10kt, crosswind 20kt", "Headwind 40kt, tailwind 10kt, crosswind 15kt", "Headwind 20kt, tailwind 10kt, crosswind 20kt"], answer: "Headwind 30kt, tailwind 10kt, crosswind 20kt" },
            { q: "The continuous cavalry charge audio identifies only one of the following situations :", options: ["Over speed for the actual A/C configuration", "Fire or oil low press on one engine", "Autopilot disengagement", "Auto land warning, requiring a GO ARAUND"], answer: "Autopilot disengagement" },
            { q: "Setting the thrust levers to IDLE will disengage the A/THR mode. A/THR will be armed and activated", options: ["As soon as the thrust levers position is changed", "When the A/THR pushbutton on FCU is pressed", "Provided the levers are set in CLB detent", "Thrust levers must be moved from IDLE position before A/THR pushbutton on FCU is pressed"], answer: "When the A/THR pushbutton on FCU is pressed" },
            { q: "In one of the cases listed below, A/THR will not disengage :", options: ["When the two thrust levers are set to IDLE position", "Pressing the A/THR push button on the FCU", "When the aural warning announces \"RETARD !\"", "Pressing the instinctive disconnect button"], answer: "When the aural warning announces \"RETARD !\"" },
            { q: "The LOC pushbutton on the FCU, is pressed to ARM the LOC mode. This mode can also be used for tracking a VOR beam if a VOR fequency is set on the RAD NAV page.", options: ["True", "False"], answer: "False" },
            { q: "What does a triple click mean, during an ILS approach :", options: ["A/P disconnection due to failure", "A primary failure is occuring, prepare for a go around", "Flaps are set at config3 and the landing gear is not down", "Landing capability downgrade"], answer: "Landing capability downgrade" },
            { q: "The active F-PLN is erased when :", options: ["The pilot calls the A/C status page", "The wheels touch the runway at landing", "The A/C has been on ground for 30 seconds following the landing", "One engine is shut down at parking place"], answer: "The A/C has been on ground for 30 seconds following the landing" },
            { q: "Following a dual engine generator failure with the emergency generator supplying the A/C :", options: ["FMGC 1 is available (NAV function only)", "FMGC 2 only is available", "Both FMGCs are available", "No FMGC is available"], answer: "FMGC 1 is available (NAV function only)" },
            { q: "In which case are : AP/FD, ATS and landing capacities totally lost :", options: ["Failure of 2 IRS's or failure of 2 ADR's", "Failure of 2 RA's", "Failure of 2 ILS's", "Failure of both FAC's"], answer: "Failure of 2 IRS's or failure of 2 ADR's" },
            { q: "The parameter which triggers the alpha floor protection is :", options: ["Speed", "Bank angle", "Pitch", "Angle of attack"], answer: "Angle of attack" },
            { q: "Rudder travel limitation is a function of :", options: ["FAC only", "FAC in normal and ELAC in alternate", "ELAC only", "ELAC in normal and FAC in alternate"], answer: "FAC only" },
            { q: "When the two yaw damper functions are engaged :", options: ["Yaw damper 1 has priority, yaw damper actuator 2 is slaved", "Yaw damper 2 has priority, yaw damper actuator 1 is slaved", "Yaw damper 1 and 2 are active, the two actuators pressurized", "A hydraulic device gives priority to yaw damper 1"], answer: "Yaw damper 1 has priority, yaw damper actuator 2 is slaved" },
            { q: "The FMGC internal test is automatically performed :", options: ["On ground, at computer power up", "In case of discrepancy between 2 computers", "In flight when a failure occurs", "In flight at autopilot engagement"], answer: "On ground, at computer power up" },
            { q: "When the two rudder trim functions are engaged :", options: ["Rudder trim 1 and 2 control their motors together", "Rudder trim 1 controls the single trim motor", "Rudder trim 1 controls its motor, rudder trim 2 is in standby", "A mechanical device gives priority to rudder trim 1"], answer: "Rudder trim 1 controls its motor, rudder trim 2 is in standby" },
            { q: "Each FMGC is devided into two main parts :", options: ["Flight guidance and flight envelope protection", "Flight management and flight envelope protection", "Flight management and flight guidance", "Flight envelope protection and yaw axis control"], answer: "Flight management and flight guidance" },
            { q: "The trim function of the FAC is :", options: ["Pitch trim", "Rudder trim", "Aileron trim", "Pitch trim and rudder trim"], answer: "Rudder trim" },
            { q: "In flight, in case of temporary loss of electrical power on FAC 2, FAC 2 P/B \"FAULT\" comes on and :", options: ["It will be automatically reset", "It can be manually reset and the safety tests are performed", "It can be manually reset and safety tests are not performed", "There is no way to re-engage FAC 2"], answer: "It can be manually reset and safety tests are not performed" },
            { q: "The Flight Management Guidance System computers are:", options: ["FMGCs and ELACs", "FMGCs and SECs", "FMGCs and FACs", "ELACs and SECs"], answer: "FMGCs and FACs" },
            { q: "With AP1 and AP2 not engaged, FD1 and FD2 engaged an A/THR active :", options: ["FMGC1 controls engine 1, FMGC2 control engine 2", "FMGC1 controls both engines", "FMGC2 controls both engines", "Flight controls and engines are controlled by only one FMGC"], answer: "FMGC1 controls both engines" },
            { q: "In normal operation, with the two MCDU showing the same page, A modification made by the pilot on MCDU1 is sent to MCDU2 :", options: ["Directly", "Via FMGC1", "Via FMGC1 AND FMGC2", "Via FMGC1, FMGC2 and RMP2"], answer: "Via FMGC1 AND FMGC2" },
            { q: "The Flight Guidance part of the FMGS controls:", options: ["Autopilot, fligth plan, autothrust", "Autopilot, performance, flight plan", "Autopilot, flight director, autothrust", "Flight management, autopilot, autothrust"], answer: "Autopilot, flight director, autothrust" },
            { q: "The position of the aircraft, used in the flight plan is computed by :", options: ["FG part of the FMGC", "FM part of the FMGC", "The DMC", "The MCDU"], answer: "FM part of the FMGC" },
            { q: "The flight director is engaged :", options: ["By pressing the FD push button on the FCU", "Automatically at system power up", "By selecting a mode on the FCU", "By selecting the init page on the MCDU"], answer: "Automatically at system power up" },
            { q: "With autopilot engaged, the rudder is normally controlled by :", options: ["The FMGC", "The FAC", "The ELAC", "The SEC"], answer: "The FAC" },
            { q: "The normal FMGC operation is :", options: ["Only one FMGC can operate at a time", "FMGC 1 has priority, FMGC 2 is in standby", "FMGC's operate according to master/slave principle", "FMGC's operate independently"], answer: "FMGC's operate according to master/slave principle" },
            { q: "The FCU alllows :", options: ["Modification of the flight plan of FM part", "Selection of FG function modes", "Selection of radio-nav frequencies", "IRS alignment"], answer: "Selection of FG function modes" },
            { q: "In cruise, lateral ap orders are executed by :", options: ["Ailerons and spoilers", "Ailerons and rudder", "Rudder and spoilers", "Ailerons, spoilers and rudder"], answer: "Ailerons, spoilers and rudder" },
            { q: "With the aircraft in flight, AP engaged and A/THR active, the A/THR MODE :", options: ["Can be chosen by the pilot on the FCU", "Can be chosen by the pilot on the MCDU", "Depends on the AP lateral mode", "Depends on the AP longitudinal mode"], answer: "Depends on the AP longitudinal mode" },
            { q: "With the aircraft in flight, A/THR not engaged, thrust levers at IDLE, an alpha-floor is detected :", options: ["A/THR does not engage because the thrust levers are at IDLE", "A/THR is automatically armed but will not be active", "A/THR automatically engages and sets CLB thrust on the engines", "A/THR automatically engages and sets TO/GA thrust on the engines"], answer: "A/THR automatically engages and sets TO/GA thrust on the engines" },
            { q: "The FAC computes rudder travel limit", options: ["Only when AP is engaged", "Only at low speed", "Only in case of ELAC failure", "Always"], answer: "Always" },
            { q: "With AP engaged in land mode, the yaw damper actuator is controlled by :", options: ["A yaw order computed by the FAC", "A dutch roll damping order computed by the FAC", "A turn coordination order computed by the FAC", "An AP yaw order computed by the FMGC, via the FAC"], answer: "An AP yaw order computed by the FMGC, via the FAC" },
            { q: "On the second line of the FMA ", options: ["ALT can be only in green or magenta", "ALT in blue indicates that ALT mode is active", "ALT in blue indicates that ALT mode is armed", "ALT in blue indicates that ALT mode is active or an FM altitude constraint"], answer: "ALT in blue indicates that ALT mode is armed" },
            { q: "With the thrust levers in the CLB detent and autothrust is disconnected via autothrust pushbutton on th FCU, thrust setting on the engines:", options: ["Is increased to CLB thrust limit", "Is frozen at the existing thrust", "Corresponds to the thrust levers position", "Progressively becomes equal to the thrust levers position"], answer: "Is frozen at the existing thrust" },
            { q: "When thrust levers are set for take-off:", options: ["A/THR automatically engages and is active", "A/THR automatically engages but is not active", "A/THR does not automatically engage", "A/THR does not automatically engage and the engines are controlled by the last thrust target"], answer: "A/THR automatically engages but is not active" },
            { q: "ADIRU 3 CAN SUPPLY INFORMATION TO :", options: ["DMC 1 AND DMC 2 ONLY", "DMC 1 AND DMC 3 ONLY", "DMC 2 AND DMC 3 ONLY", "DMC 1, DMC 2 AND DMC 3"], answer: "DMC 1, DMC 2 AND DMC 3" },
            { q: "Air Data Modules (ADMs) convert pneumatic data into numerical data for the ADIRUs, which is supplied from:", options: ["All pitot probes and static ports", "Pitot probes only", "Static ports only", "Captain and F/O pitot probes and static ports only"], answer: "All pitot probes and static ports" },
            { q: "ADIRU 3 RECEIVES TAT INFORMATION FROM :", options: ["THE CAPTAIN'S TAT SENSOR", "THE FIRST OFFICER'S TAT SENSOR", "THE CAPTAIN AND FIRST OFFICER'S TAT SENSORS", "THE STAND-BY TAT SENSOR"], answer: "THE CAPTAIN'S TAT SENSOR" },
            { q: "The baro reference is sent to each ADIRU via:", options: ["The master FMGC", "The FCU", "The RMPS", "The DMCS"], answer: "The FCU" },
            { q: "IN FLIGHT, THE FMGS POSITION IS AUTOMATICALLY UPDATED :", options: ["USING DATA FROM THE SELECTED NDB, VOR OR DME STATIONS", "WHENEVER A DME STATION IS SELECTED BY THE PILOT", "BY THE DME'S THROUGH THE AUTOTUNING FUNCTION"], answer: "BY THE DME'S THROUGH THE AUTOTUNING FUNCTION" },
            { q: "EACH ADIRU RECEIVES TWO ANALOG INPUTS, THEY ARE :", options: ["ANGLE OF ATTACK (AOA) AND TOTAL AIR TEMPERATURE (TAT)", "ANGLE OF ATTACK (AOA) AND BARO CORRECTION OR REFERENCE", "TOTAL AIR TEMPERATURE (TAT) AND BARO CORRECTION OR REFERENCE", "FMGC STATUS AND BARO CORRECTION OR REFERENCE"], answer: "ANGLE OF ATTACK (AOA) AND TOTAL AIR TEMPERATURE (TAT)" },
            { q: "In normal operation, the ADIRUs are aligned using position information from:", options: ["The ADIRS CDU", "The CFDS", "The FCU", "The MCDU"], answer: "The MCDU" },
            { q: "IF ADIRU 2 FAILS, THE CORRECT ACTION IS :", options: ["Set ATT HDG and AIR DATA selectors to CAPT 3", "Set ATT HDG and AIR DATA selectors to F/O 3", "Set ATT HDG SELECTOR to CAPT 3 and AIR DATA selector to F/O 3", "Set ATT HDG SELECTOR to F/O 3 and AIR DATA selector to CAPT 3"], answer: "Set ATT HDG and AIR DATA selectors to F/O 3" },
            { q: "IN NORMAL OPERATION ADIRU 1 SUPPLIES INFORMATION TO :", options: ["THE CAPTAIN'S PFD AND THE FIRST OFFICER'S ND", "THE CAPTAIN'S ND AND THE FIRST OFFICER'S PFD", "THE CAPTAIN'S PFD AND ND", "THE FIRST OFFICER'S PFD AND ND"], answer: "THE CAPTAIN'S PFD AND ND" },
            { q: "IN ROSE NAV MODE WITH VOR 1 SELECTED, THE ND DISPLAYS WHAT VOR INFORMATION : ", options: ["DEVIATION BAR, SELECTED COURSE AND THE BEARING POINTER", "BEARING POINTER ONLY", "DEVIATION BAR AND SELECTED COURSE ONLY", "DEVIATION BAR AND BEARING POINTER ONLY"], answer: "BEARING POINTER ONLY" },
            { q: "IN ROSE ILS MODE, WHAT ILS INFORMATION DOES THE ND DISPLAY : ", options: ["G/S AND LOC SCALES", "DEVIATION BAR AND SELECTED COURSE", "DEVIATION BAR, SELECTED COURSE AND G/S SCALE", "DEVIATION BAR, SELECTED COURSE, G/S AND LOC SCALES"], answer: "DEVIATION BAR, SELECTED COURSE, G/S AND LOC SCALES" },
            { q: "During an ILS approach with FDs ON, \"LAND\" illuminates in green on FMA when radio altitude is below:", options: ["1.000 ft", "200 ft", "700 ft", "400 ft"], answer: "400 ft" },
            { q: "IN THE EVENT OF NO ADF1 RECEPTION, WITH ADF1 SELECTED ON ND :", options: ["THE BEARING POINTER GOES OUT OF VIEW AND ADF FLAG IS DISPLAYED", "THE BEARING POINTER GOES OUT OF VIEW AND STATION ID IS REPLACED BY RED CROSSES", "THE BEARING POINTER GOES RED AND STATION ID IS REPLACED BY FREQUENCY", "THE BEARING POINTER GOES OUT OF VIEW AND STATION ID IS REPLACED BY FREQUENCY"], answer: "THE BEARING POINTER GOES OUT OF VIEW AND STATION ID IS REPLACED BY FREQUENCY" },
            { q: "ON THE ND, IN THE EVENT OF VOR RECEIVER FAILURE :", options: ["THE RED VOR FLAG IS DISPLAYED. THE COURSE POINTER BECOMES RED", "THE VOR BEARING BECOMES RED AND THE COURSE POINTER DISAPPEARS", "THE VOR BEARING AND THE COURSE POINTER DISAPPEAR", "THE VOR BEARING FLASHES AND THE COURSE POINTER DISAPPEARS"], answer: "THE RED VOR FLAG IS DISPLAYED. THE COURSE POINTER BECOMES RED" },
            { q: "DURING TAKE-OFF AND GO AROUND.THE SPEED WINDOW ON THE FCU DISPLAYS :", options: ["THE SPEED MANUALLY INSERTED BY THE CREW INTO THE FCU AND THE LIGHT IS OUT", "THE SPEED MANUALLY INSERTED BY THE CREW INTO THE MCDU AND THR LIGHT IS ILLUMINATED", "DASHES AND THE DOT ARE ILLUMINATED WHITE : MANAGED SPEED SUCH AS V2 OR MEMORIZED VAPP ARE AUTOMATICALLY USED BY THE FMGS"], answer: "DASHES AND THE DOT ARE ILLUMINATED WHITE : MANAGED SPEED SUCH AS V2 OR MEMORIZED VAPP ARE AUTOMATICALLY USED BY THE FMGS" },
            { q: "THE FOLLOWING AP/FD LATERAL MODES ARE MANAGED :", options: ["NAV, HDG, APPR, LOC, RWY, RWY TRK", "HDG, NAV, APPR, LOC, GA TRK", "NAV, APPR NAV, LOC, RWY, RWY TRK, GA TRK, LAND, ROLL OUT"], answer: "NAV, APPR NAV, LOC, RWY, RWY TRK, GA TRK, LAND, ROLL OUT" },
            { q: "ON GROUND, THE ENGAGEMENT OF THE AUTOTHRUST FUNCTION :", options: ["IS AUTOMATIC AT THE ENGAGEMENT OF THE TAKE OFF MODES OF THE FD(OR PROVIDED AT LEAST ONE FD IS ON)", "MUST BE CARRIED OUT MANUALLY BY THE CREW BEFORE TAKE OFF", "IS PERFORMED AUTOMATICALLY UPON THE SECOND ENGINE START"], answer: "IS AUTOMATIC AT THE ENGAGEMENT OF THE TAKE OFF MODES OF THE FD(OR PROVIDED AT LEAST ONE FD IS ON)" },
            { q: "CLIMBS AND DESCENTS ARE ALWAYS RESTRICTED :", options: ["BY THE ALTITUDE MANUALLY SELECTED ON THE FCU", "BY THE AIRCRAFT WEIGHT CALCULATED BY THE FMGC", "BY FLIGHT PLAN (T/C) AND (T/D) POINTS"], answer: "BY THE ALTITUDE MANUALLY SELECTED ON THE FCU" },
            { q: "Complete IRS alignment: ADIRS selector...............................................................OFF for ……..then NAV.", options: ["more than 5 s", "more than 10s", "within 5 s", "more than 6 s"], answer: "more than 5 s" },
            { q: "Fast IRS alignment: ADIRS selector................................................. OFF then back to NAV ……….. s.", options: ["more than 5 s", "more than 10s", "within 5 s", "more than 6 s"], answer: "within 5 s" },
            { q: "ENHANCED GROUND PROXIMITY WARNING SYSTEM (EGPWS) If the TERR ON ND is not selected, and a terrain alert is generated, the terrain is automatically displayed on the ND.", options: ["TRUE", "FALSE"], answer: "TRUE" },
            { q: "THE LOUDSPEAKER ANNOUNCES “RETARD” AT … OR … IF AUTOTRUST IS ACTIVE AND ONE AP IS IN LAND MODE", options: ["20 feet or 10 feet", "20 feet or 5 feet", "50 feet or 10 feet", "100 feet"], answer: "20 feet or 10 feet" },
            { q: "WINDSHEAR ALERTS ARE INHIBITED ABOVE … KNOT AND UP TO… FEET", options: ["100 knot 40 feet", "100 knot 50 feet", "50 knot 100 feet", "100 knot 100 feet"], answer: "100 knot 50 feet" },
            { q: "FLAP MODE PUSHBUTTON \"OFF\" SELECTION INHIBITS \"TOO LOW FLAPS\" CAUTION", options: ["TRUE", "FALSE"], answer: "TRUE" },
            { q: "ALL TA AURAL MESSAGES ARE INHIBITED BELOW 600 FT IN CLIMB AND BELOW 400 FT IN DESCENT.", options: ["TRUE", "FALSE"], answer: "TRUE" },
            { q: "THE FWC GENERATES A SYNTHETIC VOICE FOR RADIO HEIGHT ANNOUNCEMENT BELOW;", options: ["2350 FT", "2500 FT", "1600 FT", "1000 FT"], answer: "2500 FT" },

        sop_english: [
            { q: "Which one is wrong for MCDU programming and using FCU?", options: ["When flying manually, MCDU programming shall be accomplished by the PNF.", "Below 10,000' even with an autopilot engaged, PF must not program the MCDU.", "During manual flight, it is recommended that ATC instructions requiring FCU changes be read back to the ATC unit and then immediately programmed by the PNF upon PF‟s request.", "During manual flight ATC instructions requiring FCU changes be performmed by PF."], answer: "During manual flight ATC instructions requiring FCU changes be performmed by PF." },
            { q: "When/where should we start to approach briefings?", options: ["To prevent any rush in initiating the descent and the resulting increased workload in conducting the approach, should be started latest 10 minutes / 80 NM before reaching the top of descent,", "When ATIS information is received.", "At the top of descent point.", "To prevent any rush in initiating the descent and the resulting increased workload in conducting the approach, the descent preparation and the approach and go around or low visibility approach briefings typically should be started 20 NM before reaching the top of descent, when ATIS information is received. if not received it should be done according to the expected landing runway ."], answer: "To prevent any rush in initiating the descent and the resulting increased workload in conducting the approach, should be started latest 10 minutes / 80 NM before reaching the top of descent," },

            { q: "Who must be made , “1000 TO GO” call-out At 1000ft to the target altitude for reducing the rate of climb to a maximum of 1000ft/min considering speed decay. V/S should be arranged so as to be maintaining a maximum of 1000fpm within the last 1000ft?", options: ["PF", "PNF", "Safety Pilot", "There is no call-out"], answer: "PNF" },
            { q: "Which one is wrong answer for noise management in the cocpit?", options: ["Headsets shall be put on before “BEFORE START”, and may be taken off at TOC. Headsets shall also be put on before TOD and shall be kept on until after parking.", "When a flight crew member leaves the cockpit, the other flight crew member shall put on his headset and make sure that VHF-1 volume level is turned up. Crew member remaining in the cockpit shall give a short briefing about the phase of the flight when the other crew member returns in to the cockpit.", "Below 10,000ft AGL, there shall be no conversation in the cockpit that is related to the execution of the flight.", "Any misinterpreted or unclear information by the ATC shall first be confirmed by the other flight crew member. If uncertainty remains, flight crew member in charge of ATC communications shall verify information with the ATC."], answer: "Below 10,000ft AGL, there shall be no conversation in the cockpit that is related to the execution of the flight." },
            { q: "What can we say about the pushback procedures?", options: ["Good communication between the flight deck and ground personnel is essential for a safe pushback operation.", "Parking brake shall not be released without confirmation of ground crew that they are ready for “Push Back”. “Brake Released and Clear for Push Back” callout should be announced to the headset operator before commencing push back.", "The headset operator, who is walking in the vicinity of the nose wheels, should be visible.", "All above are correct."], answer: "All above are correct." },
            { q: "PNF will make a call-out “ ’STABILIZED’ or ‘UNSTABILIZED and GO AROUND FLAPS’ at 1000ft. OR 500ft AAL.", options: ["“1000ft” (Straight in) OR “500ft” (non Straight in)", "“500ft” (Straight in) OR “1000ft” (non Straight in)", "“1000ft” ( non Straight in) OR “500ft” (Straight in)", "“1500ft” ( non Straight in) OR “1000ft” (Straight in)"], answer: "“1000ft” (Straight in) OR “500ft” (non Straight in)" },

            { q: "Which one is the wrong action after landing?", options: ["Runway exit or ground spoiler disarm will normally be the cue for CM2 to begin the \"AFTER LANDING CHECKLIST‟. When a situation requires a lengthy taxi on the runway (e.g. backtrack), the CM1 may initiate the relevant checklist when the aircraft has decelerated to taxi speed. CM2 will complete this check and then announce \"AFTER LANDING CHECKLIST COMPLETE‟.", "After landing, controls of “Lights Switches” are Captain's responsibility. However CM2 may remind the captain in case of deviation and may use this control after Captain‟s approval.", "CM2 shall involve in any other unnecessary items (i.e. stowing the AIP charts, recording the Flight Log Book, Maintenance Book etc.) after completing procedures and checklists.", "If icing conditions have been encountered during approach and landing, CM2 shall have Captain's approval before retracting flaps"], answer: "If icing conditions have been encountered during approach and landing, CM2 shall have Captain's approval before retracting flaps" },
            { q: "Which one is the wrong executions of procedurs for parking?", options: ["During final turn to parking position, CM2 shall switch APU Bleed ON and turn TAXI and TURN OFF LIGHT off with the CM1's discretion.", "Captain shall check “BRAKE PRESS” on “BRAKES and ACCUM PRESS indicator” after setting parking brake ON. Release parking brake only after having ascertained by verbal confirmation or by a visual check of the cockpit crew that chocks are correctly positioned.", "Beacon and Seat Belts should switched to OFF position when N2 is below %20.", "Cockpit door shall be closed until last passenger left the aircraft that informed by senior cabin attendant."], answer: "During final turn to parking position, CM2 shall switch APU Bleed ON and turn TAXI and TURN OFF LIGHT off with the CM1's discretion." },
            { q: "When an abnormal situation occurs, the following guidelines apply:<br>- Abnormal Recognition<br>- Analyze The Situation<br>- Take The Proper Action<br>- Apply Recommended Procedures And Other Agreed Actions", options: ["True", "False"], answer: "True" },

    const mistakeTabNames = {
        apu: "APU", communication: "COMM.", doors: "DOORS", flight_controls: "FLT. CONT.",
        fire_protection: "FIRE PROT.", fuel: "FUEL", ice_and_rain: "ICE&RAIN",
        indication: "IND.", landing_gear: "LDG GEAR", lights: "LIGHTS",
        oxygen: "OXY.", instruments: "INST.",
        air_condition: "AIR COND", auto_flight: "AUTO FLT", efis: "EFIS",
        electrics: "ELEC", fmgs: "FMGS", special_airspace: "SPC AIR",
        initial_low_vis: "LOW VIS", pbn: "PBN", performance: "PERF",
        pneumatics: "PNEU", power_plant: "PWR PLNT", sop_english: "SOP ENG", sop_normal: "SOP NRM"
    };

    const examGroups = {
        exam12: ['apu', 'communication', 'doors', 'flight_controls', 'fire_protection', 'fuel', 'ice_and_rain', 'indication', 'landing_gear', 'lights', 'oxygen', 'instruments', 'efis'],
        exam3: ['air_condition', 'auto_flight', 'electrics', 'fmgs', 'pneumatics', 'power_plant'],
        extra: ['special_airspace', 'initial_low_vis', 'pbn', 'performance', 'sop_english', 'sop_normal']
    };

    // --- SİSTEM MANTIĞI ---
    let currentUser = null;
    let currentPool = [];
    let currentIndex = 0;
    let userAnswers = []; 
    let currentTab = 'all';

    // --- ZAMANLAYICI DEĞİŞKENLERİ ---
    let quizStartTime = null;
    let timerInterval = null;

    window.onload = function() {
        const savedUser = sessionStorage.getItem('sinav_user_v1'); // Oturum için session kullanıyoruz
        if (savedUser) {
            currentUser = savedUser;
            updateUserInfo();
            checkSavedExamOrGoMenu(); // Direkt menüye gitme, yarım sınavı kontrol et
        } else {
            showPage('page-login');
        }

        const uInput = document.getElementById("username-input");
        if (uInput) uInput.addEventListener("keypress", function(e) { if (e.key === "Enter") login(); });

        document.addEventListener('keydown', function(event) {
            if (!document.getElementById('page-quiz').classList.contains('active')) return;
            if (event.key === "ArrowLeft") prevQuestion();
            if (event.key === "ArrowRight") {
                if (currentIndex < currentPool.length - 1) nextQuestion();
            }
            const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3, '5': 4 };
            if (keyMap.hasOwnProperty(event.key)) {
                const index = keyMap[event.key];
                const options = document.querySelectorAll('.option-card');
                if (options[index]) options[index].click();
            }
        });
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const pageEl = document.getElementById(id);
        if (pageEl) pageEl.classList.add('active');
        
        const infoPanel = document.getElementById('user-info-panel');
        if (infoPanel) {
            if (id === 'page-main-menu' || id === 'page-menu' || id === 'page-result') {
                infoPanel.style.display = 'flex';
            } else {
                infoPanel.style.display = 'none';
            }
        }

        if(id === 'page-main-menu') {
            let db = getDB();
            let totalAttempts = 0, totalCorrect = 0;
            if (db[currentUser] && db[currentUser].stats) {
                Object.values(db[currentUser].stats).forEach(stat => {
                    totalAttempts += stat.total;
                    totalCorrect += stat.correct;
                });
                db[currentUser].totalSolved = totalAttempts;
                saveDB(db);
            }
            let successRate = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
            const totalEl = document.getElementById('total-solved-display');
            const rateEl = document.getElementById('success-rate-display');
            if(totalEl) totalEl.textContent = totalAttempts;
            if(rateEl) rateEl.textContent = `%${successRate}`;
        } else if (id === 'page-menu') {
            renderMistakeMenu();
        }
    }

    function openExam(examId) {
        currentExamCategory = examId;
        currentTab = 'all';

        document.getElementById('exam-title').textContent = (examId === 'exam12') ? "Exam I-II" : (examId === 'exam3') ? "Exam III" : "Ekstra";

        const grid = document.getElementById('dersler-menusu');
        grid.innerHTML = '';
        examGroups[examId].forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = courseNames[key];
            btn.onclick = () => startQuiz(key);
            grid.appendChild(btn);
        });

        const tabs = document.getElementById('hata-sekmeleri');
        tabs.innerHTML = `<div class="stat-tab active" onclick="switchMistakeTab('all', this)">GENEL</div>`;
        examGroups[examId].forEach(key => {
            const tab = document.createElement('div');
            tab.className = 'stat-tab';
            tab.textContent = mistakeTabNames[key];
            tab.onclick = function() { switchMistakeTab(key, this); };
            tabs.appendChild(tab);
        });

        showPage('page-menu');
    }

    function updateUserInfo() {
        let name1 = document.getElementById('display-username');
        let name2 = document.getElementById('display-username-quiz');
        
        if (name1) name1.textContent = currentUser;
        if (name2) name2.textContent = currentUser;
    }

    function login() {
        const val = document.getElementById('username-input').value.trim();
        if(!val) return alert("Lütfen adınızı giriniz.");
        
        currentUser = val;
        sessionStorage.setItem('sinav_user_v1', val);
        updateUserInfo();
        checkSavedExamOrGoMenu(); // Yarım kalan sınavı kontrol etme duruyor!
    }

    function logout() {
        if(confirm("Çıkış yapılsın mı?")) {
            sessionStorage.removeItem('sinav_user_v1');
            currentUser = null;
            showPage('page-login');
        }
    }

    function checkSavedExamOrGoMenu() {
        const savedData = localStorage.getItem('saved_exam_state');
        if (savedData) {
            const state = JSON.parse(savedData);
            if (state.user === currentUser) {
                if (confirm("Yarım kalan bir sınavınız var. Kaldığınız yerden devam etmek ister misiniz?")) {
                    // Arka planda dönüş yapılacak menüyü gizlice oluştur:
                    openExam(state.category);

                    currentQuizTitle = state.title;
                    currentExamCategory = state.category;
                    currentPool = state.pool;
                    currentIndex = state.index;
                    userAnswers = state.answers;
                    quizStartTime = state.startTime || Date.now();
                    
                    document.getElementById('quiz-title').textContent = currentQuizTitle;
                    showPage('page-quiz');
                    loadQuestion();
                    
                    if (timerInterval) clearInterval(timerInterval);
                    timerInterval = setInterval(updateTimer, 1000);
                    return; // Normal menüye geçmesini engelle
                } else {
                    clearExamState(); // Devam etmediyse eskiyi sil
                }
            }
        }
        showPage('page-main-menu');
    }

    function getDB() { return JSON.parse(localStorage.getItem('sinav_db_v1') || '{}'); }
    function saveDB(data) { localStorage.setItem('sinav_db_v1', JSON.stringify(data)); }

    // --- YARIM KALAN SINAV KONTROLÜ ---
    function saveExamState() {
        if (!currentUser || !currentPool || currentPool.length === 0) return;
        const state = {
            user: currentUser,
            title: currentQuizTitle,
            category: currentExamCategory,
            pool: currentPool,
            index: currentIndex,
            answers: userAnswers,
            startTime: quizStartTime
        };
        localStorage.setItem('saved_exam_state', JSON.stringify(state));
    }

    function clearExamState() {
        localStorage.removeItem('saved_exam_state');
    }

    function findQuestionCategory(qText) {
        for (let category in courseData) {
            if (courseData[category].some(x => x.q === qText)) return category;
        }
        return 'diger';
    }

    function updateStats(question, isCorrect) {
        let db = getDB();
        if(!db[currentUser]) db[currentUser] = { stats: {}, totalSolved: 0 };
        if (typeof db[currentUser].totalSolved === 'undefined') db[currentUser].totalSolved = 0;
        
        const key = question.q;
        if(!db[currentUser].stats[key]) {
            const cat = findQuestionCategory(key);
            db[currentUser].stats[key] = { total: 0, correct: 0, wrong: 0, qObj: question, category: cat };
        }
        
        let stat = db[currentUser].stats[key];
        stat.total++;
        if(isCorrect) stat.correct++; else stat.wrong++;
        stat.qObj = question;
        db[currentUser].totalSolved++; 

        saveDB(db);
    }

    function switchMistakeTab(tabName, btn) {
        currentTab = tabName;
        document.querySelectorAll('.stat-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMistakeMenu();
    }

    function renderMistakeMenu() {
        let db = getDB();
        let stats = db[currentUser] ? db[currentUser].stats : {};
        let critical = [], warning = [], info = [];

        Object.values(stats).forEach(item => {
            if (currentTab === 'all') {
                if (!examGroups[currentExamCategory].includes(item.category)) return;
            } else {
                if (item.category !== currentTab) return;
            }

            if(item.wrong > 0) {
                let rate = (item.correct / item.total) * 100;
                if(rate < 50) critical.push(item.qObj);
                else if(rate < 80) warning.push(item.qObj);
                else info.push(item.qObj);
            }
        });

        const container = document.getElementById('mistake-stats');
        container.innerHTML = '';

        if(critical.length > 0) container.innerHTML += `<button class="btn btn-danger" onclick="startMistakeQuiz('critical')">🔴 Kritik (${critical.length})</button>`;
        if(warning.length > 0) container.innerHTML += `<button class="btn" style="color:#b45309; border-color:#fcd34d; background:#fffbeb;" onclick="startMistakeQuiz('warning')">🟠 Sık Hata (${warning.length})</button>`;
        if(info.length > 0) container.innerHTML += `<button class="btn" style="color:#1e40af; border-color:#bfdbfe; background:#eff6ff;" onclick="startMistakeQuiz('info')">🔵 Nadir (${info.length})</button>`;
        
        if(critical.length===0 && warning.length===0 && info.length===0) container.innerHTML = '<span style="color:#94a3b8;">Bu kategoride henüz hata kaydı yok.</span>';
    }

    function startQuiz(type) {
        returnPageId = 'page-menu';
        let titleText = "";
        let sourceData = [];

        if (type === 'mix') {
            titleText = "🔀 Karışık Test";
            examGroups[currentExamCategory].forEach(key => {
                sourceData.push(...courseData[key]);
            });
        } else if (courseData[type]) {
            titleText = "📚 " + courseNames[type];
            sourceData = courseData[type];
        }

        document.getElementById('quiz-title').textContent = titleText;
        currentQuizTitle = titleText;

        if (!sourceData || sourceData.length === 0) return alert("Bu ders için henüz soru eklenmemiş.");
        
        currentPool = sourceData.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });

        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function startMistakeQuiz(cat) {
        returnPageId = 'page-menu';
        let titleText = "";
        if (cat === 'critical') titleText = "🔴 Kritik Hatalar";
        else if (cat === 'warning') titleText = "🟠 Sık Yapılan Hatalar";
        else if (cat === 'info') titleText = "🔵 Nadir Hatalar";
        
        document.getElementById('quiz-title').textContent = titleText;
        currentQuizTitle = titleText;

        let db = getDB();
        let stats = db[currentUser] ? db[currentUser].stats : {}; 
        let pool = [];
        
        if (stats) {
            Object.values(stats).forEach(item => {
                if (currentTab === 'all') {
                    if (!examGroups[currentExamCategory].includes(item.category)) return;
                } else {
                    if (item.category !== currentTab) return;
                }

                if(item.wrong > 0) {
                    let rate = (item.correct / item.total) * 100;
                    if(cat === 'critical' && rate < 50) pool.push(item.qObj);
                    if(cat === 'warning' && rate >= 50 && rate < 80) pool.push(item.qObj);
                    if(cat === 'info' && rate >= 80) pool.push(item.qObj);
                }
            });
        }
        
        if(pool.length === 0) return alert("Bu kategoride soru yok.");

        currentPool = pool.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });

        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function updateTimer() {
        if (!quizStartTime) return;
        let elapsed = Math.floor((Date.now() - quizStartTime) / 1000); // Milisaniyeyi saniyeye çevir
        let m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        let s = String(elapsed % 60).padStart(2, '0');
        let timerEl = document.getElementById('quiz-timer');
        if(timerEl) timerEl.textContent = `${m}:${s}`;
    }

    function initQuizUI() {
        currentIndex = 0;
        userAnswers = new Array(currentPool.length).fill(null);
        showPage('page-quiz');
        loadQuestion();
        
        // Zamanlayıcıyı başlat
        quizStartTime = Date.now(); // Teste başladığımız anki gerçek saati al
        if (timerInterval) clearInterval(timerInterval);
        updateTimer(); // Ekrana ilk saniyeyi (00:00) hemen yaz
        timerInterval = setInterval(updateTimer, 1000);
        saveExamState();
    }

    function loadQuestion() {
        const q = currentPool[currentIndex];
        
        let qHTML = `${currentIndex+1}. ${q.q}`;
        if (q.img) {
            qHTML += `<br><img src="${q.img}" style="max-width:100%; max-height:400px; border-radius:8px; margin-top:15px; border:2px solid #e2e8f0; display:block; margin-left:auto; margin-right:auto;">`;
        }
        document.getElementById('q-text').innerHTML = qHTML;
        document.getElementById('q-counter').textContent = `Soru ${currentIndex + 1} / ${currentPool.length}`;
        document.getElementById('q-progress').style.width = `${((currentIndex+1)/currentPool.length)*100}%`;

        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = '';

        q.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'option-card';
            const letter = String.fromCharCode(65 + idx); 
            btn.innerHTML = `<span class="option-key-hint">${letter}</span> ${opt}`;
            
            btn.onclick = () => handleAnswer(opt, btn);
            optsDiv.appendChild(btn);
        });

        if(userAnswers[currentIndex]) restoreState();
        
        document.getElementById('btn-prev').disabled = (currentIndex === 0);
        document.getElementById('btn-next').textContent = (currentIndex === currentPool.length - 1) ? 'Bitir' : 'Sonraki →';
        
        renderFastAccess();
    }

    function handleAnswer(selected, btn) {
        if(userAnswers[currentIndex]) return;

        const q = currentPool[currentIndex];
        const isCorrect = (selected === q.answer);
        
        userAnswers[currentIndex] = { selected, isCorrect, qObj: q };
        
        updateStats(q, isCorrect);
        applyFeedback();
        renderFastAccess();
        saveExamState();

        const autoNext = document.getElementById('auto-next').checked;
        if(isCorrect && autoNext) {
            const allOpts = document.querySelectorAll('.option-card');
            allOpts.forEach(o => o.style.pointerEvents = 'none');
            
            if (currentIndex < currentPool.length - 1) {
                setTimeout(() => {
                    nextQuestion();
                }, 400); 
            }
        }
    }

    function applyFeedback() {
        const ans = userAnswers[currentIndex];
        if(!ans) return;
        
        const q = currentPool[currentIndex];
        const opts = document.querySelectorAll('.option-card');
        
        opts.forEach(btn => {
            btn.style.pointerEvents = 'none';
            const btnText = btn.textContent.substring(2).trim();
            
            if(btnText === q.answer) {
                btn.classList.add(ans.isCorrect ? 'correct' : 'hint');
            }
            if(btnText === ans.selected && !ans.isCorrect) {
                btn.classList.add('incorrect');
            }
        });
    }

    function restoreState() { applyFeedback(); }

    function renderFastAccess() {
        const grid = document.getElementById('fast-access-grid');
        grid.innerHTML = '';
        
        currentPool.forEach((_, i) => {
            const btn = document.createElement('div');
            btn.className = 'access-btn';
            btn.textContent = i + 1;
            
            if (i === currentIndex) btn.classList.add('current');
            
            if (userAnswers[i]) {
                if (userAnswers[i].isCorrect) btn.classList.add('correct');
                else btn.classList.add('incorrect');
            }
            
            btn.onclick = () => {
                currentIndex = i;
                loadQuestion();
            };
            grid.appendChild(btn);
        });
    }

    function nextQuestion() {
        if(currentIndex < currentPool.length - 1) {
            currentIndex++;
            saveExamState();
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    function prevQuestion() {
        if(currentIndex > 0) {
            currentIndex--;
            saveExamState();
            loadQuestion();
        }
    }

    function endQuiz() {
        if(confirm("Testi bitirmek istiyor musunuz?")) {
            if (timerInterval) clearInterval(timerInterval);
            clearExamState(); // Testten kendi isteğiyle çıkarsa kaydı sil
            showPage(returnPageId);
        }
    }

    function finishQuiz() {
        clearExamState(); // Test bittiği için kaydı sil
        // Test bitince zamanlayıcıyı durdur ve sonucu hesapla
        if (timerInterval) clearInterval(timerInterval);
        let elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
        let m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        let s = String(elapsed % 60).padStart(2, '0');
        let resTimeEl = document.getElementById('res-time-display');
        if(resTimeEl) resTimeEl.textContent = `${m}:${s}`;

        const correct = userAnswers.filter(a => a && a.isCorrect).length;
        const score = Math.round((correct / currentPool.length) * 100);
        
        document.getElementById('res-score').textContent = `%${score}`;
        
        const circle = document.getElementById('result-circle');
        circle.className = 'score-circle'; 
        if(score >= 75) circle.classList.add('good');
        else circle.classList.add('bad');

        const msg = document.getElementById('res-msg');
        if(score >= 90) msg.textContent = "Mükemmel! 🚀";
        else if(score >= 75) msg.textContent = "Tebrikler, Geçtiniz! 👍";
        else msg.textContent = "Tekrar Gerekli. 🧐";
        
        document.getElementById('res-test-title').textContent = currentQuizTitle;

        const wrongOnes = userAnswers.filter(a => a && !a.isCorrect);
        const retryBtn = document.getElementById('btn-retry-session');
        
        if(wrongOnes.length > 0) {
            retryBtn.style.display = 'block';
            retryBtn.textContent = `⚠️ Bu Testteki ${wrongOnes.length} Yanlışı Çöz`;
        } else {
            retryBtn.style.display = 'none';
        }

        showPage('page-result');
    }

    function restartQuiz() {
        currentPool = currentPool.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });
        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function retrySessionMistakes() {
        const wrongs = userAnswers.filter(a => a && !a.isCorrect).map(a => a.qObj);
        
        currentPool = wrongs.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });

        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function goBackToMenu() {
        showPage(returnPageId);
    }
</script>
</body>
</html>
