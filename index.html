            { q: "Which statement(s) is (are) correct or incorrect?<br>During climb in VMC conditions, if ATC radar vectors are not available, or MVA is not published, or radar vectors are not acceptable, the Commander shall be capable of:<br>I. maintaining VMC until within radar coverage (radar vectors acceptable)<br>II. maintaining VMC until established on the published engine-out procedure and thereafter continue to the published nav-aid or fix serving the aerodrome and climb in accordance with the published holding pattern until reaching the highest applicable published minimum altitude and thereafter continue in accordance with the OFP; Commander shall inform ATC when published engine out procedures are to be used as this information is not available to ATC", options: ["I is correct, II is correct", "I is incorrect, II is incorrect", "I is incorrect, II is correct", "I is correct, II is incorrect"], answer: "I is correct, II is correct" },
            { q: "About for thrust reduction and/or flap retraction altitude, which option(s) is (are) correct?<br>I. Turkish Airlines publishes two takeoff procedures, which are described in the OM Part B.<br>II. National requirements shall take precedence if different from Turkish Airlines procedures.", options: ["I, II", "Only I", "Only II", "Neither of them"], answer: "I, II" },
            { q: "Which statement(s) is (are) correct or incorrect about Navigation Procedures?<br>I. The function of all equipment necessary for each flight shall be checked prior to departure<br>II. Reliance should not be placed on information derived from ground beacons until the appropriate coded signal has been identified", options: ["I is correct, II is correct", "I is incorrect, II is incorrect", "I is incorrect, II is correct", "I is correct, II is incorrect"], answer: "I is correct, II is correct" },

        special_airspace: "🛩️ Special Airspace", initial_low_vis: "🌫️ Initial Low Vis.",
        pbn: "🛰️ PBN", performance: "📈 Performance", pneumatics: "💨 Pneumatics",
        power_plant: "🔥 Power Plant", sop_english: "📘 SOP English", sop_normal: "📗 SOP – Normal Usuller",
        hydraulics: "🛢️ Hydraulics", single_answer: "✅ Single Answer", phase5a: "🚀 Phase 5A", ocr: "📄 OCR",
        part_a_old: "📁 Part A Old", part_b_old: "📁 Part B Old", short_narrow_old: "📏 Short & Narrow Old",
        valid: "✔️ Valid"
    };

    const mistakeTabNames = {
        apu: "APU", communication: "COMM.", doors: "DOORS", flight_controls: "FLT. CONT.",
        fire_protection: "FIRE PROT.", fuel: "FUEL", ice_and_rain: "ICE&RAIN",
        indication: "IND.", landing_gear: "LDG GEAR", lights: "LIGHTS",
        oxygen: "OXY.", instruments: "INST.",
        air_condition: "AIR COND", auto_flight: "AUTO FLT", efis: "EFIS",
        electrics: "ELEC", fmgs: "FMGS", special_airspace: "SPC AIR",
        initial_low_vis: "LOW VIS", pbn: "PBN", performance: "PERF",
        pneumatics: "PNEU", power_plant: "PWR PLNT", sop_english: "SOP ENG", sop_normal: "SOP NRM",hydraulics: "HYD",
        single_answer: "SGL ANS", phase5a: "PH 5A", ocr: "OCR",
        part_a_old: "PART A", part_b_old: "PART B", short_narrow_old: "S&N OLD",
        valid: "VALID"
    };

    const examGroups = {
        exam12: ['apu', 'communication', 'doors', 'flight_controls', 'fire_protection', 'fuel', 'ice_and_rain', 'indication', 'landing_gear', 'lights', 'oxygen', 'instruments', 'efis', 'hydraulics'],
        exam3: ['air_condition', 'auto_flight', 'electrics', 'fmgs', 'pneumatics', 'power_plant'],
        exam4: ['single_answer', 'phase5a', 'ocr', 'valid'],
        old: ['part_a_old', 'part_b_old', 'short_narrow_old'],
        extra: ['special_airspace', 'initial_low_vis', 'pbn', 'performance', 'sop_english', 'sop_normal']
    };

    // --- SİSTEM MANTIĞI ---
    let currentUser = null;
    let currentPool = [];
    let currentIndex = 0;
    let userAnswers = []; 
    let currentTab = 'all';

    // --- ZAMANLAYICI DEĞİŞKENLERİ ---
    let quizStartTime = null;
    let timerInterval = null;

    window.onload = function() {
        const savedUser = sessionStorage.getItem('sinav_user_v1'); // Oturum için session kullanıyoruz
        if (savedUser) {
            currentUser = savedUser;
            updateUserInfo();
            checkSavedExamOrGoMenu(); // Direkt menüye gitme, yarım sınavı kontrol et
        } else {
            showPage('page-login');
        }

        const uInput = document.getElementById("username-input");
        if (uInput) uInput.addEventListener("keypress", function(e) { if (e.key === "Enter") login(); });

        document.addEventListener('keydown', function(event) {
            if (!document.getElementById('page-quiz').classList.contains('active')) return;
            if (event.key === "ArrowLeft") prevQuestion();
            if (event.key === "ArrowRight") {
                if (currentIndex < currentPool.length - 1) nextQuestion();
            }
            const keyMap = { '1': 0, '2': 1, '3': 2, '4': 3, '5': 4 };
            if (keyMap.hasOwnProperty(event.key)) {
                const index = keyMap[event.key];
                const options = document.querySelectorAll('.option-card');
                if (options[index]) options[index].click();
            }
        });
    };

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const pageEl = document.getElementById(id);
        if (pageEl) pageEl.classList.add('active');
        
        const infoPanel = document.getElementById('user-info-panel');
        if (infoPanel) {
            if (id === 'page-main-menu' || id === 'page-menu' || id === 'page-result') {
                infoPanel.style.display = 'flex';
            } else {
                infoPanel.style.display = 'none';
            }
        }

        if(id === 'page-main-menu') {
            let db = getDB();
            let totalAttempts = 0, totalCorrect = 0;
            if (db[currentUser] && db[currentUser].stats) {
                Object.values(db[currentUser].stats).forEach(stat => {
                    totalAttempts += stat.total;
                    totalCorrect += stat.correct;
                });
                db[currentUser].totalSolved = totalAttempts;
                saveDB(db);
            }
            let successRate = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
            const totalEl = document.getElementById('total-solved-display');
            const rateEl = document.getElementById('success-rate-display');
            if(totalEl) totalEl.textContent = totalAttempts;
            if(rateEl) rateEl.textContent = `%${successRate}`;
        } else if (id === 'page-menu') {
            renderMistakeMenu();
        }
    }

    function openExam(examId) {
        currentExamCategory = examId;
        currentTab = 'all';

        // Başlık Ayarı
        document.getElementById('exam-title').textContent = 
            (examId === 'exam12') ? "Exam I-II" : 
            (examId === 'exam3') ? "Exam III" : 
            (examId === 'exam4') ? "Exam IV" : 
            (examId === 'old') ? "Old Exams" : "Ekstra";

        // Geri Butonu Yönlendirmesi (Old menüsünden Exam 4'e dönmesi için)
        const backBtn = document.getElementById('menu-back-btn');
        if (backBtn) {
            if (examId === 'old') {
                backBtn.onclick = () => openExam('exam4');
            } else {
                backBtn.onclick = () => showPage('page-main-menu');
            }
        }

        const grid = document.getElementById('dersler-menusu');
        grid.innerHTML = '';
        examGroups[examId].forEach(key => {
            const btn = document.createElement('button');
            btn.className = 'btn';
            btn.innerHTML = courseNames[key];
            btn.onclick = () => startQuiz(key);
            grid.appendChild(btn);
        });

        // EĞER EXAM IV MENÜSÜNDEYSEK "OLD" KLASÖRÜNÜ DE EKLE
        if (examId === 'exam4') {
            const oldBtn = document.createElement('button');
            oldBtn.className = 'btn btn-primary';
            oldBtn.style.background = '#57534e';
            oldBtn.style.borderColor = '#57534e';
            oldBtn.innerHTML = '🗄️ Old Exams';
            oldBtn.onclick = () => openExam('old');
            grid.appendChild(oldBtn);
        }

        const tabs = document.getElementById('hata-sekmeleri');
        tabs.innerHTML = `<div class="stat-tab active" onclick="switchMistakeTab('all', this)">GENEL</div>`;
        examGroups[examId].forEach(key => {
            const tab = document.createElement('div');
            tab.className = 'stat-tab';
            tab.textContent = mistakeTabNames[key];
            tab.onclick = function() { switchMistakeTab(key, this); };
            tabs.appendChild(tab);
        });

        showPage('page-menu');
    }

    function updateUserInfo() {
        let name1 = document.getElementById('display-username');
        let name2 = document.getElementById('display-username-quiz');
        
        if (name1) name1.textContent = currentUser;
        if (name2) name2.textContent = currentUser;
    }

    function login() {
        const val = document.getElementById('username-input').value.trim();
        if(!val) return alert("Lütfen adınızı giriniz.");
        
        currentUser = val;
        sessionStorage.setItem('sinav_user_v1', val);
        updateUserInfo();
        checkSavedExamOrGoMenu(); // Yarım kalan sınavı kontrol etme duruyor!
    }

    function logout() {
        if(confirm("Çıkış yapılsın mı?")) {
            sessionStorage.removeItem('sinav_user_v1');
            currentUser = null;
            showPage('page-login');
        }
    }

    function checkSavedExamOrGoMenu() {
        const savedData = localStorage.getItem('saved_exam_state');
        if (savedData) {
            const state = JSON.parse(savedData);
            if (state.user === currentUser) {
                if (confirm("Yarım kalan bir sınavınız var. Kaldığınız yerden devam etmek ister misiniz?")) {
                    // Arka planda dönüş yapılacak menüyü gizlice oluştur:
                    openExam(state.category);

                    currentQuizTitle = state.title;
                    currentExamCategory = state.category;
                    currentPool = state.pool;
                    currentIndex = state.index;
                    userAnswers = state.answers;
                    quizStartTime = state.startTime || Date.now();
                    
                    document.getElementById('quiz-title').textContent = currentQuizTitle;
                    showPage('page-quiz');
                    loadQuestion();
                    
                    if (timerInterval) clearInterval(timerInterval);
                    timerInterval = setInterval(updateTimer, 1000);
                    return; // Normal menüye geçmesini engelle
                } else {
                    clearExamState(); // Devam etmediyse eskiyi sil
                }
            }
        }
        showPage('page-main-menu');
    }

    function getDB() { return JSON.parse(localStorage.getItem('sinav_db_v1') || '{}'); }
    function saveDB(data) { localStorage.setItem('sinav_db_v1', JSON.stringify(data)); }

    // --- YARIM KALAN SINAV KONTROLÜ ---
    function saveExamState() {
        if (!currentUser || !currentPool || currentPool.length === 0) return;
        const state = {
            user: currentUser,
            title: currentQuizTitle,
            category: currentExamCategory,
            pool: currentPool,
            index: currentIndex,
            answers: userAnswers,
            startTime: quizStartTime
        };
        localStorage.setItem('saved_exam_state', JSON.stringify(state));
    }

    function clearExamState() {
        localStorage.removeItem('saved_exam_state');
    }

    function findQuestionCategory(qText) {
        for (let category in courseData) {
            if (courseData[category].some(x => x.q === qText)) return category;
        }
        return 'diger';
    }

    function updateStats(question, isCorrect) {
        let db = getDB();
        if(!db[currentUser]) db[currentUser] = { stats: {}, totalSolved: 0 };
        if (typeof db[currentUser].totalSolved === 'undefined') db[currentUser].totalSolved = 0;
        
        const key = question.q;
        if(!db[currentUser].stats[key]) {
            const cat = findQuestionCategory(key);
            db[currentUser].stats[key] = { total: 0, correct: 0, wrong: 0, qObj: question, category: cat };
        }
        
        let stat = db[currentUser].stats[key];
        stat.total++;
        if(isCorrect) stat.correct++; else stat.wrong++;
        stat.qObj = question;
        db[currentUser].totalSolved++; 

        saveDB(db);
    }

    function switchMistakeTab(tabName, btn) {
        currentTab = tabName;
        document.querySelectorAll('.stat-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMistakeMenu();
    }

    function renderMistakeMenu() {
        let db = getDB();
        let stats = db[currentUser] ? db[currentUser].stats : {};
        let critical = [], warning = [], info = [];

        Object.values(stats).forEach(item => {
            if (currentTab === 'all') {
                if (!examGroups[currentExamCategory].includes(item.category)) return;
            } else {
                if (item.category !== currentTab) return;
            }

            if(item.wrong > 0) {
                let rate = (item.correct / item.total) * 100;
                if(rate < 50) critical.push(item.qObj);
                else if(rate < 80) warning.push(item.qObj);
                else info.push(item.qObj);
            }
        });

        const container = document.getElementById('mistake-stats');
        container.innerHTML = '';

        if(critical.length > 0) container.innerHTML += `<button class="btn btn-danger" onclick="startMistakeQuiz('critical')">🔴 Kritik (${critical.length})</button>`;
        if(warning.length > 0) container.innerHTML += `<button class="btn" style="color:#b45309; border-color:#fcd34d; background:#fffbeb;" onclick="startMistakeQuiz('warning')">🟠 Sık Hata (${warning.length})</button>`;
        if(info.length > 0) container.innerHTML += `<button class="btn" style="color:#1e40af; border-color:#bfdbfe; background:#eff6ff;" onclick="startMistakeQuiz('info')">🔵 Nadir (${info.length})</button>`;
        
        if(critical.length===0 && warning.length===0 && info.length===0) container.innerHTML = '<span style="color:#94a3b8;">Bu kategoride henüz hata kaydı yok.</span>';
    }

    function startQuiz(type) {
        returnPageId = 'page-menu';
        let titleText = "";
        let sourceData = [];

        if (type === 'mix') {
            titleText = "🔀 Karışık Test";
            examGroups[currentExamCategory].forEach(key => {
                sourceData.push(...courseData[key]);
            });
        } else if (courseData[type]) {
            titleText = "📚 " + courseNames[type];
            sourceData = courseData[type];
        }

        document.getElementById('quiz-title').textContent = titleText;
        currentQuizTitle = titleText;

        if (!sourceData || sourceData.length === 0) return alert("Bu ders için henüz soru eklenmemiş.");
        
        currentPool = sourceData.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });

        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function startMistakeQuiz(cat) {
        returnPageId = 'page-menu';
        let titleText = "";
        if (cat === 'critical') titleText = "🔴 Kritik Hatalar";
        else if (cat === 'warning') titleText = "🟠 Sık Yapılan Hatalar";
        else if (cat === 'info') titleText = "🔵 Nadir Hatalar";
        
        document.getElementById('quiz-title').textContent = titleText;
        currentQuizTitle = titleText;

        let db = getDB();
        let stats = db[currentUser] ? db[currentUser].stats : {}; 
        let pool = [];
        
        if (stats) {
            Object.values(stats).forEach(item => {
                if (currentTab === 'all') {
                    if (!examGroups[currentExamCategory].includes(item.category)) return;
                } else {
                    if (item.category !== currentTab) return;
                }

                if(item.wrong > 0) {
                    let rate = (item.correct / item.total) * 100;
                    if(cat === 'critical' && rate < 50) pool.push(item.qObj);
                    if(cat === 'warning' && rate >= 50 && rate < 80) pool.push(item.qObj);
                    if(cat === 'info' && rate >= 80) pool.push(item.qObj);
                }
            });
        }
        
        if(pool.length === 0) return alert("Bu kategoride soru yok.");

        currentPool = pool.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });

        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function updateTimer() {
        if (!quizStartTime) return;
        let elapsed = Math.floor((Date.now() - quizStartTime) / 1000); // Milisaniyeyi saniyeye çevir
        let m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        let s = String(elapsed % 60).padStart(2, '0');
        let timerEl = document.getElementById('quiz-timer');
        if(timerEl) timerEl.textContent = `${m}:${s}`;
    }

    function initQuizUI() {
        currentIndex = 0;
        userAnswers = new Array(currentPool.length).fill(null);
        showPage('page-quiz');
        loadQuestion();
        
        // Zamanlayıcıyı başlat
        quizStartTime = Date.now(); // Teste başladığımız anki gerçek saati al
        if (timerInterval) clearInterval(timerInterval);
        updateTimer(); // Ekrana ilk saniyeyi (00:00) hemen yaz
        timerInterval = setInterval(updateTimer, 1000);
        saveExamState();
    }

    function loadQuestion() {
        const q = currentPool[currentIndex];
        
        let qHTML = `${currentIndex+1}. ${q.q}`;
        if (q.img) {
            qHTML += `<br><img src="${q.img}" style="max-width:100%; max-height:400px; border-radius:8px; margin-top:15px; border:2px solid #e2e8f0; display:block; margin-left:auto; margin-right:auto;">`;
        }
        document.getElementById('q-text').innerHTML = qHTML;
        document.getElementById('q-counter').textContent = `Soru ${currentIndex + 1} / ${currentPool.length}`;
        document.getElementById('q-progress').style.width = `${((currentIndex+1)/currentPool.length)*100}%`;

        const optsDiv = document.getElementById('q-options');
        optsDiv.innerHTML = '';

        q.options.forEach((opt, idx) => {
            const btn = document.createElement('div');
            btn.className = 'option-card';
            const letter = String.fromCharCode(65 + idx); 
            btn.innerHTML = `<span class="option-key-hint">${letter}</span> ${opt}`;
            
            btn.onclick = () => handleAnswer(opt, btn);
            optsDiv.appendChild(btn);
        });

        if(userAnswers[currentIndex]) restoreState();
        
        document.getElementById('btn-prev').disabled = (currentIndex === 0);
        document.getElementById('btn-next').textContent = (currentIndex === currentPool.length - 1) ? 'Bitir' : 'Sonraki →';
        
        renderFastAccess();
    }

    function handleAnswer(selected, btn) {
        if(userAnswers[currentIndex]) return;

        const q = currentPool[currentIndex];
        const isCorrect = (selected === q.answer);
        
        userAnswers[currentIndex] = { selected, isCorrect, qObj: q };
        
        updateStats(q, isCorrect);
        applyFeedback();
        renderFastAccess();
        saveExamState();

        const autoNext = document.getElementById('auto-next').checked;
        if(isCorrect && autoNext) {
            const allOpts = document.querySelectorAll('.option-card');
            allOpts.forEach(o => o.style.pointerEvents = 'none');
            
            if (currentIndex < currentPool.length - 1) {
                setTimeout(() => {
                    nextQuestion();
                }, 400); 
            }
        }
    }

    function applyFeedback() {
        const ans = userAnswers[currentIndex];
        if(!ans) return;
        
        const q = currentPool[currentIndex];
        const opts = document.querySelectorAll('.option-card');
        
        opts.forEach(btn => {
            btn.style.pointerEvents = 'none';
            const btnText = btn.textContent.substring(2).trim();
            
            if(btnText === q.answer) {
                btn.classList.add(ans.isCorrect ? 'correct' : 'hint');
            }
            if(btnText === ans.selected && !ans.isCorrect) {
                btn.classList.add('incorrect');
            }
        });
    }

    function restoreState() { applyFeedback(); }

    function renderFastAccess() {
        const grid = document.getElementById('fast-access-grid');
        grid.innerHTML = '';
        
        currentPool.forEach((_, i) => {
            const btn = document.createElement('div');
            btn.className = 'access-btn';
            btn.textContent = i + 1;
            
            if (i === currentIndex) btn.classList.add('current');
            
            if (userAnswers[i]) {
                if (userAnswers[i].isCorrect) btn.classList.add('correct');
                else btn.classList.add('incorrect');
            }
            
            btn.onclick = () => {
                currentIndex = i;
                loadQuestion();
            };
            grid.appendChild(btn);
        });
    }

    function nextQuestion() {
        if(currentIndex < currentPool.length - 1) {
            currentIndex++;
            saveExamState();
            loadQuestion();
        } else {
            finishQuiz();
        }
    }

    function prevQuestion() {
        if(currentIndex > 0) {
            currentIndex--;
            saveExamState();
            loadQuestion();
        }
    }

    function endQuiz() {
        if(confirm("Testi bitirmek istiyor musunuz?")) {
            if (timerInterval) clearInterval(timerInterval);
            clearExamState(); // Testten kendi isteğiyle çıkarsa kaydı sil
            showPage(returnPageId);
        }
    }

    function finishQuiz() {
        clearExamState(); // Test bittiği için kaydı sil
        // Test bitince zamanlayıcıyı durdur ve sonucu hesapla
        if (timerInterval) clearInterval(timerInterval);
        let elapsed = Math.floor((Date.now() - quizStartTime) / 1000);
        let m = String(Math.floor(elapsed / 60)).padStart(2, '0');
        let s = String(elapsed % 60).padStart(2, '0');
        let resTimeEl = document.getElementById('res-time-display');
        if(resTimeEl) resTimeEl.textContent = `${m}:${s}`;

        const correct = userAnswers.filter(a => a && a.isCorrect).length;
        const score = Math.round((correct / currentPool.length) * 100);
        
        document.getElementById('res-score').textContent = `%${score}`;
        
        const circle = document.getElementById('result-circle');
        circle.className = 'score-circle'; 
        if(score >= 75) circle.classList.add('good');
        else circle.classList.add('bad');

        const msg = document.getElementById('res-msg');
        if(score >= 90) msg.textContent = "Mükemmel! 🚀";
        else if(score >= 75) msg.textContent = "Tebrikler, Geçtiniz! 👍";
        else msg.textContent = "Tekrar Gerekli. 🧐";
        
        document.getElementById('res-test-title').textContent = currentQuizTitle;

        const wrongOnes = userAnswers.filter(a => a && !a.isCorrect);
        const retryBtn = document.getElementById('btn-retry-session');
        
        if(wrongOnes.length > 0) {
            retryBtn.style.display = 'block';
            retryBtn.textContent = `⚠️ Bu Testteki ${wrongOnes.length} Yanlışı Çöz`;
        } else {
            retryBtn.style.display = 'none';
        }

        showPage('page-result');
    }

    function restartQuiz() {
        currentPool = currentPool.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });
        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function retrySessionMistakes() {
        const wrongs = userAnswers.filter(a => a && !a.isCorrect).map(a => a.qObj);
        
        currentPool = wrongs.map(q => {
            let newQ = { ...q };
            newQ.options = [...q.options].sort(() => Math.random() - 0.5);
            return newQ;
        });

        currentPool.sort(() => Math.random() - 0.5);
        initQuizUI();
    }

    function goBackToMenu() {
        showPage(returnPageId);
    }
</script>
</body>
